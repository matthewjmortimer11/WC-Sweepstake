# =============================================================================
#  Tournament configuration — World Cup 2026
#
#  This file is the tournament-specific DATA for the sweepstake. wc_data.py reads
#  it and builds the app payload; nothing tournament-specific is hardcoded in the
#  generator any more. A NEW tournament = a new file like this (+ WC_TOURNAMENT
#  pointing at it), no code changes.
#
#  Select at runtime with the WC_TOURNAMENT env var (default: world-cup-2026).
# =============================================================================

id = "world-cup-2026"
competition_code = "WC"                      # Football-Data.org competition code
sweepstake_name = "The Office Sweepstake"   # app title (meta.name)
season = "World Cup 2026"                    # subtitle (meta.season)
phase = "pre"                                # pre | live | done

# Ordered stage progression. Drives bracket depth and the per-stage labels below.
# (Top-level keys must precede the first [table] header in TOML.)
stage_ladder = ["group", "r32", "r16", "qf", "sf", "final", "winner"]

# Teams that trigger bespoke draw moments (home nations etc.).
special_teams = ["SCO", "ENG"]

[entry]
fee = 5              # £ per entry
charity_split = 0.5  # fraction of every entry that goes to charity

# The pre-seeded sweepstake league. Entering this code + password at sign-up
# reveals the [[roster]] below (the existing office sweepstake). Other people
# create their OWN league instead — see the league model in main.py. The League
# row is seeded into Postgres on startup from these values (password is hashed,
# never stored or sent in plaintext).
[league]
code = "OI"
name = "The Office Sweepstake"
password = "Unsweepstake"
seeded = true

[stage_labels]
group  = "Group stage"
r32    = "Round of 32"
r16    = "Round of 16"
qf     = "Quarter-final"
sf     = "Semi-final"
final  = "Final"
winner = "Winner"

# How the group stage resolves into the knockout bracket (used by later phases'
# standings/progression engine; declared here so it travels with the tournament).
[qualification]
groups = 12
group_size = 4
qualify_per_group = 2
best_third_qualifiers = 8

[meta]
stage_label = "Group Stage"   # label for the current phase
kickoff = "Thu 11 June"
final_venue = "MetLife Stadium, New Jersey"
final_date = "Sun 19 July"
# Soft gate on the organiser tools (results, eliminations, chat moderation,
# tournament reset). Not real auth — just stops casual taps on a shared link
# from wiping the sweepstake. Change this before sharing.
admin_pin = "1966"
# Master developer key — unlocks the hidden cross-league dev console (the secret
# gesture: tap the mascot in the top bar seven times). Lets you administer ANY
# league. Unlike admin_pin it is verified server-side and is NEVER sent to the
# browser. Override in production with the WC_DEV_KEY environment variable.
dev_key = "wheesht-boss-2026"

# --- Fixture schedule generation -------------------------------------------
# The group-stage fixtures are generated as a round-robin per group. These are
# the knobs; the algorithm lives in wc_data.py. (Phase 3 replaces this with the
# real provider schedule.)
[schedule]
start_date = 2026-06-11
times = ["16:00", "19:00", "22:00"]
# Round-robin pairings within a group of 4, by matchday (0-indexed team slots).
round_robin = [
  [[0, 1], [2, 3]],
  [[0, 2], [3, 1]],
  [[0, 3], [1, 2]],
]
venues = [
  "MetLife Stadium, NJ", "SoFi Stadium, LA", "AT&T Stadium, Dallas", "Mercedes-Benz, Atlanta",
  "Lincoln Financial, Philadelphia", "Gillette Stadium, Boston", "Levi's Stadium, SF Bay",
  "Hard Rock Stadium, Miami", "NRG Stadium, Houston", "Arrowhead, Kansas City", "Lumen Field, Seattle",
  "BMO Field, Toronto", "BC Place, Vancouver", "Estadio Azteca, Mexico City",
  "Estadio Akron, Guadalajara", "Estadio BBVA, Monterrey",
]

