# --- Mascot copy (Wheesht) --------------------------------------------------
[lines]
welcome = "Right. Let's get this started. Wheesht is watching."
drawGood = "A solid draw. That team has genuine pedigree. Wheesht approves — quietly."
drawMid = "Could be worse. Could be better. Wheesht is reserving judgement."
drawBad = "…Wheesht is not going to say anything. The flag is nice though."
drawYou = "Croatia. Experienced, stubborn, never know when they're beat. Wheesht approves. Quietly."
upset = "Nobody saw that coming. Wheesht certainly didn't. Wheesht's predictions stand regardless."
england = "…Wheesht is remaining professional. Next question."
scotland = "Scotland. The homeland. Drawn with Brazil, yes — but Wheesht believes. Wheesht needs a moment."
eliminated = "You've been eliminated. Wheesht is… sorry. (Wheesht is not sorry. Wheesht saw this coming.)"
sideBets = "You're out. But Wheesht isn't finished with you yet."
sideBets2 = "Watching objectively now. Arguably the better position."
predOpen = "Predictions are open. Back yourself. Wheesht will remember every single one."
predLocked = "Predictions are locked. No takebacks. Wheesht has your answers in writing."
empty = "Nothing here yet. Wheesht is watching the space."
error = "Something went wrong. Wheesht is investigating. Wheesht suspects foul play."
finalBuild = "Two teams left. Wheesht has officiated since 1966. Wheesht is, for once, almost speechless. Almost."

