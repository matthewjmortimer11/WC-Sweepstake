<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Cipher — the customisable word-spy party game</title>
  <meta name="description" content="Cipher is a free, real-time word-association party game. Two spymasters, one grid of secret agents, infinite mischief. Custom word packs, board sizes, timers and themes." />
  <meta name="theme-color" content="#0e1016" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Cipher" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <meta property="og:title" content="Cipher — the word-spy party game" />
  <meta property="og:description" content="Two spymasters. One grid of secret agents. Infinite mischief. Play free in your browser." />
  <meta property="og:type" content="website" />

  <script>
    (function () {
      try {
        var t = localStorage.getItem("cipher.theme");
        if (t) document.documentElement.dataset.theme = t;
      } catch (_) {}
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/play/assets/styles.css" />
  <link rel="manifest" href="/play/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%95%B5%EF%B8%8F%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <main id="app" class="app" aria-live="polite"></main>

  <div id="toast-stack" class="toast-stack" aria-live="assertive" aria-atomic="true"></div>
  <canvas id="confetti" class="confetti" aria-hidden="true"></canvas>

  <script src="/play/assets/app.js" defer></script>
</body>
</html>
