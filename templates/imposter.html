<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Imposter — a Wheesht party game</title>
  <meta name="description" content="A quick local party game for four players. One of you is the imposter. Pass the phone, peek at your own role, and don't get caught." />
  <meta name="theme-color" content="#0e1016" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%95%B5%EF%B8%8F%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg:#0e1016; --panel:#1a1e2b; --panel-2:#212636; --line:#2c3346; --line-strong:#3b4459;
      --ink:#f4f7ff; --ink-2:#aab4c9; --ink-3:#717c92;
      --accent:#ffc53d; --accent-2:#f0a417; --accent-ink:#2a1c02;
      --imposter:#fb5071; --imposter-deep:#b91c47; --safe:#21d4cf; --safe-deep:#0c8f93;
      --radius:18px; --radius-sm:13px;
      --font:"Nunito",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      --head:"Fredoka",var(--font);
      --shadow:0 24px 60px -28px rgba(0,0,0,.85);
      --ease:cubic-bezier(.34,1.56,.64,1);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;font-family:var(--font);font-weight:600;color:var(--ink);
      background:radial-gradient(125% 65% at 50% -25%,rgba(255,197,61,.08) 0%,transparent 62%),var(--bg);
      -webkit-font-smoothing:antialiased;min-height:100dvh}
    .wrap{max-width:560px;margin:0 auto;padding:clamp(16px,4vw,32px);
      padding-bottom:max(20px,env(safe-area-inset-bottom));min-height:100dvh;
      display:flex;flex-direction:column;gap:20px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .brand{font-family:var(--head);font-weight:600;font-size:1.05rem;letter-spacing:.02em;display:flex;align-items:center;gap:.5rem}
    .brand .tag{color:var(--ink-3);font-size:.7rem;text-transform:uppercase;letter-spacing:.14em;font-weight:700}
    a.back{color:var(--ink-2);text-decoration:none;font-size:.82rem;font-weight:700;
      border:1.5px solid var(--line-strong);padding:.4em .8em;border-radius:10px;transition:.15s}
    a.back:hover{border-color:var(--accent);color:var(--ink)}
    h1{font-family:var(--head);font-weight:600;font-size:clamp(1.8rem,7vw,2.6rem);line-height:1.04;margin:0;letter-spacing:-.01em}
    h1 .em{color:var(--accent)}
    .lede{color:var(--ink-2);margin:.4rem 0 0;line-height:1.5;font-size:.98rem}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
      padding:clamp(16px,4vw,24px);box-shadow:var(--shadow);display:grid;gap:16px}
    .eyebrow{font-family:var(--head);font-size:.72rem;font-weight:600;letter-spacing:.16em;
      text-transform:uppercase;color:var(--accent)}
    label.fl{display:grid;gap:6px;font-size:.78rem;font-weight:800;color:var(--ink-2);letter-spacing:.02em}
    input.in{font:inherit;font-weight:700;color:var(--ink);background:#0a0a08;border:2px solid var(--line-strong);
      border-radius:var(--radius-sm);padding:.78em .95em;width:100%;transition:border-color .15s,box-shadow .15s}
    input.in:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px rgba(255,197,61,.14)}
    .names{display:grid;gap:12px}
    .btn{appearance:none;cursor:pointer;font:inherit;font-weight:800;font-family:var(--head);letter-spacing:.01em;
      color:var(--ink);background:var(--panel-2);border:0;border-radius:var(--radius-sm);
      padding:.85em 1.2em;display:inline-flex;align-items:center;justify-content:center;gap:.5em;
      box-shadow:0 3px 0 var(--line-strong);transition:transform .08s var(--ease),box-shadow .08s var(--ease),filter .15s}
    .btn:hover{filter:brightness(1.08)}
    .btn:active{transform:translateY(3px);box-shadow:0 0 0 var(--line-strong)}
    .btn:focus-visible{outline:none;box-shadow:0 0 0 3px var(--bg),0 0 0 6px var(--accent)}
    .btn--primary{background:var(--accent);color:var(--accent-ink);box-shadow:0 3px 0 var(--accent-2)}
    .btn--primary:active{box-shadow:0 0 0 var(--accent-2)}
    .btn--block{width:100%}
    .btn--lg{padding:1em 1.4em;font-size:1.1rem}
    .btn--ghost{background:transparent;box-shadow:none;border:1.5px solid var(--line-strong);color:var(--ink-2)}
    .btn--ghost:hover{border-color:var(--accent);color:var(--ink)}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .row .btn{flex:1}
    .pick-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .pick{position:relative;min-height:84px;font-size:1.1rem;text-align:center;word-break:break-word}
    .pick .check{position:absolute;top:8px;right:10px;font-size:.9rem;color:var(--safe);opacity:.9}
    .pick.done{color:var(--ink-2)}
    .note{color:var(--ink-2);text-align:center;font-size:.92rem;margin:0}
    .reveal{display:grid;gap:18px;justify-items:center;text-align:center;padding:14px 4px}
    .reveal .who{font-family:var(--head);font-weight:600;font-size:1.1rem;color:var(--ink-2)}
    .role{font-family:var(--head);font-weight:700;letter-spacing:.04em;font-size:clamp(2.4rem,12vw,3.6rem);
      padding:.3em .6em;border-radius:var(--radius);width:100%}
    .role.imposter{color:#fff;background:linear-gradient(180deg,var(--imposter),var(--imposter-deep))}
    .role.safe{color:var(--safe-deep);background:rgba(33,212,207,.14);border:2px solid var(--safe)}
    .role.celeb{color:var(--accent-ink);background:linear-gradient(180deg,var(--accent),var(--accent-2));
      font-size:clamp(1.7rem,8.5vw,2.8rem);line-height:1.1}
    .role.charade{color:#fff;background:linear-gradient(180deg,#8b6df0,#5b3fc0);
      font-size:clamp(1.7rem,8.5vw,2.8rem);line-height:1.1}
    .role-cap{letter-spacing:.14em;text-transform:uppercase;font-weight:800}
    .turn-card{background:var(--panel-2);border:1px solid var(--line);border-radius:var(--radius-sm);
      padding:18px;text-align:center;display:grid;gap:6px}
    .turn-card__cap{letter-spacing:.14em;text-transform:uppercase;font-weight:800}
    .turn-name{font-family:var(--head);font-weight:600;font-size:clamp(1.8rem,9vw,2.6rem);color:var(--ink);word-break:break-word}
    .role-sub{color:var(--ink-2);font-size:.95rem;line-height:1.5;margin:0;max-width:34ch}
    /* Mode selector */
    .modes{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;background:#0a0a08;
      border:1.5px solid var(--line-strong);border-radius:var(--radius-sm);padding:5px}
    .mode-opt{appearance:none;border:0;background:transparent;color:var(--ink-2);cursor:pointer;
      font:inherit;font-weight:800;font-family:var(--head);padding:.6em .35em;border-radius:10px;
      transition:.14s var(--ease);font-size:.82rem;line-height:1.15;white-space:normal}
    .mode-opt.on{background:var(--accent);color:var(--accent-ink);box-shadow:0 3px 0 var(--accent-2)}
    .mode-opt:focus-visible{outline:none;box-shadow:0 0 0 3px var(--bg),0 0 0 6px var(--accent)}
    /* Reveal-the-answer box (celebrity mode) */
    .answer{background:var(--panel-2);border:1px solid var(--line);border-radius:var(--radius-sm);
      padding:14px 16px;text-align:center;display:grid;gap:4px}
    .answer__line{margin:0;line-height:1.5}
    .answer__line b{color:var(--accent)}
    .foot{margin-top:auto;text-align:center;color:var(--ink-3);font-size:.78rem;font-family:var(--head);font-weight:600}
    @media (prefers-reduced-motion:reduce){*{transition-duration:.05ms!important}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="topbar">
      <span class="brand">🕵️ Imposter <span class="tag">Wheesht</span></span>
      <a class="back" href="/play">← Games</a>
    </div>
    <div id="app"></div>
    <p class="foot">A Wheesht party game · pass one phone around · 4 players</p>
  </main>

  <script>
  (() => {
    "use strict";
    const app = document.getElementById("app");

    // ── client-side state (the useState equivalent) ──────────────────────────
    const state = {
      screen: "setup",                 // setup | select | reveal
      mode: "classic",                 // classic | celebrity
      names: ["Player 1", "Player 2", "Player 3", "Player 4"],
      imposter: -1,                    // index of the imposter / odd-one-out
      celebs: [],                      // celebrity mode: a name per player
      commonCeleb: "",                 // the celeb three players share
      oddCeleb: "",                    // the different celeb the odd one gets
      revealAnswer: false,             // celebrity mode: show who was different
      viewed: [],                      // indices that have peeked this round
      current: -1,                     // index being revealed
      charadesActor: 0,                // charades: whose turn it is to act
      charadesWord: "",                // charades: the celebrity to act out (reused pool)
    };

    // Recognisable, fun-to-dance celebrities (kept family-friendly). A mix of
    // all-time icons, names today's under-25s will know, and some Scots.
    const CELEBS = [
      // Iconic performers (everyone knows the moves)
      "Beyoncé", "Michael Jackson", "Freddie Mercury", "Elvis Presley",
      "Lady Gaga", "Mick Jagger", "Tina Turner", "Madonna", "Prince",
      "Bruno Mars", "Rihanna", "Britney Spears", "James Brown", "Shakira",
      "Elton John", "Dolly Parton", "Stevie Wonder", "Usher", "Adele",
      "Snoop Dogg",
      // Names under-25s will know (current pop / film / internet)
      "Dua Lipa", "Harry Styles", "Taylor Swift", "Billie Eilish",
      "Ariana Grande", "Post Malone", "Cardi B", "Lizzo", "Olivia Rodrigo",
      "Doja Cat", "The Weeknd", "Bad Bunny", "SZA", "Sabrina Carpenter",
      "Chappell Roan", "Ice Spice", "Charli XCX", "Lil Nas X", "Jack Harlow",
      "Stormzy", "Central Cee", "Dave", "MrBeast", "KSI", "Zendaya",
      "Timothée Chalamet", "Pedro Pascal", "Jenna Ortega", "Tom Holland",
      "Cristiano Ronaldo", "Lionel Messi",
      // Scottish
      "Lewis Capaldi", "Calvin Harris", "David Tennant", "Karen Gillan",
      "Gerard Butler", "Ewan McGregor", "Billy Connolly", "Sean Connery",
      "Paolo Nutini", "Gerry Cinnamon", "Sam Heughan", "Andy Murray",
      "Annie Lennox", "Susan Boyle",
      // Comedy characters (great for an impression)
      "Gordon Ramsay", "David Attenborough", "Mr Bean", "Austin Powers",
      "Napoleon Dynamite", "Borat", "Forrest Gump", "Jack Sparrow",
      // Comedians & funny actors
      "Jim Carrey", "Jack Black", "Will Ferrell", "Steve Carell",
      "Ricky Gervais", "Kevin Hart", "Eddie Murphy", "Robin Williams",
      "Peter Kay", "Lee Evans", "John Cleese", "Danny DeVito", "Jonah Hill",
      "Seth Rogen", "Melissa McCarthy", "Rebel Wilson", "Kristen Wiig",
      "Tina Fey", "Adam Sandler", "Chris Rock", "Ali G",
      // Action heroes (best when hammed up)
      "Arnold Schwarzenegger", "Sylvester Stallone", "Dwayne Johnson",
      "John Cena", "Hulk Hogan", "Mr T", "Chuck Norris",
      "Jean-Claude Van Damme", "Steven Seagal", "The Terminator", "Rocky Balboa",
      // Dance legends & iconic moves
      "John Travolta", "Patrick Swayze", "MC Hammer", "PSY",
      "Michael Flatley", "Fred Astaire", "Gene Kelly",
      // Film & cartoon characters
      "Shrek", "Gru", "Willy Wonka", "Ace Ventura", "Beetlejuice",
      "Pee-wee Herman", "Joey Tribbiani", "Ron Burgundy", "Alan Partridge",
      "The Joker", "Yoda", "Gollum", "Buzz Lightyear", "Crocodile Dundee",
      "SpongeBob SquarePants", "Scooby-Doo", "Homer Simpson",
      // More danceable / iconic musicians
      "ABBA", "Tom Jones", "Cher", "Kylie Minogue", "Ed Sheeran", "Drake",
      "Eminem", "Pitbull", "Justin Bieber", "Miley Cyrus", "Katy Perry",
      "Pink", "Pharrell Williams", "Sia", "Village People", "Spice Girls",
      "Backstreet Boys",
      // Personalities
      "Simon Cowell", "Louis Theroux", "Ainsley Harriott", "Craig David",
      "Jonathan Ross", "Graham Norton",
      // More Scottish
      "Limmy", "Frankie Boyle", "Kevin Bridges", "Lulu", "Rod Stewart",
      "KT Tunstall", "Robert Carlyle",
    ];
    const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];

    function dealCelebs(oddIndex) {
      // Two distinct celebs: three players share one, the odd one gets the other.
      const common = pick(CELEBS);
      let odd = common;
      while (odd === common) odd = pick(CELEBS);
      state.commonCeleb = common;
      state.oddCeleb = odd;
      state.celebs = state.names.map((_, i) => (i === oddIndex ? odd : common));
    }

    const el = (tag, attrs = {}, kids = []) => {
      const n = document.createElement(tag);
      for (const [k, v] of Object.entries(attrs)) {
        if (k === "class") n.className = v;
        else if (k === "text") n.textContent = v;     // safe: no HTML injection
        else if (k.startsWith("on") && typeof v === "function") n.addEventListener(k.slice(2), v);
        else n.setAttribute(k, v);
      }
      (Array.isArray(kids) ? kids : [kids]).forEach((c) => c != null && n.append(c));
      return n;
    };

    // Charades reuses the celebrity pool as the prompts to act out.
    function pickCharade() {
      const prev = state.charadesWord;
      let next = pick(CELEBS);
      while (next === prev && CELEBS.length > 1) next = pick(CELEBS);
      state.charadesWord = next;
    }

    function startGame() {
      if (state.mode === "charades") {
        state.charadesActor = Math.floor(Math.random() * state.names.length);
        state.charadesWord = "";
        pickCharade();
        state.screen = "select";
        render();
        return;
      }
      // Randomly pick the odd-one-out (imposter / different celeb).
      state.imposter = Math.floor(Math.random() * 4);
      if (state.mode === "celebrity") dealCelebs(state.imposter);
      state.viewed = [];
      state.revealAnswer = false;
      state.screen = "select";
      render();
    }

    function newRound() {
      if (state.mode === "charades") { startGame(); return; }
      // Reshuffle the odd-one-out (a different player each round) — keep names.
      const prev = state.imposter;
      do { state.imposter = Math.floor(Math.random() * 4); }
      while (state.imposter === prev);
      if (state.mode === "celebrity") dealCelebs(state.imposter);
      state.viewed = [];
      state.revealAnswer = false;
      state.screen = "select";
      render();
    }

    function nextCharadesPlayer() {
      state.charadesActor = (state.charadesActor + 1) % state.names.length;
      pickCharade();
      state.screen = "select";
      render();
    }

    // ── screens ──────────────────────────────────────────────────────────────
    function setupScreen() {
      const inputs = state.names.map((name, i) =>
        el("label", { class: "fl" }, [
          el("span", { text: "Player " + (i + 1) }),
          el("input", {
            class: "in", type: "text", maxlength: "20", value: name,
            "aria-label": "Player " + (i + 1) + " name",
            oninput: (e) => { state.names[i] = e.target.value; },
          }),
        ])
      );
      const modeBtn = (id, label) => el("button", {
        class: "mode-opt" + (state.mode === id ? " on" : ""),
        "aria-pressed": state.mode === id ? "true" : "false",
        onclick: () => { state.mode = id; render(); },
      }, [el("span", { text: label })]);

      const lede = state.mode === "celebrity"
        ? "Four players, one phone. Everyone gets the same celebrity — except one. Check yours, then dance like them (accent or impression optional, but mainly dance). Spot the odd one out."
        : state.mode === "charades"
        ? "One phone, taking turns. Each round one person gets a celebrity to act out (no talking, no pointing at words) while everyone else guesses. Tap “Next player” to pass it on."
        : "Four players, one phone. Enter names, then pass it around so everyone can secretly check their role.";

      return el("div", { class: "panel" }, [
        el("span", { class: "eyebrow", text: "Setup" }),
        el("h1", {}, [document.createTextNode("Who's "), el("span", { class: "em", text: "in?" })]),
        el("div", { class: "modes", role: "group", "aria-label": "Game mode" }, [
          modeBtn("classic", "🕵️ Imposter"),
          modeBtn("celebrity", "💃 Celebrity Dance"),
          modeBtn("charades", "🎭 Charades"),
        ]),
        el("p", { class: "lede", text: lede }),
        el("div", { class: "names" }, inputs),
        el("button", {
          class: "btn btn--primary btn--lg btn--block", text: "Start game →",
          onclick: () => {
            // Fall back to defaults for any blank name.
            state.names = state.names.map((n, i) => (n || "").trim() || ("Player " + (i + 1)));
            startGame();
          },
        }),
      ]);
    }

    function selectScreen() {
      if (state.mode === "charades") {
        return el("div", { class: "panel" }, [
          el("span", { class: "eyebrow", text: "Charades" }),
          el("p", { class: "note", text: "Everyone else: guess the celebrity being acted out." }),
          el("div", { class: "turn-card" }, [
            el("span", { class: "turn-card__cap tiny muted", text: "Up to act" }),
            el("div", { class: "turn-name", text: state.names[state.charadesActor] }),
          ]),
          el("button", {
            class: "btn btn--primary btn--lg btn--block", text: "Reveal charade →",
            onclick: () => { state.screen = "reveal"; render(); },
          }),
          el("div", { class: "row" }, [
            el("button", { class: "btn btn--ghost", text: "New game", onclick: newRound }),
            el("button", { class: "btn btn--ghost", text: "Edit names", onclick: () => { state.screen = "setup"; render(); } }),
          ]),
        ]);
      }

      const allViewed = state.viewed.length >= 4;
      const grid = el("div", { class: "pick-grid" },
        state.names.map((name, i) => {
          const done = state.viewed.includes(i);
          return el("button", {
            class: "btn pick" + (done ? " done" : ""),
            onclick: () => { state.current = i; state.screen = "reveal"; render(); },
          }, [
            done ? el("span", { class: "check", text: "✓", "aria-label": "viewed" }) : null,
            el("span", { text: name }),
          ]);
        })
      );
      const celeb = state.mode === "celebrity";
      const readyNote = celeb
        ? "Everyone's seen their star. Dance! Then vote for the odd one out."
        : "Everyone's seen their role. Time to find the imposter.";

      // Celebrity mode lets the group reveal who had the different celeb.
      let answer = null;
      if (celeb && state.revealAnswer) {
        answer = el("div", { class: "answer" }, [
          el("p", { class: "answer__line" }, [
            el("b", { text: state.names[state.imposter] }),
            document.createTextNode(" was the odd one out — they had "),
            el("b", { text: state.oddCeleb }),
            document.createTextNode("."),
          ]),
          el("p", { class: "answer__line tiny muted", text: "Everyone else: " + state.commonCeleb + "." }),
        ]);
      }

      return el("div", { class: "panel" }, [
        el("span", { class: "eyebrow", text: "Pass the phone" }),
        el("p", { class: "note", text: "Only click your own name. No peeking." }),
        grid,
        allViewed ? el("p", { class: "note", text: readyNote }) : null,
        answer,
        (celeb && allViewed && !state.revealAnswer)
          ? el("button", { class: "btn btn--block", text: "Reveal the odd one out",
              onclick: () => { state.revealAnswer = true; render(); } })
          : null,
        el("div", { class: "row" }, [
          el("button", { class: "btn btn--ghost", text: "New round", onclick: newRound }),
          el("button", { class: "btn btn--ghost", text: "Edit names", onclick: () => { state.screen = "setup"; render(); } }),
        ]),
      ]);
    }

    function revealScreen() {
      if (state.mode === "charades") {
        // The actor sees the celebrity to mime; nobody else should look.
        return el("div", { class: "panel" }, [
          el("div", { class: "reveal" }, [
            el("span", { class: "who", text: state.names[state.charadesActor] + " — your charade" }),
            el("span", { class: "role-cap tiny muted", text: "Act this out" }),
            el("div", { class: "role charade", text: state.charadesWord }),
            el("p", { class: "role-sub", text: "No talking, no pointing at words — mime it. Others guess." }),
            el("div", { class: "row" }, [
              el("button", { class: "btn btn--ghost", text: "Different", onclick: () => { pickCharade(); render(); } }),
              el("button", { class: "btn btn--primary", text: "Next player →", onclick: nextCharadesPlayer }),
            ]),
          ]),
        ]);
      }

      const i = state.current;
      const hideBtn = el("button", {
        class: "btn btn--primary btn--lg btn--block",
        text: state.mode === "celebrity" ? "Hide" : "Hide role",
        onclick: () => {
          if (!state.viewed.includes(i)) state.viewed.push(i);
          state.current = -1;
          state.screen = "select";
          render();
        },
      });

      if (state.mode === "celebrity") {
        // Same look for everyone — you only see your own celeb, never whether
        // it's the shared one or the odd one. That's the whole game.
        return el("div", { class: "panel" }, [
          el("div", { class: "reveal" }, [
            el("span", { class: "who", text: state.names[i] }),
            el("span", { class: "role-cap tiny muted", text: "Your celebrity" }),
            el("div", { class: "role celeb", text: state.celebs[i] }),
            el("p", { class: "role-sub", text: "Dance like them. Accent or impression optional — but mainly dance." }),
            hideBtn,
          ]),
        ]);
      }

      const isImposter = i === state.imposter;
      return el("div", { class: "panel" }, [
        el("div", { class: "reveal" }, [
          el("span", { class: "who", text: state.names[i] }),
          el("div", { class: "role " + (isImposter ? "imposter" : "safe"), text: isImposter ? "IMPOSTER" : "NOT IMPOSTER" }),
          el("p", { class: "role-sub", text: isImposter
            ? "Blend in. Don't get caught."
            : "Work out who the imposter is." }),
          hideBtn,
        ]),
      ]);
    }

    function render() {
      app.replaceChildren(
        state.screen === "setup" ? setupScreen()
        : state.screen === "reveal" ? revealScreen()
        : selectScreen()
      );
      window.scrollTo(0, 0);
    }

    render();
  })();
  </script>
</body>
</html>
