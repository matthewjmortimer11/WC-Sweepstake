<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Imposter — a Wheesht party game</title>
  <meta name="description" content="A quick local party game for four players. One of you is the imposter. Pass the phone, peek at your own role, and don't get caught." />
  <meta name="theme-color" content="#0e1016" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%95%B5%EF%B8%8F%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg:#0e1016; --panel:#1a1e2b; --panel-2:#212636; --line:#2c3346; --line-strong:#3b4459;
      --ink:#f4f7ff; --ink-2:#aab4c9; --ink-3:#717c92;
      --accent:#ffc53d; --accent-2:#f0a417; --accent-ink:#2a1c02;
      --imposter:#fb5071; --imposter-deep:#b91c47; --safe:#21d4cf; --safe-deep:#0c8f93;
      --radius:18px; --radius-sm:13px;
      --font:"Nunito",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      --head:"Fredoka",var(--font);
      --shadow:0 24px 60px -28px rgba(0,0,0,.85);
      --ease:cubic-bezier(.34,1.56,.64,1);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;font-family:var(--font);font-weight:600;color:var(--ink);
      background:radial-gradient(125% 65% at 50% -25%,rgba(255,197,61,.08) 0%,transparent 62%),var(--bg);
      -webkit-font-smoothing:antialiased;min-height:100dvh}
    .wrap{max-width:560px;margin:0 auto;padding:clamp(16px,4vw,32px);
      padding-bottom:max(20px,env(safe-area-inset-bottom));min-height:100dvh;
      display:flex;flex-direction:column;gap:20px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .brand{font-family:var(--head);font-weight:600;font-size:1.05rem;letter-spacing:.02em;display:flex;align-items:center;gap:.5rem}
    .brand .tag{color:var(--ink-3);font-size:.7rem;text-transform:uppercase;letter-spacing:.14em;font-weight:700}
    a.back{color:var(--ink-2);text-decoration:none;font-size:.82rem;font-weight:700;
      border:1.5px solid var(--line-strong);padding:.4em .8em;border-radius:10px;transition:.15s}
    a.back:hover{border-color:var(--accent);color:var(--ink)}
    h1{font-family:var(--head);font-weight:600;font-size:clamp(1.8rem,7vw,2.6rem);line-height:1.04;margin:0;letter-spacing:-.01em}
    h1 .em{color:var(--accent)}
    .lede{color:var(--ink-2);margin:.4rem 0 0;line-height:1.5;font-size:.98rem}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
      padding:clamp(16px,4vw,24px);box-shadow:var(--shadow);display:grid;gap:16px}
    .eyebrow{font-family:var(--head);font-size:.72rem;font-weight:600;letter-spacing:.16em;
      text-transform:uppercase;color:var(--accent)}
    label.fl{display:grid;gap:6px;font-size:.78rem;font-weight:800;color:var(--ink-2);letter-spacing:.02em}
    input.in{font:inherit;font-weight:700;color:var(--ink);background:#0a0a08;border:2px solid var(--line-strong);
      border-radius:var(--radius-sm);padding:.78em .95em;width:100%;transition:border-color .15s,box-shadow .15s}
    input.in:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px rgba(255,197,61,.14)}
    .names{display:grid;gap:12px}
    .btn{appearance:none;cursor:pointer;font:inherit;font-weight:800;font-family:var(--head);letter-spacing:.01em;
      color:var(--ink);background:var(--panel-2);border:0;border-radius:var(--radius-sm);
      padding:.85em 1.2em;display:inline-flex;align-items:center;justify-content:center;gap:.5em;
      box-shadow:0 3px 0 var(--line-strong);transition:transform .08s var(--ease),box-shadow .08s var(--ease),filter .15s}
    .btn:hover{filter:brightness(1.08)}
    .btn:active{transform:translateY(3px);box-shadow:0 0 0 var(--line-strong)}
    .btn:focus-visible{outline:none;box-shadow:0 0 0 3px var(--bg),0 0 0 6px var(--accent)}
    .btn--primary{background:var(--accent);color:var(--accent-ink);box-shadow:0 3px 0 var(--accent-2)}
    .btn--primary:active{box-shadow:0 0 0 var(--accent-2)}
    .btn--block{width:100%}
    .btn--lg{padding:1em 1.4em;font-size:1.1rem}
    .btn--ghost{background:transparent;box-shadow:none;border:1.5px solid var(--line-strong);color:var(--ink-2)}
    .btn--ghost:hover{border-color:var(--accent);color:var(--ink)}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .row .btn{flex:1}
    .pick-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .pick{position:relative;min-height:84px;font-size:1.1rem;text-align:center;word-break:break-word}
    .pick .check{position:absolute;top:8px;right:10px;font-size:.9rem;color:var(--safe);opacity:.9}
    .pick.done{color:var(--ink-2)}
    .note{color:var(--ink-2);text-align:center;font-size:.92rem;margin:0}
    .reveal{display:grid;gap:18px;justify-items:center;text-align:center;padding:14px 4px}
    .reveal .who{font-family:var(--head);font-weight:600;font-size:1.1rem;color:var(--ink-2)}
    .role{font-family:var(--head);font-weight:700;letter-spacing:.04em;font-size:clamp(2.4rem,12vw,3.6rem);
      padding:.3em .6em;border-radius:var(--radius);width:100%}
    .role.imposter{color:#fff;background:linear-gradient(180deg,var(--imposter),var(--imposter-deep))}
    .role.safe{color:var(--safe-deep);background:rgba(33,212,207,.14);border:2px solid var(--safe)}
    .role-sub{color:var(--ink-2);font-size:.95rem;line-height:1.5;margin:0;max-width:34ch}
    .foot{margin-top:auto;text-align:center;color:var(--ink-3);font-size:.78rem;font-family:var(--head);font-weight:600}
    @media (prefers-reduced-motion:reduce){*{transition-duration:.05ms!important}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="topbar">
      <span class="brand">🕵️ Imposter <span class="tag">Wheesht</span></span>
      <a class="back" href="/play">← Games</a>
    </div>
    <div id="app"></div>
    <p class="foot">A Wheesht party game · pass one phone around · 4 players</p>
  </main>

  <script>
  (() => {
    "use strict";
    const app = document.getElementById("app");

    // ── client-side state (the useState equivalent) ──────────────────────────
    const state = {
      screen: "setup",                 // setup | select | reveal
      names: ["Player 1", "Player 2", "Player 3", "Player 4"],
      imposter: -1,                    // index of the imposter
      viewed: [],                      // indices that have peeked this round
      current: -1,                     // index being revealed
    };

    const el = (tag, attrs = {}, kids = []) => {
      const n = document.createElement(tag);
      for (const [k, v] of Object.entries(attrs)) {
        if (k === "class") n.className = v;
        else if (k === "text") n.textContent = v;     // safe: no HTML injection
        else if (k.startsWith("on") && typeof v === "function") n.addEventListener(k.slice(2), v);
        else n.setAttribute(k, v);
      }
      (Array.isArray(kids) ? kids : [kids]).forEach((c) => c != null && n.append(c));
      return n;
    };

    function startGame() {
      // Randomly assign exactly one imposter; the other three are NOT IMPOSTER.
      state.imposter = Math.floor(Math.random() * 4);
      state.viewed = [];
      state.screen = "select";
      render();
    }

    function newRound() {
      // Reshuffle the imposter, keep the same names.
      const prev = state.imposter;
      do { state.imposter = Math.floor(Math.random() * 4); }
      while (state.imposter === prev);     // a different player each round (4 players)
      state.viewed = [];
      state.screen = "select";
      render();
    }

    // ── screens ──────────────────────────────────────────────────────────────
    function setupScreen() {
      const inputs = state.names.map((name, i) =>
        el("label", { class: "fl" }, [
          el("span", { text: "Player " + (i + 1) }),
          el("input", {
            class: "in", type: "text", maxlength: "20", value: name,
            "aria-label": "Player " + (i + 1) + " name",
            oninput: (e) => { state.names[i] = e.target.value; },
          }),
        ])
      );
      return el("div", { class: "panel" }, [
        el("span", { class: "eyebrow", text: "Setup" }),
        el("h1", {}, [document.createTextNode("Who's "), el("span", { class: "em", text: "in?" })]),
        el("p", { class: "lede", text: "Four players, one phone. Enter names, then pass it around so everyone can secretly check their role." }),
        el("div", { class: "names" }, inputs),
        el("button", {
          class: "btn btn--primary btn--lg btn--block", text: "Start game →",
          onclick: () => {
            // Fall back to defaults for any blank name.
            state.names = state.names.map((n, i) => (n || "").trim() || ("Player " + (i + 1)));
            startGame();
          },
        }),
      ]);
    }

    function selectScreen() {
      const allViewed = state.viewed.length >= 4;
      const grid = el("div", { class: "pick-grid" },
        state.names.map((name, i) => {
          const done = state.viewed.includes(i);
          return el("button", {
            class: "btn pick" + (done ? " done" : ""),
            onclick: () => { state.current = i; state.screen = "reveal"; render(); },
          }, [
            done ? el("span", { class: "check", text: "✓", "aria-label": "viewed" }) : null,
            el("span", { text: name }),
          ]);
        })
      );
      return el("div", { class: "panel" }, [
        el("span", { class: "eyebrow", text: "Pass the phone" }),
        el("p", { class: "note", text: "Only click your own name. No peeking." }),
        grid,
        allViewed ? el("p", { class: "note", text: "Everyone's seen their role. Time to find the imposter." }) : null,
        el("div", { class: "row" }, [
          el("button", { class: "btn btn--ghost", text: "New round", onclick: newRound }),
          el("button", { class: "btn btn--ghost", text: "Edit names", onclick: () => { state.screen = "setup"; render(); } }),
        ]),
      ]);
    }

    function revealScreen() {
      const i = state.current;
      const isImposter = i === state.imposter;
      return el("div", { class: "panel" }, [
        el("div", { class: "reveal" }, [
          el("span", { class: "who", text: state.names[i] }),
          el("div", { class: "role " + (isImposter ? "imposter" : "safe"), text: isImposter ? "IMPOSTER" : "NOT IMPOSTER" }),
          el("p", { class: "role-sub", text: isImposter
            ? "Blend in. Don't get caught."
            : "Work out who the imposter is." }),
          el("button", {
            class: "btn btn--primary btn--lg btn--block", text: "Hide role",
            onclick: () => {
              if (!state.viewed.includes(i)) state.viewed.push(i);
              state.current = -1;
              state.screen = "select";
              render();
            },
          }),
        ]),
      ]);
    }

    function render() {
      app.replaceChildren(
        state.screen === "setup" ? setupScreen()
        : state.screen === "reveal" ? revealScreen()
        : selectScreen()
      );
      window.scrollTo(0, 0);
    }

    render();
  })();
  </script>
</body>
</html>
