         <Wa mood="confident" size={44} />
         <div style={{ flex: 1 }}>
           <div className="dh" style={{ fontSize: 20, color: '#fff', lineHeight: 1 }}>Wheesht's clipboard</div>
           <div style={{ fontSize: 11.5, fontWeight: 700, color: 'var(--yellow)' }}>{(Sa.activeLeague && Sa.activeLeague()) ? Sa.activeLeague().name : 'Admin'} · {allPeople.length} entrants</div>
         </div>
         <button onClick={props.onClose} style={{ border: 'none', background: 'rgba(255,255,255,.16)', color: '#fff', width: 34, height: 34, borderRadius: 10, fontSize: 18, fontWeight: 900, cursor: 'pointer', padding: 0 }}>✕</button>
       </div>

       <div className="mscroll" style={{ padding: '16px 18px 30px' }}>
         <SHa>Tournament phase</SHa>
         <PhaseSeg />

         <div style={{ display: 'flex', gap: 7, margin: '20px 0 14px', flexWrap: 'wrap' }}>
           {secs.map(([k, lab]) => (
             <button key={k} onClick={() => setSec(k)} className={'wc-chip' + (sec === k ? ' wc-chip--yellow' : '')} style={{ flex: '1 0 30%', cursor: 'pointer', textAlign: 'center', justifyContent: 'center' }}>{lab}</button>
           ))}
         </div>

         {sec === 'results' && <>
           <div style={{ display: 'flex', gap: 6, marginBottom: 12, overflowX: 'auto' }}>
             {[[0, 'All'], [1, 'MD1'], [2, 'MD2'], [3, 'MD3']].map(([k, lab]) => (
               <button key={k} onClick={() => setMdFilter(k)} className={'wc-chip' + (mdFilter === k ? ' wc-chip--yellow' : '')} style={{ cursor: 'pointer', flex: '0 0 auto' }}>{lab}</button>
             ))}
           </div>
           {byDate.map((d, i) => (
             <div key={i}>
               <div style={{ fontFamily: 'var(--disp)', fontWeight: 800, fontSize: 12, color: 'var(--ink2)', margin: '10px 2px 8px', letterSpacing: '.04em' }}>{d.label.toUpperCase()}</div>
               {d.items.map(f => <FixtureAdminRow key={f.id} f={f} owned={owned} />)}
             </div>
           ))}
         </>}

         {sec === 'teams' && <>
           <div style={{ fontSize: 12.5, fontWeight: 600, color: 'var(--ink2)', marginBottom: 8 }}>Knock a team out and everyone holding it flips to eliminated automatically.</div>
           {groups.map(g => {
             const ts = WCa.TEAM_LIST.filter(t => t.group === g);
             if (!ts.length) return null;
             return <Ca key={g} flat style={{ padding: '8px 14px', marginBottom: 9 }}>
               <div className="dh" style={{ fontSize: 14, marginBottom: 2 }}>Group {g}</div>
               {ts.map(t => <TeamToggle key={t.code} t={t} owners={owned[t.code] || 0} />)}
             </Ca>;
           })}
         </>}

         {sec === 'predict' && <>
           <div style={{ fontSize: 12.5, fontWeight: 600, color: 'var(--ink2)', marginBottom: 10 }}>Set the answer once it's known — every entrant's score and the league re-grade instantly.</div>
           {(WCa.predictions || Sa.PREDICTIONS).map(m => <PredAdmin key={m.key} m={m} />)}
         </>}

         {sec === 'people' && <PeopleAdmin />}

         {sec === 'chat' && <ChatAdmin />}

         {sec === 'settings' && <SettingsAdmin />}

         <div style={{ marginTop: 22, borderTop: '2px solid var(--line)', paddingTop: 16 }}>
           <button onClick={() => { if (window.confirm('Reset ALL results, eliminations and answers back to pre-kickoff?')) Sa.adminReset(); }}
             style={{ width: '100%', border: '2px solid var(--red)', borderRadius: 11, background: '#fff', color: 'var(--red)', fontFamily: 'var(--disp)', fontWeight: 800, fontSize: 13, padding: '10px', cursor: 'pointer' }}>Reset everything</button>
         </div>
       </div>
     </div>
   );
}

function PeopleAdmin() {
   const [q, setQ] = aState2('');
   const includeDept = Sa.includeDepartment ? Sa.includeDepartment() : true;
   const all = Sa.allSync().slice().sort((a, b) => (a.name || '').localeCompare(b.name || ''));
   const list = q.trim() ? all.filter(p => (p.name || '').toLowerCase().indexOf(q.toLowerCase()) >= 0) : all;
   const fld = { width: '100%', border: '2.5px solid var(--ink)', borderRadius: 12, padding: '10px 13px', fontFamily: 'var(--body)', fontWeight: 600, fontSize: 15, outline: 'none', marginBottom: 12 };
   function remove(p) {
     if (window.confirm('Remove ' + (p.name || 'this entrant') + ' from the sweepstake? This frees their entry and adjusts the pot.')) Sa.removeParticipant(p.id);
   }
   return (
     <>
       <div style={{ fontSize: 12.5, fontWeight: 600, color: 'var(--ink2)', marginBottom: 10 }}>Remove an entrant — say they dropped out or paid late. Frees their slot and trims the pot &amp; charity.</div>
       <input style={fld} placeholder="Search entrants…" value={q} onChange={e => setQ(e.target.value)} />
       {list.length === 0
         ? <Ca flat style={{ textAlign: 'center', padding: '24px 14px' }}>
             <Wa mood="neutral" size={56} animate />
             <div className="dh" style={{ fontSize: 16, marginTop: 6 }}>{all.length ? 'No match.' : 'No entrants yet.'}</div>
             <div style={{ fontSize: 12.5, fontWeight: 600, color: 'var(--ink2)', marginTop: 3 }}>{all.length ? 'Try a different name.' : "They'll appear here as people sign up."}</div>
           </Ca>
         : <Ca flat style={{ padding: '2px 13px' }}>
             {list.map((p, i) => {
               const t = WCa.TEAMS[p.team];
               return <div key={p.id} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '9px 0', borderBottom: i < list.length - 1 ? '1.5px solid var(--line)' : 'none' }}>
                 {t && <Fa team={t} size={22} />}
                 <div style={{ flex: 1, minWidth: 0 }}>
                   <div style={{ fontWeight: 800, fontSize: 14, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{p.name}</div>
                   <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--ink2)' }}>{(p.location || p.city || '')}{includeDept && p.department ? ' · ' + p.department : ''}{t ? ' · ' + t.name : ''}</div>
                 </div>
                 <button onClick={() => remove(p)} className="wc-btn wc-btn--sm" style={{ padding: '6px 12px', background: '#fff', color: 'var(--red)', boxShadow: '0 3px 0 var(--shadow)' }}>Remove</button>
               </div>;
             })}
           </Ca>}
     </>
   );
}

/* ---- chat moderation -------------------------------------------------------
    Live only. Lists recent messages newest-first; the organiser can delete any
    one (server removes it from data/chat.json). */
function ChatAdmin() {
   const [msgs, setMsgs] = aState2([]);
   const [loading, setLoading] = aState2(true);
   const isLive = !!window.WC_LIVE;

   function load() {
     fetch(Sa.api('/chat')).then(r => r.json()).then(d => {
       setMsgs((d || []).slice().reverse());
       setLoading(false);
     }).catch(() => setLoading(false));
   }
   React.useEffect(() => { if (isLive) load(); else setLoading(false); }, []);

   function del(id) {
     if (!window.confirm('Delete this message for everyone? This cannot be undone.')) return;
     fetch(Sa.api('/chat/' + id), { method: 'DELETE' })
       .then(() => setMsgs(prev => prev.filter(m => m.id !== id)))
       .catch(() => {});
   }

   if (!isLive) {
     return <Ca flat style={{ textAlign: 'center', padding: '24px 14px' }}>
       <Wa mood="neutral" size={56} animate />
       <div className="dh" style={{ fontSize: 16, marginTop: 6 }}>Chat is server-only.</div>
       <div style={{ fontSize: 12.5, fontWeight: 600, color: 'var(--ink2)', marginTop: 3 }}>Moderation works once the app is connected to the sweepstake server.</div>
     </Ca>;
   }

   return (
     <>
       <div style={{ fontSize: 12.5, fontWeight: 600, color: 'var(--ink2)', marginBottom: 10 }}>Keep the wall civil — delete anything out of order. Removals are instant for everyone.</div>
       {loading
         ? <Ca flat style={{ textAlign: 'center', padding: '24px 14px', fontSize: 13, fontWeight: 600, color: 'var(--ink2)' }}>Loading messages…</Ca>
         : msgs.length === 0
           ? <Ca flat style={{ textAlign: 'center', padding: '24px 14px' }}>
               <Wa mood="neutral" size={56} animate />
               <div className="dh" style={{ fontSize: 16, marginTop: 6 }}>Nothing to moderate.</div>
               <div style={{ fontSize: 12.5, fontWeight: 600, color: 'var(--ink2)', marginTop: 3 }}>Messages will appear here as people chat.</div>
             </Ca>
           : <Ca flat style={{ padding: '2px 13px' }}>
               {msgs.map((m, i) => {
                 const d = new Date(m.ts);
                 const timeStr = d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
                 return <div key={m.id} style={{ display: 'flex', alignItems: 'flex-start', gap: 10, padding: '10px 0', borderBottom: i < msgs.length - 1 ? '1.5px solid var(--line)' : 'none' }}>
                   <div style={{ width: 30, height: 30, borderRadius: '50%', background: m.color || '#333', color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'var(--disp)', fontWeight: 800, fontSize: 12, flex: '0 0 auto' }}>{m.initials}</div>
                   <div style={{ flex: 1, minWidth: 0 }}>
                     <div style={{ fontSize: 11, fontWeight: 800, color: 'var(--ink2)' }}>{m.author} · {timeStr}</div>
                     <div style={{ fontSize: 13.5, fontWeight: 500, lineHeight: 1.4, wordBreak: 'break-word', marginTop: 2 }}>{m.text}</div>
                   </div>
                   <button onClick={() => del(m.id)} className="wc-btn wc-btn--sm" style={{ padding: '5px 11px', background: '#fff', color: 'var(--red)', boxShadow: '0 3px 0 var(--shadow)', flexShrink: 0 }}>Delete</button>
                 </div>;
               })}
             </Ca>}
     </>
   );
}

/* ---- PIN gate --------------------------------------------------------------
    Soft gate in front of the clipboard. Not real auth — just stops a casual tap
    on a shared link from wiping the sweepstake. PIN comes from the tournament
    config (meta.adminPin); empty config means no gate. Unlock lasts the session. */
function AdminGate(props) {
   const PIN = (WCa.meta && WCa.meta.adminPin) || '';
   const [ok, setOk] = aState2(() => {
     if (!PIN) return true;
     try { return sessionStorage.getItem('wheesht_admin_ok') === '1'; } catch (e) { return false; }
   });
   const [entry, setEntry] = aState2('');
   const [bad, setBad] = aState2(false);

   if (ok) return <AdminPanel onClose={props.onClose} />;

   function submit() {
     if (entry === PIN) {
       try { sessionStorage.setItem('wheesht_admin_ok', '1'); } catch (e) {}
       setOk(true);
     } else { setBad(true); setEntry(''); }
   }

   return (
     <div className="moment" style={{ background: 'var(--bg)', alignItems: 'center', justifyContent: 'center', padding: '0 26px' }}>
       <button onClick={props.onClose} style={{ position: 'absolute', top: 16, right: 16, border: 'none', background: 'var(--ink)', color: '#fff', width: 34, height: 34, borderRadius: 10, fontSize: 18, fontWeight: 900, cursor: 'pointer' }}>✕</button>
       <div className={'rise' + (bad ? ' shake' : '')} style={{ width: '100%', maxWidth: 340, textAlign: 'center' }}>
         <Wa mood={bad ? 'shocked' : 'mischievous'} size={92} animate />
         <div className="dh" style={{ fontSize: 24, marginTop: 10 }}>Organiser only.</div>
         <div style={{ fontSize: 13.5, fontWeight: 600, color: 'var(--ink2)', marginTop: 6, lineHeight: 1.45 }}>
           {bad ? 'Wrong code. Wheesht is watching. Try again.' : "Enter the organiser code. Wheesht doesn't hand the clipboard to just anyone."}
         </div>
         <input
           autoFocus
           type="password"
           inputMode="numeric"
           value={entry}
           onChange={e => { setEntry(e.target.value); setBad(false); }}
           onKeyDown={e => { if (e.key === 'Enter') submit(); }}
           placeholder="Code"
           style={{ width: '100%', border: '2.5px solid var(--ink)', borderRadius: 14, padding: '13px 16px', fontFamily: 'var(--disp)', fontWeight: 800, fontSize: 22, textAlign: 'center', letterSpacing: '.1em', marginTop: 14, outline: 'none' }}
         />
         <button onClick={submit} disabled={!entry} className="wc-btn wc-btn--ink wc-btn--block" style={{ marginTop: 14, opacity: entry ? 1 : 0.4 }}>Unlock the clipboard</button>
       </div>
     </div>
   );
}

window.AdminPanel = AdminPanel;
window.AdminGate = AdminGate;

</script>

<script type="text/babel">
/* ===========================================================================
   CHAT — simple group message wall. Live only (requires WC_LIVE / server).
   Polls every 15 s; messages are appended locally on send for instant feel.
   =========================================================================== */
const WCch = window.WC;
const Sch = window.Store;
const Wch = window.Wheesht;
const { useState: cState, useEffect: cEffect, useRef: cRef } = React;

function ChatScreen() {
  const me = Sch.active();
  const [msgs, setMsgs] = cState([]);
  const [text, setText] = cState('');
  const [busy, setBusy] = cState(false);
  const [err, setErr] = cState(false);
  const listRef = cRef(null);
  const isLive = !!window.WC_LIVE;
  const leagueCode = Sch.leagueCode && Sch.leagueCode();

  function scrollBottom() {
    setTimeout(function() {
      if (listRef.current) listRef.current.scrollTop = listRef.current.scrollHeight;
    }, 60);
  }

  function load() {
    if (!leagueCode) {
      setMsgs([]);
      setErr(false);
      return;
    }
    fetch(Sch.api('/chat')).then(function(r) {
      return r.json().then(function(data) {
        if (!r.ok) throw new Error((data && data.detail) || 'Chat failed');
        return data;
      });
    }).then(function(data) {
      setMsgs(Array.isArray(data) ? data : []);
      setErr(false);
    }).catch(function() { setErr(true); });
  }

  cEffect(function() {
    if (!isLive || !leagueCode) return;
    load();
    scrollBottom();
    var iv = setInterval(load, 15000);
    return function() { clearInterval(iv); };
  }, [isLive, leagueCode]);

  cEffect(function() { scrollBottom(); }, [msgs.length]);

  function send() {
    if (!text.trim() || !me || busy || !leagueCode) return;
    setBusy(true);
    fetch(Sch.api('/chat'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ author_id: me.id, text: text.trim() }),
    }).then(function(r) {
      return r.json().then(function(msg) {
        if (!r.ok) throw new Error((msg && msg.detail) || 'Message failed');
        return msg;
      });
    }).then(function(msg) {
      if (msg && msg.id) setMsgs(function(prev) { return prev.concat([msg]); });
      setText('');
      setBusy(false);
      setErr(false);
    }).catch(function() { setBusy(false); setErr(true); });
  }

  if (!isLive) {
    return (
      <div style={{ padding: '48px 22px', textAlign: 'center' }}>
        <Wch mood="mischievous" size={88} animate />
        <div className="dh" style={{ fontSize: 22, marginTop: 12 }}>Group chat</div>
        <div style={{ fontSize: 13.5, fontWeight: 600, color: 'var(--ink2)', marginTop: 8, lineHeight: 1.5 }}>
          Chat only works when connected to the sweepstake server.<br />Open the shared link to join the conversation.
        </div>
      </div>
    );
  }

  if (!leagueCode) {
    return (
      <div style={{ padding: '48px 22px', textAlign: 'center' }}>
        <Wch mood="neutral" size={88} animate />
        <div className="dh" style={{ fontSize: 22, marginTop: 12 }}>Group chat</div>
        <div style={{ fontSize: 13.5, fontWeight: 600, color: 'var(--ink2)', marginTop: 8, lineHeight: 1.5 }}>
          Join or create a league to use chat.
        </div>
      </div>
    );
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: 'calc(100dvh - 146px - env(safe-area-inset-top, 0px))' }}>

      {/* message list */}
      <div ref={listRef} style={{ flex: 1, overflowY: 'auto', padding: '14px 14px 6px' }}>
        {msgs.length === 0 && !err && (
          <div style={{ textAlign: 'center', padding: '44px 0', color: 'var(--ink2)', fontSize: 13.5, fontWeight: 600 }}>
            <Wch mood="neutral" size={64} animate />
            <div style={{ marginTop: 8 }}>Nothing yet. Wheesht is listening.</div>
          </div>
        )}
        {err && (
          <button onClick={load} style={{ width: '100%', border: 'none', background: 'none', cursor: 'pointer', textAlign: 'center', padding: '32px 0', color: 'var(--ink2)', fontFamily: 'var(--body)', fontSize: 13, fontWeight: 700 }}>
            Couldn't load messages — tap to retry.
          </button>
        )}
        {msgs.map(function(msg) {
          var isMe = me && msg.author_id === me.id;
          var isWheesht = msg.author_id === 'wheesht';
          var t = WCch.TEAMS[msg.team];
          var d = new Date(msg.ts);
          var timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');

          if (isWheesht) {
            var mood = msg.team || 'confident'; // team field carries the mood for system messages
            return (
              <div key={msg.id} style={{ display: 'flex', gap: 11, marginBottom: 16, alignItems: 'flex-start', background: 'var(--ink)', borderRadius: 18, padding: '12px 14px' }}>
                <div style={{ flexShrink: 0 }}>
                  <Wch mood={mood} size={42} animate />
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: '.08em', textTransform: 'uppercase', color: 'var(--yellow)', marginBottom: 4 }}>Wheesht · announcement</div>
                  <div style={{ fontSize: 13.5, fontWeight: 600, color: '#fff', lineHeight: 1.42, wordBreak: 'break-word' }}>{msg.text}</div>
                  <div style={{ fontSize: 10, color: 'rgba(255,255,255,.4)', fontWeight: 600, marginTop: 4 }}>{timeStr}</div>
                </div>
              </div>
            );
          }

          return (
            <div key={msg.id} style={{ display: 'flex', gap: 9, marginBottom: 14, flexDirection: isMe ? 'row-reverse' : 'row', alignItems: 'flex-end' }}>
              {!isMe && (
                <div style={{ width: 34, height: 34, borderRadius: '50%', background: msg.color || '#333', color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'var(--disp)', fontWeight: 800, fontSize: 12, flexShrink: 0, boxShadow: '0 2px 0 rgba(0,0,0,.15)' }}>
                  {msg.initials || '?'}
                </div>
              )}
              <div style={{ maxWidth: '74%' }}>
                {!isMe && (
                  <div style={{ fontSize: 10.5, fontWeight: 800, color: 'var(--ink2)', marginBottom: 4, letterSpacing: '.01em' }}>
                    {msg.author}{t ? (' ' + t.flag) : ''}
                  </div>
                )}
                <div style={{
                  background: isMe ? 'var(--ink)' : '#fff',
                  color: isMe ? '#fff' : 'var(--ink)',
                  border: isMe ? 'none' : '2px solid var(--line)',
                  borderRadius: isMe ? '18px 18px 5px 18px' : '18px 18px 18px 5px',
                  padding: '10px 13px',
                  fontSize: 14, fontWeight: 500, lineHeight: 1.42,
                  wordBreak: 'break-word',
                }}>
                  {msg.text}
                </div>
                <div style={{ fontSize: 10, color: 'var(--ink2)', fontWeight: 600, marginTop: 3, textAlign: isMe ? 'right' : 'left', paddingLeft: isMe ? 0 : 2 }}>
                  {timeStr}
                </div>
              </div>
            </div>
          );
        })}
      </div>

      {/* input bar */}
      {me ? (
        <div style={{ display: 'flex', gap: 9, padding: '9px 12px 12px', borderTop: '1.5px solid var(--line)', background: 'var(--bg)', flexShrink: 0 }}>
          <input
            style={{ flex: 1, border: '2.5px solid var(--ink)', borderRadius: 22, padding: '10px 14px', fontFamily: 'var(--body)', fontSize: 14, fontWeight: 500, background: '#fff', outline: 'none', color: 'var(--ink)' }}
            value={text}
            onChange={function(e) { setText(e.target.value); }}
            onKeyDown={function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
            placeholder="Say something…"
            maxLength={280}
          />
          <button
            onClick={send}
            disabled={!text.trim() || busy}
            style={{ background: 'var(--ink)', color: '#fff', border: 'none', borderRadius: 22, padding: '10px 16px', fontFamily: 'var(--disp)', fontWeight: 800, fontSize: 14, cursor: text.trim() && !busy ? 'pointer' : 'default', opacity: text.trim() && !busy ? 1 : 0.35, flexShrink: 0, boxShadow: '0 4px 0 rgba(0,0,0,.35)' }}
          >
            Send
          </button>
        </div>
      ) : (
        <div style={{ padding: '12px 16px', textAlign: 'center', fontSize: 13, color: 'var(--ink2)', fontWeight: 600, borderTop: '1.5px solid var(--line)' }}>
          Pick who you are to join the chat.
        </div>
      )}
    </div>
  );
}

window.ChatScreen = ChatScreen;

</script>

<script type="text/babel">
/* ===========================================================================
   DEV CONSOLE — hidden cross-league admin.

   Reached by a secret gesture (tap the top-bar mascot seven times). Verifies a
   master developer key SERVER-side (never shipped to the browser), then lists
   every league so the developer can drop into any one and open its organiser
   clipboard. Choosing a league switches the active league and opens AdminGate;
   the caller restores the previous league when the clipboard closes.
   =========================================================================== */
const Wdev = window.Wheesht;
const Sdev = window.Store;
const { useState: devState } = React;

function DevConsole(props) {
  const [step, setStep] = devState('auth');     // auth | list
  const [key, setKey] = devState('');
  const [leagues, setLeagues] = devState([]);
  const [q, setQ] = devState('');
  const [busy, setBusy] = devState(false);
  const [err, setErr] = devState(false);

  function authenticate() {
    if (!key.trim() || busy) return;
    setBusy(true); setErr(false);
    Sdev.devListLeagues(key.trim()).then(function (j) {
      setLeagues((j && j.leagues) || []);
      setStep('list');
      setBusy(false);
    }).catch(function () { setErr(true); setBusy(false); setKey(''); });
  }

  const fld = {
    width: '100%', border: '2.5px solid var(--ink)', borderRadius: 14, padding: '13px 16px',
    fontFamily: 'var(--disp)', fontWeight: 800, fontSize: 20, textAlign: 'center',
    letterSpacing: '.06em', marginTop: 14, outline: 'none', background: '#fff',
  };

  const close = (
    <button onClick={props.onClose} style={{ position: 'absolute', top: 16, right: 16, border: 'none', background: 'var(--ink)', color: '#fff', width: 34, height: 34, borderRadius: 10, fontSize: 18, fontWeight: 900, cursor: 'pointer', zIndex: 2 }}>✕</button>
  );

  if (step === 'auth') {
    return (
      <div className="moment ink" style={{ alignItems: 'center', justifyContent: 'center', padding: '0 26px' }}>
        {close}
        <div className={'rise' + (err ? ' shake' : '')} style={{ width: '100%', maxWidth: 340, textAlign: 'center' }}>
          <Wdev mood={err ? 'shocked' : 'mischievous'} size={92} animate />
          <div className="dh" style={{ fontSize: 24, marginTop: 10, color: '#fff' }}>Developer console</div>
          <div style={{ fontSize: 13.5, fontWeight: 600, color: '#b8af9e', marginTop: 6, lineHeight: 1.45 }}>
            {err ? 'Wrong key. Wheesht guards the master clipboard closely.' : 'The master key. This opens every league on the server.'}
          </div>
          <input
            autoFocus type="password" value={key}
            onChange={function (e) { setKey(e.target.value); setErr(false); }}
            onKeyDown={function (e) { if (e.key === 'Enter') authenticate(); }}
            placeholder="Master key" style={fld}
          />
          <button onClick={authenticate} disabled={!key.trim() || busy} className="wc-btn wc-btn--primary wc-btn--block" style={{ marginTop: 14, opacity: key.trim() && !busy ? 1 : 0.4 }}>
            {busy ? 'Checking…' : 'Unlock every league'}
          </button>
        </div>
      </div>
    );
  }

  const term = q.trim().toLowerCase();
  const shown = term
    ? leagues.filter(function (L) { return (L.name || '').toLowerCase().indexOf(term) >= 0 || (L.code || '').toLowerCase().indexOf(term) >= 0; })
    : leagues;

  return (
    <div className="moment" style={{ background: 'var(--bg)' }}>
      <div style={{ position: 'sticky', top: 0, zIndex: 5, background: 'var(--ink)', color: '#fff', padding: '16px 18px 12px', display: 'flex', alignItems: 'center', gap: 11 }}>
        <Wdev mood="confident" size={44} />
        <div style={{ flex: 1, minWidth: 0 }}>
          <div className="dh" style={{ fontSize: 20, color: '#fff', lineHeight: 1 }}>Developer console</div>
          <div style={{ fontSize: 11.5, fontWeight: 700, color: 'var(--yellow)' }}>{leagues.length} league{leagues.length === 1 ? '' : 's'} on the server</div>
        </div>
        <button onClick={props.onClose} style={{ border: 'none', background: 'rgba(255,255,255,.16)', color: '#fff', width: 34, height: 34, borderRadius: 10, fontSize: 18, fontWeight: 900, cursor: 'pointer' }}>✕</button>
      </div>

      <div className="mscroll" style={{ padding: '14px 18px 30px' }}>
        <input
          value={q} onChange={function (e) { setQ(e.target.value); }}
          placeholder="Search by name or code…"
          style={{ width: '100%', border: '2px solid var(--line)', borderRadius: 12, padding: '11px 14px', fontFamily: 'var(--body)', fontWeight: 600, fontSize: 14, background: '#fff', outline: 'none', marginBottom: 14 }}
        />

        {shown.length === 0 && (
          <div style={{ textAlign: 'center', padding: '40px 0', color: 'var(--ink2)', fontWeight: 600, fontSize: 13.5 }}>
            <Wdev mood="neutral" size={56} animate />
            <div style={{ marginTop: 8 }}>No leagues match.</div>
          </div>
        )}

        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          {shown.map(function (L) {
            return (
              <div key={L.code} className="tap" style={{ display: 'flex', alignItems: 'center', gap: 11, background: '#fff', border: '2.5px solid var(--ink)', borderRadius: 16, padding: '12px 13px', boxShadow: '0 4px 0 var(--shadow)' }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div className="dh" style={{ fontSize: 17, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{L.name}</div>
                  <div style={{ display: 'flex', gap: 6, marginTop: 6, flexWrap: 'wrap', alignItems: 'center' }}>
                    <span className="wc-chip" style={{ fontSize: 11 }}>{L.code}</span>
                    <span style={{ fontSize: 11.5, fontWeight: 700, color: 'var(--ink2)' }}>{L.entrants} entrant{L.entrants === 1 ? '' : 's'}</span>
                    {L.seeded && <span className="wc-chip wc-chip--yellow" style={{ fontSize: 10.5 }}>seeded</span>}
                  </div>
                </div>
                <button onClick={function () { props.onAdmin(L); }} className="wc-btn wc-btn--sm wc-btn--ink" style={{ flex: '0 0 auto' }}>Administer →</button>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

window.DevConsole = DevConsole;

</script>

<script type="text/babel">
/* ===========================================================================
   APP SHELL — identity gate · onboarding flow · tab nav · account switcher ·
   admin tweaks.
   =========================================================================== */
const A_WC = window.WC;
const A_W = window.Wheesht;
const A_S = window.Store;
const { useState: aState, useEffect: aEffect } = React;

/* ---- Easter eggs (tap the league title 5× for egg 1; tap rank badge 3× for egg 2) --- */
const EGG_LINES = [
  'Persistent. Wheesht respects that. Grudgingly.',
  'A hidden feature, not a bug. Wheesht planned this all along.',
  'Five taps. Impressive commitment. There is no prize. Wheesht is working on it.',
  'You found it. Well done. Wheesht is neither confirming nor denying there are others.',
];
window.__wheeshtEgg = function(){
  try{ window.wcConfetti && window.wcConfetti({ y:.32, count:90 }); }catch(e){}
  try{ window.wcToast && window.wcToast(EGG_LINES[(Math.random()*EGG_LINES.length)|0], 'mischievous'); }catch(e){}
};

const EGG2_LINES = [
  'Ranking noted. The pot does not care. Wheesht does, slightly.',
  'You tapped the rank. Wheesht was watching. Wheesht is always watching.',
  'Three taps on the rank badge and Wheesht appears. Almost as if planned.',
  'Position logged. Wheesht neither confirms nor denies this changes anything.',
];
window.__wheeshtEgg2 = function(){
  try{ window.wcConfetti && window.wcConfetti({ y:.5, count:55, colors:['#F5C800','#E8272A','#fff','#1A1A1A'] }); }catch(e){}
  try{ window.wcToast && window.wcToast(EGG2_LINES[(Math.random()*EGG2_LINES.length)|0], 'confident'); }catch(e){}
};

/* ---- tab icons ---- */
function Icon(props){
  const sw=2.4;
  const common={fill:'none',stroke:'currentColor',strokeWidth:sw,strokeLinecap:'round',strokeLinejoin:'round'};
  if(props.name==='games') return <svg width="26" height="26" viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="15" rx="2.5" {...common}/><line x1="4" y1="9" x2="20" y2="9" {...common}/><line x1="8" y1="3" x2="8" y2="6" {...common}/><line x1="16" y1="3" x2="16" y2="6" {...common}/></svg>;
  if(props.name==='me') return <svg width="26" height="26" viewBox="0 0 24 24"><circle cx="12" cy="8.5" r="3.6" {...common}/><path d="M5 19.5c0-3.6 3.1-5.5 7-5.5s7 1.9 7 5.5" {...common}/></svg>;
  if(props.name==='players') return <svg width="26" height="26" viewBox="0 0 24 24"><circle cx="8.5" cy="9" r="2.8" {...common}/><circle cx="16" cy="9.5" r="2.3" {...common}/><path d="M3.5 18c0-2.8 2.2-4.3 5-4.3s5 1.5 5 4.3M14 17.6c0-2 .9-3.4 3.4-3.4 2 0 3.1 1.2 3.1 3" {...common}/></svg>;
  if(props.name==='predictions') return <svg width="26" height="26" viewBox="0 0 24 24"><path d="M12 3.5l2.4 4.9 5.4.8-3.9 3.8.9 5.4-4.8-2.5-4.8 2.5.9-5.4L4.2 9.2l5.4-.8z" {...common}/></svg>;
  if(props.name==='chat') return <svg width="26" height="26" viewBox="0 0 24 24"><path d="M4 4h16a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H8l-4 4V6a2 2 0 0 1 2-2z" {...common}/></svg>;
  if(props.name==='summary') return <svg width="26" height="26" viewBox="0 0 24 24"><path d="M5.5 3h13l-1.5 8a5 5 0 0 1-10 0zM5.5 5.5H3a1.5 1.5 0 0 0 0 3h2.5M18.5 5.5H21a1.5 1.5 0 0 0 0 3h-2.5M12 11v6M9 21h6" {...common}/></svg>;
  return <svg width="26" height="26" viewBox="0 0 24 24"><rect x="5" y="3.5" width="14" height="17" rx="2.5" {...common}/><line x1="8.5" y1="8" x2="15.5" y2="8" {...common}/><line x1="8.5" y1="12" x2="15.5" y2="12" {...common}/><line x1="8.5" y1="16" x2="13" y2="16" {...common}/></svg>;
}

function StatusBar(){
  const [time, setTime] = React.useState(()=>{const d=new Date();return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');});
  React.useEffect(()=>{const iv=setInterval(()=>{const d=new Date();setTime(d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'));},10000);return()=>clearInterval(iv);},[]);
  return <div className="statusbar">
    <span>{time}</span>
    <span className="dots">
      <svg width="18" height="12" viewBox="0 0 18 12"><g fill="var(--ink)"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="5" y="5" width="3" height="7" rx="1"/><rect x="10" y="2.5" width="3" height="9.5" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></g></svg>
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none" stroke="var(--ink)" strokeWidth="1.6"><path d="M1 4.2C3.2 2 6 1 8.5 1S13.8 2 16 4.2M3.4 6.6C4.9 5.2 6.7 4.6 8.5 4.6s3.6.6 5.1 2M5.8 9c.8-.7 1.7-1 2.7-1s1.9.3 2.7 1"/></svg>
      <span className="bat"><i></i></span>
    </span>
  </div>;
}

function AppBar(props){
  const me = props.me;
  const ref = React.useRef(null);
  const taps = React.useRef({n:0,t:0});
  const eggTaps = React.useRef({n:0,t:0});
  React.useEffect(()=>{
    const bar = ref.current; if(!bar) return;
    const sc = bar.closest('.scroll'); if(!sc) return;
    const onScroll = ()=>{ bar.classList.toggle('is-stuck', sc.scrollTop>4); };
    onScroll();
    sc.addEventListener('scroll', onScroll, {passive:true});
    return ()=> sc.removeEventListener('scroll', onScroll);
  },[]);
  // Secret gesture: tap the mascot 7 times within ~2.5s to open the dev console.
  function secretTap(){
    const now = Date.now();
    taps.current.n = (now - taps.current.t < 2500) ? taps.current.n + 1 : 1;
    taps.current.t = now;
    if(taps.current.n >= 7){ taps.current.n = 0; props.onDev && props.onDev(); }
  }
  // Easter egg: tap the league title 5 times within ~1.8s.
  function eggTap(){
    const now = Date.now();
    eggTaps.current.n = (now - eggTaps.current.t < 1800) ? eggTaps.current.n + 1 : 1;
    eggTaps.current.t = now;
    if(eggTaps.current.n >= 5){ eggTaps.current.n = 0; window.__wheeshtEgg && window.__wheeshtEgg(); }
  }
  return <div className="appbar" ref={ref}>
    <div className="mk" onClick={secretTap} style={{cursor:'default'}}><A_W mood="confident" size={42}/></div>
    <div style={{flex:1,minWidth:0}}>
      <h1 onClick={eggTap} style={{cursor:'default'}}>{(A_WC.league&&A_WC.league.name)||A_WC.meta.name}</h1>
      <p>{A_WC.meta.season} · {A_WC.meta.stageLabel}</p>
    </div>
    {me && <button onClick={props.onAccount} style={{border:'none',background:'none',cursor:'pointer',padding:0,marginLeft:2}}>
      <window.Avatar person={Object.assign({},me,{isYou:false})} size={40}/>
    </button>}
  </div>;
}

function TabBar(props){
  const tabs=[['me','You'],['games','Games'],['players','Players'],['predictions','Predict'],['chat','Chat'],['summary','Verdict']];
  return <div className="tabbar tabbar--6">
    {tabs.map(([k,lab])=>(
      <button key={k} className={props.tab===k?'on':''} onClick={()=>props.setTab(k)}>
        <span className="ic"><Icon name={k}/></span>
        {lab}
        {k==='predictions' && props.tab!=='predictions' && <span className="tabdot"/>}
      </button>
    ))}
  </div>;
}

/* ---- account switcher sheet ---- */
function AccountSheet(props){
  const accounts = A_S.deviceAccounts();
  const activeId = A_S.activeId();
  const includeDept = A_S.includeDepartment ? A_S.includeDepartment() : true;
  return <div style={{position:'absolute',inset:0,zIndex:70,display:'flex',flexDirection:'column',justifyContent:'flex-end'}}>
    <div onClick={props.onClose} style={{position:'absolute',inset:0,background:'rgba(26,26,26,.45)'}}/>
    <div className="rise" style={{position:'relative',background:'var(--bg)',borderRadius:'26px 26px 0 0',padding:'18px 18px 26px',boxShadow:'0 -20px 50px rgba(0,0,0,.3)'}}>
      <div style={{width:44,height:5,borderRadius:3,background:'var(--line)',margin:'0 auto 14px'}}/>
      <div className="dh" style={{fontSize:22,marginBottom:3}}>Switch account</div>
      <div style={{fontSize:12.5,fontWeight:600,color:'var(--ink2)',marginBottom:13}}>Everyone on this device. No passwords — just tap who you are.</div>
      <div style={{display:'flex',flexDirection:'column',gap:9,maxHeight:280,overflowY:'auto'}}>
        {accounts.map(p=>{
          const t=A_WC.TEAMS[p.team]; const on=p.id===activeId;
          return <div key={p.id} style={{display:'flex',alignItems:'center',gap:11,background:on?'var(--yellow)':'#fff',border:'2.5px solid var(--ink)',borderRadius:16,padding:'10px 12px',boxShadow:on?'0 4px 0 var(--ink)':'0 4px 0 var(--shadow)'}}>
            <button onClick={()=>{A_S.setActive(p.id);props.onClose();}} style={{display:'flex',alignItems:'center',gap:11,flex:1,minWidth:0,background:'none',border:'none',cursor:'pointer',textAlign:'left',padding:0}}>
              <window.Avatar person={Object.assign({},p,{isYou:false})} size={40}/>
              <div style={{flex:1,minWidth:0}}>
                <div className="dh" style={{fontSize:16}}>{p.name}{on&&' ·'} {on&&<span style={{fontSize:11,color:'var(--ink2)'}}>active</span>}</div>
                <div style={{fontSize:11.5,fontWeight:700,color:'var(--ink2)'}}>{p.location}{includeDept && p.department?' · '+p.department:''}</div>
              </div>
              {t&&<window.Flag team={t} size={24}/>}
            </button>
            <button onClick={()=>A_S.signOutDevice(p.id)} title="Remove from device" style={{border:'none',background:'none',cursor:'pointer',color:'var(--ink2)',fontSize:18,fontWeight:900,padding:'0 2px'}}>×</button>
          </div>;
        })}
      </div>
      <div style={{marginTop:14,display:'flex',gap:9}}>
        <button onClick={props.onAdd} className="wc-btn wc-btn--sm" style={{flex:1,boxShadow:'0 4px 0 var(--shadow)'}}>+ Add someone</button>
        <button onClick={props.onFind} className="wc-btn wc-btn--sm" style={{flex:1,boxShadow:'0 4px 0 var(--shadow)'}}>Find my entry</button>
      </div>
      <button onClick={props.onSwitch} className="wc-btn wc-btn--sm wc-btn--block" style={{marginTop:9,boxShadow:'0 4px 0 var(--shadow)'}}>Join / switch league →</button>
      <button onClick={props.onAdmin} style={{width:'100%',marginTop:11,border:'none',background:'none',cursor:'pointer',fontSize:12.5,fontWeight:800,color:'var(--ink2)',padding:'6px 0',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><circle cx="12" cy="12" r="3.2"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/></svg>
        Organiser tools
      </button>
    </div>
  </div>;
}

const TW_DEFAULTS = /*EDITMODE-BEGIN*/{
  "celebration": 8,
  "accent": "#E8272A",
  "bias": true,
  "texture": true,
  "locked": false
}/*EDITMODE-END*/;

function App(){
  const me = A_S.active();
  const [tab,setTab]=aState('me');
  const [flow,setFlow]=aState(me?'app':'gate'); // gate | find | form | app
  const [draw,setDraw]=aState(null);            // {forceTeam, replay}
  const [account,setAccount]=aState(false);
  const [admin,setAdmin]=aState(false);
  const [dev,setDev]=aState(false);             // hidden dev console overlay
  const devReturn=React.useRef(undefined);      // league to restore after dev admin
  const [organiser,setOrganiser]=aState(false); // true while creating a league
  const [,tick]=aState(0);
  const [t,setTweak]=window.useTweaks(TW_DEFAULTS);

  // re-render on any store change
  aEffect(()=>A_S.subscribe(()=>tick(x=>x+1)),[]);
  aEffect(()=>{ A_S.refresh && A_S.refresh(); },[]);

  // tweaks → DOM
  aEffect(()=>{ document.documentElement.style.setProperty('--red', t.accent); },[t.accent]);
  aEffect(()=>{ window.__celMul=(t.celebration||0)/8; },[t.celebration]);
  aEffect(()=>{ const s=document.getElementById('root'); if(s) s.classList.toggle('tex',!!t.texture); },[t.texture]);
  aEffect(()=>{ A_WC.meta.predictionsLocked=!!t.locked; },[t.locked]);

  // landing flourish
  aEffect(()=>{
    if(flow!=='app'||!me) return;
    const pre = A_WC.meta.phase === 'pre';
    const myTeam = A_WC.TEAMS[me.team];
    const id=setTimeout(()=>{
      if(pre){
        const pool=[
          ['Predictions are open till kick-off. Get them in — Wheesht is taking names.','mischievous'],
          ['Your picks won\'t make themselves. Wheesht is waiting.','nervous'],
          ['Markets are open. Back your instincts. Wheesht backs nothing — but watches everything.','confident'],
          ['Get your predictions in before the first whistle. No extensions.','angry'],
          ['Wheesht has opinions on every market. Wheesht is keeping them to itself.','mischievous'],
        ];
        const pick=pool[(Math.random()*pool.length)|0];
        window.wcToast&&window.wcToast(pick[0],pick[1]);
      } else if(!myTeam||!myTeam.alive){
        window.wcToast&&window.wcToast(A_WC.LINES.eliminated,'crying');
      } else {
        const pool=[
          ['Your team is still in it. Wheesht is watching — with moderate approval.','confident'],
          ['Still standing. Wheesht has noted this. Nothing more to add.','neutral'],
          ['Your team is in the mix. Wheesht is cautiously optimistic. Very cautiously.','nervous'],
          ['In the running. The pot is watching too. Wheesht is taking no questions.','mischievous'],
          [myTeam.name+' are alive. Wheesht acknowledges this. Barely.','happy'],
        ];
        const pick=pool[(Math.random()*pool.length)|0];
        window.wcToast&&window.wcToast(pick[0],pick[1]);
      }
      if(t.bias){
        const scotMsgs=[
          ['Scotland are in this tournament. Just so everyone is clear.','scottish'],
          ['Scotland. Still here. Wheesht is cautiously optimistic — emphasis on cautious.','nervous'],
          ['A gentle reminder that Scotland are participating. Wheesht thought you should know.','scottish'],
          ['Scotland update: still in it. Wheesht is fine. Everything is fine.','confident'],
          ['No one asked. Wheesht is mentioning Scotland anyway.','mischievous'],
        ];
        const sp=scotMsgs[(Math.random()*scotMsgs.length)|0];
        setTimeout(()=>window.wcToast&&window.wcToast(sp[0],sp[1]),1600);
      }
    },650);
    return ()=>clearTimeout(id);
  },[flow,me&&me.id]); // eslint-disable-line

  function onboardSubmit(profile){
    const p=A_S.create(profile,{organiser:organiser});
    setOrganiser(false);
    A_S.refresh&&A_S.refresh();
    setDraw({participant:p}); setFlow('app');
  }
  function resumeAccount(id){
    Promise.resolve(A_S.resumeAccount?A_S.resumeAccount(id):A_S.setActive(id)).then(()=>{ setFlow('app'); setTab('me'); });
  }

  // Dev console picked a league to administer: remember where we were, switch
  // into it (no password), unlock the clipboard, open admin.
  function devAdmin(league){
    devReturn.current = A_S.activeLeague() || null;
    try{ sessionStorage.setItem('wheesht_admin_ok','1'); }catch(e){}
    Promise.resolve(A_S.devEnterLeague(league)).then(()=>{ setDev(false); setAdmin(true); });
  }
  // Closing the clipboard: if we got here via the dev console, hop back to the
  // league we came from so the normal app view is unaffected.
  function closeAdmin(){
    setAdmin(false);
    if(devReturn.current!==undefined){
      const back=devReturn.current; devReturn.current=undefined;
      A_S.devEnterLeague(back);
    }
  }

  function claimOI(id){
    A_S.claimOI(id);
    A_S.refresh&&A_S.refresh();
    const p=A_S.getSync(id);
    const t=p&&A_WC.TEAMS[p.team];
    setFlow('app');
    setTimeout(()=>window.wcToast&&window.wcToast('Welcome, '+(p?p.name:'')+'! Your team is '+((t&&t.flag)||'')+' '+(t?t.name:'')+'.',  'confident'),400);
  }

  // -------- onboarding / identity flow --------
  if(flow==='gate') return <React.Fragment>
    <window.AccountGate onResume={resumeAccount} onJoin={()=>{setOrganiser(false);setFlow('join');}} onCreate={()=>{setOrganiser(true);setFlow('create');}}/>
    <window.ToastLayer/><window.ConfettiLayer/>
  </React.Fragment>;
  if(flow==='join') return <React.Fragment>
    <window.JoinLeague onBack={()=>setFlow('gate')} onCreate={()=>{setOrganiser(true);setFlow('create');}}
      onJoined={(league)=>{ setOrganiser(false); setFlow(league&&league.seeded?'oi-roster':'find'); }}/>
    <window.ToastLayer/><window.ConfettiLayer/>
  </React.Fragment>;
  if(flow==='create') return <React.Fragment>
    <window.CreateLeague onBack={()=>setFlow('gate')} onCreated={()=>{ setOrganiser(true); setFlow('form'); }}/>
    <window.ToastLayer/><window.ConfettiLayer/>
  </React.Fragment>;
  if(flow==='find') return <React.Fragment>
    <window.FindMyEntry onBack={()=>setFlow('gate')} onPicked={claimOI} onNew={()=>setFlow('form')}/>
    <window.ToastLayer/><window.ConfettiLayer/>
  </React.Fragment>;
  if(flow==='form') return <React.Fragment>
    <window.OnboardingForm onBack={()=>setFlow(me?'app':'gate')} onSubmit={onboardSubmit}/>
    <window.ToastLayer/><window.ConfettiLayer/>
  </React.Fragment>;
  if(flow==='oi-roster') return <React.Fragment>
    <window.OIRosterPicker onBack={()=>setFlow('join')} onClaim={claimOI}/>
    <window.ToastLayer/><window.ConfettiLayer/>
  </React.Fragment>;

  // -------- main app --------
  const screens={
    me:<window.MeScreen goPredictions={()=>setTab('predictions')} goGames={()=>setTab('games')}/>,
    games:<window.GamesScreen/>,
    players:<window.TrackerScreen/>,
    predictions:<window.PredictionsScreen/>,
    chat:<window.ChatScreen/>,
    summary:<window.SummaryScreen/>,
  };

  return <React.Fragment>
    <StatusBar/>
    <div className="scroll" key={tab+(me?me.id:'')}>
      <AppBar me={me} onAccount={()=>setAccount(true)} onDev={()=>setDev(true)}/>
      {/* When the dev console hops into another league, the active participant
          isn't a member there, so `me` is null — render nothing behind the
          full-screen admin overlay rather than letting a screen read me.team. */}
      {me ? screens[tab] : null}
    </div>
    <TabBar tab={tab} setTab={setTab}/>

    {account && <AccountSheet onClose={()=>setAccount(false)}
      onAdd={()=>{setAccount(false);setFlow('form');}}
      onFind={()=>{setAccount(false);setFlow('find');}}
      onSwitch={()=>{setAccount(false);setFlow('gate');}}
      onAdmin={()=>{setAccount(false);setAdmin(true);}}/>}

    {draw && <window.DrawMoment participant={draw.participant} forceTeam={draw.forceTeam}
      onDone={()=>{ const wasReplay=draw.replay; setDraw(null); if(!wasReplay){ setTab('me'); setTimeout(()=>window.wcConfetti&&window.wcConfetti({y:.4}),200);} }}/>}
    {admin && <window.AdminGate onClose={closeAdmin}/>}
    {dev && <window.DevConsole onClose={()=>setDev(false)} onAdmin={devAdmin}/>}

    <window.ToastLayer/>
    <window.ConfettiLayer/>

    <window.TweaksPanel title="Tweaks">
      <window.TweakSection label="Atmosphere"/>
      <window.TweakSlider label="Celebration" value={t.celebration} min={0} max={10} step={1} onChange={v=>setTweak('celebration',v)}/>
      <window.TweakToggle label="Wheesht's Scottish bias" value={t.bias} onChange={v=>setTweak('bias',v)}/>
      <window.TweakToggle label="Match-programme texture" value={t.texture} onChange={v=>setTweak('texture',v)}/>
      <window.TweakSection label="Admin"/>
      <div style={{padding:'4px 14px 8px'}}>
        <button onClick={()=>setAdmin(true)} style={{width:'100%',border:'none',borderRadius:11,background:'var(--ink)',color:'#fff',fontFamily:'var(--disp)',fontWeight:800,fontSize:13.5,padding:'12px',cursor:'pointer',boxShadow:'0 4px 0 #000'}}>Open Wheesht's clipboard →</button>
        <div style={{fontSize:11,fontWeight:600,color:'var(--ink2)',marginTop:6,lineHeight:1.35}}>Set results, knock teams out, grade predictions.</div>
      </div>
      <window.TweakToggle label="Lock predictions" value={t.locked} onChange={v=>setTweak('locked',v)}/>
      <window.TweakColor label="Alert accent" value={t.accent} options={['#E8272A','#9E1B32','#E07A1A']} onChange={v=>setTweak('accent',v)}/>
      <div style={{padding:'10px 14px'}}>
        <button onClick={()=>{ if(me){A_S.signOutDevice(me.id);} setFlow(A_S.active()?'app':'gate'); }} style={{width:'100%',border:'2px solid var(--ink)',borderRadius:11,background:'#fff',fontFamily:'var(--disp)',fontWeight:700,fontSize:13,padding:'9px',cursor:'pointer'}}>Sign out of this device</button>
      </div>
    </window.TweaksPanel>
  </React.Fragment>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>

<script type="text/babel">
/* ===========================================================================
   DESKTOP STAGE — live side panels beside the device.

   Runs only on wide screens (the phone view ignores all of this). It:
     • mounts two live React panels beside the device (pot/standings + the
       prediction league leaderboard),
     • wires a persisted on/off toggle for the ambient backdrop motion.
   =========================================================================== */
(function () {
  if (typeof window === 'undefined') return;
  var DESKTOP = window.matchMedia && window.matchMedia('(min-width:561px)').matches;
  if (!DESKTOP) return;                       // phones stay clean

  var WCs = window.WC || {};
  var Ss = window.Store;
  var R = window.React;
  var RD = window.ReactDOM;
  if (!R || !RD) return;

  var h = R.createElement;

  /* ---- motion toggle (persisted) ---------------------------------------- */
  var MK = 'wheesht_motion_v1';
  function motionOn() { try { return localStorage.getItem(MK) !== 'off'; } catch (e) { return true; } }
  function applyMotion() { document.body.classList.toggle('motion-off', !motionOn()); }
  applyMotion();

  /* ---- toggle button ---------------------------------------------------- */
  var btn = document.getElementById('stage-toggle');
  if (btn) {
    function label() { return (motionOn() ? '⚽  Animation on' : '⚽  Animation off'); }
    btn.textContent = label();
    btn.addEventListener('click', function () {
      try { localStorage.setItem(MK, motionOn() ? 'off' : 'on'); } catch (e) {}
      applyMotion();
      btn.textContent = label();
    });
  }

  /* ---- live panels ------------------------------------------------------ */
  function money(n) { return '£' + (n || 0).toLocaleString('en-GB'); }

  function Stat(props) {
    return h('div', { className: 'sp-stat' },
      h('span', { className: 'sp-stat__n' }, props.value),
      h('span', { className: 'sp-stat__l' }, props.label));
  }

  function LeftPanel() {
    var meta = (window.WC && window.WC.meta) || {};
    var pot = (window.WC && window.WC.POT) || 0;
    return h('div', { className: 'sp' },
      h('div', { className: 'sp-kicker' }, 'The Office Sweepstake'),
      h('div', { className: 'sp-title' }, 'World Cup 2026'),
      h('div', { className: 'sp-pot' }, money(pot)),
      h('div', { className: 'sp-pot__l' }, 'in the pot'),
      h('div', { className: 'sp-stats' },
        h(Stat, { value: meta.stillIn != null ? meta.stillIn : '—', label: 'still in' }),
        h(Stat, { value: meta.out != null ? meta.out : '—', label: 'out' }),
        h(Stat, { value: meta.teamsLeft != null ? meta.teamsLeft : '—', label: 'teams left' })));
  }

  function RightPanel() {
    var rows = (Ss && Ss.rankedByPred) ? Ss.rankedByPred().slice(0, 5) : [];
    return h('div', { className: 'sp sp--r' },
      h('div', { className: 'sp-kicker' }, 'On the record'),
      h('div', { className: 'sp-title' }, 'Prediction league'),
      h('div', { className: 'sp-lb' },
        rows.length === 0
          ? h('div', { className: 'sp-empty' }, 'No predictions banked yet.')
          : rows.map(function (p, i) {
              return h('div', { className: 'sp-row', key: p.id || i },
                h('span', { className: 'sp-rank' }, i + 1),
                h('span', { className: 'sp-av', style: { background: p.color || '#333' } }, p.initials || '?'),
                h('span', { className: 'sp-name' }, p.name),
                h('span', { className: 'sp-pts' }, (p.predScore || 0) + ' pts'));
            })));
  }

  function mount(id, Comp) {
    var el = document.getElementById(id);
    if (!el) return null;
    var root = RD.createRoot(el);
    root.render(h(Comp));
    return root;
  }

  var leftRoot = mount('stage-left', LeftPanel);
  var rightRoot = mount('stage-right', RightPanel);

  // Re-render panels when the store changes (picks, sign-ups, sync).
  if (Ss && Ss.subscribe) {
    Ss.subscribe(function () {
      if (leftRoot) leftRoot.render(h(LeftPanel));
      if (rightRoot) rightRoot.render(h(RightPanel));
    });
  }
})();

</script>
</body>
</html>
