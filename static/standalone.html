          <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--ink2)', marginTop: 3 }}>No fixtures match that filter yet.</div>
        </Cg>}

      {byDate.map((day, i) => (
        <div key={i}>
          <SHg aside={day.items.length + ' ' + (day.items.length === 1 ? 'game' : 'games')}>{day.label}</SHg>
          {day.items.map(f => <FixtureRow key={f.id} f={f} owned={owned} mineTeam={mineTeam} />)}
        </div>
      ))}
    </div>
  );
}

window.GamesScreen = GamesScreen;

</script>

<script type="text/babel">
/* ===========================================================================
   MATCH CENTRE — fixtures as a live, personal, 10-second read.

   Every fixture is shown with its status (upcoming / live / half-time / finished), a live
   indicator + ticking kick-off countdown, the current score, the user's stake
   (their drawn team + any prediction picks riding on a team in the match),
   the match importance, and the prediction points in play. Live group games
   also show the provisional standings impact ("if it ends now…").

   All derived client-side from WC.FIXTURES + WC.PREDICTIONS + Store.allSync().
   Read-only — no admin writes, so no admin-token path is needed here.
   Helpers are mc-prefixed to stay collision-free in the shared script scope.
   =========================================================================== */
const WCmc = window.WC;
const Wmc = window.Wheesht;
const Smc = window.Store;
const { Card: Cmc, Btn: Bmc, Flag: Fmc, Chip: Chmc, WheeshtSays: Saysmc, SectionHead: SHmc } = window;
const { useState: mcState, useEffect: mcEffect, useRef: mcRef } = React;

function mcTeam(code) { return WCmc.TEAMS[code] || { code: code || 'TBD', name: code || 'To be decided', flag: '🏳️', group: '?' }; }
function mcName(code) { return mcTeam(code).name; }
function mcHasScore(f) { return !!(f && f.score && f.score[0] != null && f.score[1] != null); }
function mcStatus(f) {
  const raw = (f && f.status) || 'upcoming';
  if (raw === 'done') return 'done';
  if (raw === 'live') return 'live';
  if (raw === 'halfTime') return 'halfTime';
  const ko = mcKickoffMs(f);
  if (ko == null) return raw;
  const age = Date.now() - ko;
  if (age < 0) return 'upcoming';
  // Until an organiser records a result, treat the match window as live, then
  // flag it as needing an update rather than showing stale countdown copy.
  if (age <= 135 * 60 * 1000) return 'live';
  return 'needsResult';
}
function mcOrd(n) { const s = ['th', 'st', 'nd', 'rd'], v = n % 100; return n + (s[(v - 20) % 10] || s[v] || s[0]); }
function mcStageRank(st) { return ({ final: 6, sf: 5, qf: 4, r16: 3, r32: 2, group: 1 })[st] || 1; }
function mcStageLabel(f) {
  const st = f.stage || 'group';
  if (st === 'group') return 'Group ' + f.group;
  const labels = (WCmc.meta && WCmc.meta.stageLabels) || {};
  return labels[st] || st.toUpperCase();
}

function mcOwned() {
  const set = {};
  (Smc ? Smc.allSync() : (WCmc.PEOPLE || [])).forEach(p => { set[p.team] = (set[p.team] || 0) + 1; });
  return set;
}

/* ---- predictions: which of the user's picks ride on this match? ---------- */
function mcResolved(m) {
  if (!m) return false;
  if (m.kind === 'team2') return Array.isArray(m.answer) && m.answer.length > 0 && m.answer.every(x => x != null);
  return m.answer != null;
}
function mcMarkets() {
  const hidden = (WCmc.meta && WCmc.meta.hiddenPredictions) || [];
  return (WCmc.predictions || (Smc && Smc.PREDICTIONS) || []).filter(m => hidden.indexOf(m.key) < 0);
}
function mcStakeLabel(key, who) {
  switch (key) {
    case 'winner': return 'To win it: ' + who;
    case 'final': return 'Finalist: ' + who;
    case 'surprise': return 'Surprise: ' + who;
    case 'flop': return 'Flop: ' + who;
    case 'cleanSheets': return 'Clean sheets: ' + who;
    case 'goldenBoot': return 'Golden Boot: ' + who;
    case 'youngPlayer': return 'Young player: ' + who;
    case 'scotland': return 'Scotland: ' + who;
    case 'england': return 'England: ' + who;
    default: return who;
  }
}
function mcStake(me, f) {
  if (!me || !me.picks) return { items: [], pts: 0 };
  const picks = me.picks; const items = [];
  mcMarkets().forEach(m => {
    const pick = picks[m.key]; const resolved = mcResolved(m); let who = null;
    if (m.kind === 'team') { if (pick && (pick === f.a || pick === f.b)) who = mcName(pick); }
    else if (m.kind === 'team2') { if (Array.isArray(pick)) { const c = pick.find(x => x === f.a || x === f.b); if (c) who = mcName(c); } }
    else if (m.kind === 'player') {
      if (pick) { const o = (m.options || []).find(x => x && x.id === pick); if (o && (o.team === f.a || o.team === f.b)) who = o.name; }
    }
    else if (m.kind === 'stage') {
      const nation = m.key === 'scotland' ? 'SCO' : m.key === 'england' ? 'ENG' : null;
      if (nation && (f.a === nation || f.b === nation) && pick != null) who = String(pick);
    }
    if (who != null) items.push({ key: m.key, label: mcStakeLabel(m.key, who), pts: m.points, resolved: resolved });
  });
  const pts = items.filter(x => !x.resolved).reduce((a, x) => a + x.pts, 0);
  return { items, pts };
}

/* ---- match importance --------------------------------------------------- */
function mcImportance(f, me, stakePts, owned) {
  const st = f.stage || 'group';
  let score = ({ final: 100, sf: 82, qf: 66, r16: 52, r32: 42, group: 22 })[st] || 22;
  if (st === 'group') score += ((f.matchday || 1) - 1) * 5;
  const mine = !!(me && (f.a === me.team || f.b === me.team));
  if (mine) score += 35;
  if (stakePts > 0) score += Math.min(25, stakePts);
  score += Math.min(12, ((owned[f.a] || 0) + (owned[f.b] || 0)) * 4);
  let tier, label, flames;
  if (mine) { tier = 'you'; label = 'Your team'; flames = 3; }
  else if (score >= 80) { tier = 'must'; label = 'Must-watch'; flames = 3; }
  else if (score >= 55) { tier = 'big'; label = 'Big one'; flames = 2; }
  else if (score >= 35) { tier = 'worth'; label = 'Worth a watch'; flames = 1; }
  else { tier = 'routine'; label = 'Routine'; flames = 0; }
  return { score, tier, label, flames, mine };
}
function impTone(tier) { return tier === 'you' || tier === 'must' ? 'red' : tier === 'big' ? 'yellow' : 'ghost'; }

/* ---- standings impact (group games) ------------------------------------- */
function mcTally(teams, fixtures) {
  const rec = {}; teams.forEach(t => rec[t.code] = { code: t.code, team: t, Pts: 0, GF: 0, GA: 0 });
  fixtures.forEach(f => {
    if (!f.score || f.score[0] == null || f.score[1] == null) return;
    const A = rec[f.a], B = rec[f.b]; if (!A || !B) return;
    const ga = f.score[0], gb = f.score[1];
    A.GF += ga; A.GA += gb; B.GF += gb; B.GA += ga;
    if (ga > gb) A.Pts += 3; else if (gb > ga) B.Pts += 3; else { A.Pts++; B.Pts++; }
  });
  const ranked = Object.keys(rec).map(k => rec[k]).sort((a, b) => {
    if (b.Pts !== a.Pts) return b.Pts - a.Pts;
    const gda = a.GF - a.GA, gdb = b.GF - b.GA;
    if (gdb !== gda) return gdb - gda;
    if (b.GF !== a.GF) return b.GF - a.GF;
    return a.team.name.localeCompare(b.team.name);
  });
  ranked.forEach((r, i) => r.pos = i + 1);
  return ranked;
}
function mcImpact(f) {
  const st = f.stage || 'group';
  if (st !== 'group') {
    if (f.status === 'done' && f.score) {
      const w = f.score[0] > f.score[1] ? f.a : f.score[1] > f.score[0] ? f.b : null;
      if (w) return { type: 'ko', text: mcName(w) + ' advance · ' + mcName(w === f.a ? f.b : f.a) + ' are out' };
    }
    return { type: 'ko', text: 'Winner advances · loser is out' };
  }
  if (!f.score || f.score[0] == null || f.score[1] == null) return null;
  const teams = WCmc.TEAM_LIST.filter(t => t.group === f.group);
  const groupFx = (WCmc.FIXTURES || []).filter(x => x.stage === 'group' && x.group === f.group);
  const doneOther = groupFx.filter(x => x.id !== f.id && x.status === 'done' && x.score && x.score[0] != null);
  const before = mcTally(teams, doneOther);
  const after = mcTally(teams, doneOther.concat([{ a: f.a, b: f.b, score: f.score }]));
  const pb = {}, pa = {}; before.forEach(r => pb[r.code] = r.pos); after.forEach(r => pa[r.code] = r.pos);
  function line(code) {
    const posA = pa[code], posB = pb[code], d = posB - posA;
    return { name: mcName(code), pos: posA, arrow: d > 0 ? '▲' + d : d < 0 ? '▼' + Math.abs(d) : '–', d: d, qualify: posA <= 2 };
  }
  return { type: 'group', a: line(f.a), b: line(f.b) };
}

/* ---- kick-off countdown ------------------------------------------------- */
function mcKickoffMs(f) {
  try {
    const tm = (f.time && /^\d{2}:\d{2}/.test(f.time)) ? f.time.slice(0, 5) : '00:00';
    const t = new Date((f.dateISO || '') + 'T' + tm + ':00').getTime();
    return isFinite(t) ? t : null;
  } catch (e) { return null; }
}
function mcFmt(ms) {
  if (ms == null) return '';
  if (ms <= 0) return 'Kicking off';
  const s = Math.floor(ms / 1000), d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  if (d > 0) return d + 'd ' + h + 'h';
  if (h > 0) return h + 'h ' + m + 'm';
  if (m > 0) return m + 'm ' + sec + 's';
  return sec + 's';
}
function useCountdown(target) {
  const [, tick] = mcState(0);
  mcEffect(() => {
    if (target == null) return;
    const iv = setInterval(() => tick(x => x + 1), 1000);
    return () => clearInterval(iv);
  }, [target]);
  return target == null ? null : target - Date.now();
}

/* ---- live score with goal flash ----------------------------------------- */
function LiveScore(props) {
  const f = props.f;
  const a = f.score ? f.score[0] : 0, b = f.score ? f.score[1] : 0;
  const prev = mcRef({ a: a, b: b });
  const [flash, setFlash] = mcState(null);
  mcEffect(() => {
    if (a > prev.current.a) { setFlash('a'); }
    else if (b > prev.current.b) { setFlash('b'); }
    prev.current = { a: a, b: b };
    if (a > 0 || b > 0) { /* no-op */ }
  }, [a, b]);
  mcEffect(() => { if (!flash) return; const t = setTimeout(() => setFlash(null), 2400); return () => clearTimeout(t); }, [flash]);
  const cell = (v, side) => (
    <span className={flash === side ? 'pop' : ''} style={{ fontFamily: 'var(--disp)', fontWeight: 800, fontSize: 30, lineHeight: 1, color: flash === side ? 'var(--red)' : 'var(--ink)' }}>{v}</span>
  );
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', minWidth: 64 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 7 }}>{cell(a, 'a')}<span className="dh" style={{ fontSize: 18, color: 'var(--ink2)' }}>:</span>{cell(b, 'b')}</div>
      {flash ? <span style={{ fontSize: 9.5, fontWeight: 900, color: 'var(--red)', letterSpacing: '.08em', marginTop: 2 }}>⚽ GOAL!</span>
        : <span style={{ fontSize: 9, fontWeight: 800, color: 'var(--red)', letterSpacing: '.06em', marginTop: 2 }}>{props.label || 'LIVE'}</span>}
    </div>
  );
}

/* ---- the match card ----------------------------------------------------- */
function MatchCard(props) {
  const f = props.f, me = props.me, owned = props.owned, onWhatIf = props.onWhatIf;
  const st = mcStatus(f), live = st === 'live' || st === 'halfTime', halfTime = st === 'halfTime', done = st === 'done', needsResult = st === 'needsResult';
  const stake = mcStake(me, f);
  const imp = mcImportance(f, me, stake.pts, owned);
  const ms = mcKickoffMs(f);
  const until = ms == null ? null : ms - Date.now();
  const soon = st === 'upcoming' && until != null && until < 24 * 3600 * 1000 && until > 0;
  const remaining = useCountdown(soon ? ms : null);
  const impact = (live || done) ? mcImpact(f) : null;
  const oa = owned[f.a] || 0, ob = owned[f.b] || 0;
  const aw = done && f.score && f.score[0] > f.score[1];
  const bw = done && f.score && f.score[1] > f.score[0];

  const border = live ? '2.5px solid var(--red)' : imp.mine ? '2.5px solid var(--ink)' : '2px solid var(--line)';
  const shadow = live ? '0 0 0 4px rgba(232,39,42,.12)' : imp.mine ? '0 4px 0 var(--shadow)' : 'none';

  return (
    <Cmc flat style={{ padding: '12px 13px', marginBottom: 9, border: border, boxShadow: shadow }}>
      {/* header: context + importance · status */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8, marginBottom: 9 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6, minWidth: 0, flexWrap: 'wrap' }}>
          <Chmc tone="ghost">{mcStageLabel(f)}</Chmc>
          {f.stage === 'group' && <span style={{ fontSize: 11, fontWeight: 700, color: 'var(--ink2)' }}>MD{f.matchday}</span>}
          <Chmc tone={impTone(imp.tier)} style={{ whiteSpace: 'nowrap' }}>{'🔥'.repeat(imp.flames) || '·'} {imp.label}</Chmc>
        </div>
        <div style={{ flex: '0 0 auto', textAlign: 'right' }}>
          {halfTime ? <Chmc tone="yellow">HT</Chmc>
            : live ? <span className="mc-livedot" style={{ fontSize: 11, fontWeight: 900, color: 'var(--red)', whiteSpace: 'nowrap' }}>● LIVE</span>
            : done ? <Chmc tone="ink">FT</Chmc>
              : needsResult ? <Chmc tone="red" style={{ whiteSpace: 'nowrap' }}>Result needed</Chmc>
              : soon ? <Chmc tone="yellow" style={{ whiteSpace: 'nowrap' }}>⏱ {mcFmt(remaining)}</Chmc>
                : <span style={{ fontSize: 12, fontWeight: 800 }}>{f.time}</span>}
        </div>
      </div>

      {/* teams + score / countdown */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        <MCTeamCol code={f.a} owners={oa} lose={bw} dim={bw} />
        <div style={{ flex: '0 0 auto', textAlign: 'center', minWidth: 56 }}>
          {live ? <LiveScore f={f} label={halfTime ? 'HT' : 'LIVE'} />
            : done && f.score ? <span className="dh" style={{ fontSize: 30 }}>{f.score[0]}<span style={{ color: 'var(--ink2)', fontSize: 18 }}>:</span>{f.score[1]}</span>
              : needsResult ? <div><div className="dh" style={{ fontSize: 15, color: 'var(--red)', lineHeight: 1.05 }}>Result</div><div style={{ fontSize: 10, fontWeight: 800, color: 'var(--ink2)', marginTop: 2 }}>needed</div></div>
              : <div><div className="dh" style={{ fontSize: 18, color: 'var(--ink2)' }}>v</div>{soon && <div style={{ fontSize: 10, fontWeight: 800, color: 'var(--ink2)', marginTop: 2 }}>{mcFmt(remaining)}</div>}</div>}
        </div>
        <MCTeamCol code={f.b} owners={ob} lose={aw} dim={aw} />
      </div>

      {/* points in play + your stake */}
      {(stake.pts > 0 || imp.mine || stake.items.length > 0) &&
        <div style={{ marginTop: 11, paddingTop: 10, borderTop: '1.5px solid var(--line)' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>
            {imp.mine && <Chmc tone="yellow">⭐ Your team</Chmc>}
            {stake.pts > 0 && <Chmc tone="green">🎯 {stake.pts} pts in play</Chmc>}
            {stake.items.map((s, i) => (
              <span key={i} style={{ fontSize: 10.5, fontWeight: 700, color: s.resolved ? 'var(--ink2)' : 'var(--ink)', background: 'var(--bg)', border: '1.5px solid var(--line)', borderRadius: 999, padding: '3px 8px', textDecoration: s.resolved ? 'line-through' : 'none' }}>{s.label}</span>
            ))}
          </div>
        </div>}

      {/* standings impact */}
      {impact && impact.type === 'group' &&
        <div style={{ marginTop: 10, background: 'var(--bg)', borderRadius: 11, padding: '9px 11px' }}>
          <div style={{ fontSize: 9.5, fontWeight: 800, letterSpacing: '.05em', textTransform: 'uppercase', color: 'var(--ink2)', marginBottom: 5 }}>
            {live ? 'If it ends now · Group ' + f.group : 'Group ' + f.group + ' impact'}
          </div>
          {[impact.a, impact.b].map((l, i) => (
            <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 7, fontSize: 12, fontWeight: 700, padding: '1px 0' }}>
              <span style={{ flex: 1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{l.name}</span>
              {l.qualify && <span style={{ fontSize: 9.5, fontWeight: 800, color: 'var(--green)' }}>QUALIFYING</span>}
              <span className="dh" style={{ fontSize: 13, width: 34, textAlign: 'right' }}>{mcOrd(l.pos)}</span>
              <span style={{ width: 26, textAlign: 'right', fontWeight: 900, color: l.d > 0 ? 'var(--green)' : l.d < 0 ? 'var(--red)' : 'var(--ink2)' }}>{l.arrow}</span>
            </div>
          ))}
        </div>}
      {impact && impact.type === 'ko' &&
        <div style={{ marginTop: 10, background: 'var(--bg)', borderRadius: 11, padding: '8px 11px', fontSize: 11.5, fontWeight: 700, color: 'var(--ink2)' }}>
          🏆 {impact.text}
        </div>}

      {/* What If? entry point */}
      <div style={{ marginTop: 10, display: 'flex', justifyContent: 'flex-end' }}>
        <button onClick={() => onWhatIf && onWhatIf(f)}
          style={{ border: '1.5px solid var(--line)', background: 'none', cursor: 'pointer', borderRadius: 999, fontSize: 11, fontWeight: 800, color: 'var(--ink2)', padding: '4px 12px', letterSpacing: '.02em' }}>
          What If? →
        </button>
      </div>
    </Cmc>
  );
}

}

/* ---- screen ------------------------------------------------------------- */
function MatchCentreScreen() {
  const me = Smc ? Smc.active() : null;
  const [filter, setFilter] = mcState('all');
  const [wiFixture, setWiFixture] = mcState(null);
  const owned = mcOwned();
  const all = (WCmc.FIXTURES || []).slice();
  const mineTeam = me ? me.team : null;

  const liveList = all.filter(f => {
    const st = mcStatus(f);
    return st === 'live' || st === 'halfTime';
  });
  const upcoming = all.filter(f => mcStatus(f) === 'upcoming');
  const needsResultList = all.filter(f => mcStatus(f) === 'needsResult');
  // hero: your team's next, else the most important upcoming, else the first
  const nextMine = mineTeam ? upcoming.find(f => f.a === mineTeam || f.b === mineTeam) : null;
  let heroPick = null;
  if (!nextMine && upcoming.length) {
    heroPick = upcoming.slice().sort((a, b) => {
      const ia = mcImportance(a, me, mcStake(me, a).pts, owned).score;
      const ib = mcImportance(b, me, mcStake(me, b).pts, owned).score;
      if (ib !== ia) return ib - ia;
      return (mcKickoffMs(a) || 0) - (mcKickoffMs(b) || 0);
    })[0];
  }
  const hero = nextMine || heroPick;

  // filtered, dated list (live shown separately at top)
  let list = all.filter(f => mcStatus(f) !== 'live');
  if (filter === 'mine' && mineTeam) list = list.filter(f => f.a === mineTeam || f.b === mineTeam);
  else if (filter === 'owned') list = list.filter(f => owned[f.a] || owned[f.b]);
  else if (filter === 'done') list = list.filter(f => mcStatus(f) === 'done');
  else if (filter === 'upcoming') list = list.filter(f => mcStatus(f) === 'upcoming');
  else if (filter === 'needsResult') list = list.filter(f => mcStatus(f) === 'needsResult');

  const byDate = []; const seen = {};
  list.forEach(f => {
    if (!seen[f.dateISO]) { seen[f.dateISO] = { label: f.dateLabel, items: [] }; byDate.push(seen[f.dateISO]); }
    seen[f.dateISO].items.push(f);
  });

  const doneCount = all.filter(f => mcStatus(f) === 'done').length;
  const filters = [['all', 'All'], ['mine', 'My team'], ['owned', 'In the draw'], ['upcoming', 'Upcoming'], ['done', 'Finished']];
  if (needsResultList.length) filters.splice(3, 0, ['needsResult', 'Needs result']);

  return (
    <React.Fragment>
    <div className="pad">
      <div className="appbar" style={{ padding: '2px 0 12px' }}>
        <div>
          <div className="dh" style={{ fontSize: 26 }}>Match Centre</div>
          <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--ink2)' }}>
            {liveList.length > 0
              ? <><b style={{ color: 'var(--red)' }}>{liveList.length} live now</b> · {upcoming.length} to come{needsResultList.length ? ' · ' + needsResultList.length + ' need results' : ''}</>
              : <>{all.length} fixtures · {doneCount} played{needsResultList.length ? ' · ' + needsResultList.length + ' need results' : ' · kick-off ' + (WCmc.meta.kickoff || 'soon')}</>}
          </div>
        </div>
      </div>

      {/* LIVE NOW — top priority */}
      {liveList.length > 0 && <>
        <SHmc aside="updating live">● Live now</SHmc>
        {liveList.map(f => <MatchCard key={f.id} f={f} me={me} owned={owned} onWhatIf={setWiFixture} />)}
      </>}

      {/* NEXT UP hero with countdown */}
      {filter === 'all' && hero &&
        <div style={{ marginTop: liveList.length ? 6 : 0 }}>
          <NextHero f={hero} me={me} owned={owned} label={nextMine ? 'Your ' + mcTeam(mineTeam).name + ' play next' : 'Next up'} />
        </div>}

      {!liveList.length && filter === 'all' &&
        <><div style={{ height: 12 }} />
        <Saysmc mood="confident" label="match centre" animate>Every fixture, live as it happens — scores, what is riding on it, and how the table shifts. Wheesht misses nothing.</Saysmc></>}

      {/* filters */}
      <div style={{ display: 'flex', gap: 7, padding: '16px 0 12px', overflowX: 'auto' }}>
        {filters.map(([k, lab]) => (
          <button key={k} onClick={() => setFilter(k)} disabled={k === 'mine' && !mineTeam}
            className={'wc-chip' + (filter === k ? ' wc-chip--yellow' : '')}
            style={{ whiteSpace: 'nowrap', cursor: 'pointer', flex: '0 0 auto', opacity: (k === 'mine' && !mineTeam) ? .4 : 1 }}>{lab}</button>
        ))}
      </div>

      {list.length === 0 &&
        <Cmc flat style={{ textAlign: 'center', padding: '26px 16px' }}>
          <Wmc mood="neutral" size={64} animate />
          <div className="dh" style={{ fontSize: 17, marginTop: 6 }}>Nothing here yet.</div>
          <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--ink2)', marginTop: 3 }}>No fixtures match that filter.</div>
        </Cmc>}

      {byDate.map((day, i) => (
        <div key={i}>
          <SHmc aside={day.items.length + ' ' + (day.items.length === 1 ? 'game' : 'games')}>{day.label}</SHmc>
          {day.items.map(f => <MatchCard key={f.id} f={f} me={me} owned={owned} onWhatIf={setWiFixture} />)}
        </div>
      ))}
    </div>
    {wiFixture && <window.WhatIfSheet f={wiFixture} me={me} onClose={() => setWiFixture(null)} />}
    </React.Fragment>
  );
}

window.MatchCentreScreen = MatchCentreScreen;

</script>

<script type="text/babel">
/* ===========================================================================
   WHAT IF — match impact simulator.

   Opens as a full-screen overlay from Match Centre. Pick a scenario
   (A wins / Draw / B wins) to instantly see the hypothetical group table,
   sweepstake position changes, biggest winner and loser, and which
   prediction markets are still alive for these teams.

   All client-side, read-only. wi-prefixed to stay collision-free.
   =========================================================================== */
const WCwi = window.WC;
const Swi = window.Store;
const Wwi = window.Wheesht;
const { Card: Cwi, Flag: Fwi, Chip: Chwi, SectionHead: SHwi } = window;
const { useState: wiState } = React;

function wiTeam(code) {
  return WCwi.TEAMS[code] || { code: code || 'TBD', name: code || 'TBD', flag: '🏳️', group: '?' };
}

function wiTally(teams, fixtures) {
  const rec = {};
  teams.forEach(t => { rec[t.code] = { code: t.code, team: t, Pts: 0, GF: 0, GA: 0, P: 0 }; });
  fixtures.forEach(f => {
    if (!f.score || f.score[0] == null || f.score[1] == null) return;
    const A = rec[f.a], B = rec[f.b]; if (!A || !B) return;
    const ga = f.score[0], gb = f.score[1];
    A.P++; B.P++; A.GF += ga; A.GA += gb; B.GF += gb; B.GA += ga;
    if (ga > gb) A.Pts += 3; else if (gb > ga) B.Pts += 3; else { A.Pts++; B.Pts++; }
  });
  const ranked = Object.keys(rec).map(k => rec[k]).sort((a, b) => {
    if (b.Pts !== a.Pts) return b.Pts - a.Pts;
    const gda = a.GF - a.GA, gdb = b.GF - b.GA;
    if (gdb !== gda) return gdb - gda;
    if (b.GF !== a.GF) return b.GF - a.GF;
    return a.team.name.localeCompare(b.team.name);
  });
  ranked.forEach((r, i) => r.pos = i + 1);
  return ranked;
}

function wiGroupImpact(f, hypoScore) {
  const teams = (WCwi.TEAM_LIST || []).filter(t => t.group === f.group);
  if (!teams.length) return null;
  const allFx = (WCwi.FIXTURES || []).filter(x => x.stage === 'group' && x.group === f.group);
  const otherDone = allFx.filter(x => x.id !== f.id && x.status === 'done' && x.score && x.score[0] != null);
  const before = wiTally(teams, otherDone);
  const after = wiTally(teams, otherDone.concat([{ a: f.a, b: f.b, score: hypoScore }]));
  const beforeMap = {};
  before.forEach(r => { beforeMap[r.code] = r; });
  return after.map(r => ({
    code: r.code,
    team: r.team,
    afterPos: r.pos,
    afterPts: r.Pts,
    afterGD: r.GF - r.GA,
    qualAfter: r.pos <= 2,
    qualBefore: beforeMap[r.code] ? beforeMap[r.code].pos <= 2 : false,
    move: (beforeMap[r.code] ? beforeMap[r.code].pos : r.pos) - r.pos,
  }));
}

function wiSweepImpact(groupRows) {
  if (!groupRows) return [];
  const all = Swi ? Swi.allSync() : (WCwi.PEOPLE || []);
  const results = [];
  all.forEach(person => {
    const g = groupRows.find(r => r.code === person.team);
    if (!g) return;
    results.push({ person, team: g.team, move: g.move, afterPos: g.afterPos, qualBefore: g.qualBefore, qualAfter: g.qualAfter });
  });
  results.sort((a, b) => b.move - a.move);
  return results;
}

function wiResolved(m) {
  if (!m) return false;
  if (m.kind === 'team2') return Array.isArray(m.answer) && m.answer.length > 0 && m.answer.every(x => x != null);
  return m.answer != null;
}

function wiMarkets(f) {
  const hidden = (WCwi.meta && WCwi.meta.hiddenPredictions) || [];
  const all = (WCwi.predictions || (Swi && Swi.PREDICTIONS) || []);
  return all.filter(m => {
    if (hidden.indexOf(m.key) >= 0 || wiResolved(m)) return false;
    if (m.kind === 'team' || m.kind === 'team2') {
      return (m.options || []).some(o => o === f.a || o === f.b);
    }
    return false;
  });
}

/* ---- hypothetical group table ------------------------------------------- */
function WiGroupTable(props) {
  const { rows, fa, fb } = props;
  if (!rows) return null;
  return (
    <Cwi flat style={{ padding: '8px 12px' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '2px 2px 7px', borderBottom: '2px solid var(--line)', fontSize: 9.5, fontWeight: 800, letterSpacing: '.03em', color: 'var(--ink2)', textTransform: 'uppercase' }}>
        <span style={{ width: 18, textAlign: 'center' }}>#</span>
        <span style={{ width: 26 }}></span>
        <span style={{ flex: 1 }}>Team</span>
        <span style={{ width: 26, textAlign: 'center' }}>GD</span>
        <span style={{ width: 28, textAlign: 'center' }}>Pts</span>
        <span style={{ width: 30, textAlign: 'center' }}>↕</span>
      </div>
      {rows.map((r, i) => {
        const gd = r.afterGD;
        const nowQualifies = r.qualAfter && !r.qualBefore;
        const nowOut = !r.qualAfter && r.qualBefore;
        const isMatch = r.code === fa || r.code === fb;
        return (
          <React.Fragment key={r.code}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '8px 2px', borderRadius: 9, margin: '2px 0', background: isMatch ? 'rgba(245,200,0,.14)' : 'transparent' }}>
              <span className="dh" style={{ width: 18, textAlign: 'center', fontSize: 15, color: r.afterPos <= 2 ? 'var(--green)' : 'var(--ink2)' }}>{r.afterPos}</span>
              <Fwi team={r.team} size={22} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 800, fontSize: 13, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                  {r.team.name}
                  {nowQualifies && <span style={{ marginLeft: 5, fontSize: 9, fontWeight: 900, color: 'var(--green)', letterSpacing: '.04em' }}>QUALIFIES ✓</span>}
                  {nowOut && <span style={{ marginLeft: 5, fontSize: 9, fontWeight: 900, color: 'var(--red)', letterSpacing: '.04em' }}>DROPS OUT ✗</span>}
                </div>
              </div>
              <span style={{ width: 26, textAlign: 'center', fontSize: 12, fontWeight: 700, color: 'var(--ink2)' }}>{gd > 0 ? '+' + gd : gd}</span>
              <span className="dh" style={{ width: 28, textAlign: 'center', fontSize: 16 }}>{r.afterPts}</span>
              <span style={{ width: 30, textAlign: 'center', fontWeight: 900, fontSize: 12, color: r.move > 0 ? 'var(--green)' : r.move < 0 ? 'var(--red)' : 'var(--ink2)' }}>
                {r.move > 0 ? '▲' + r.move : r.move < 0 ? '▼' + Math.abs(r.move) : '–'}
              </span>
            </div>
            {i === 1 && <div style={{ display: 'flex', alignItems: 'center', gap: 7, margin: '3px 0', padding: '0 2px' }}>
              <div style={{ flex: 1, borderTop: '2px dashed var(--green)' }} />
              <span style={{ fontSize: 9, fontWeight: 800, letterSpacing: '.06em', color: 'var(--green)' }}>QUALIFY ↑</span>
            </div>}
          </React.Fragment>
        );
      })}
    </Cwi>
  );
}

/* ---- goal stepper ------------------------------------------------------- */
function WiGoalStepper(props) {
  const btn = (label, delta, disabled) => (
    <button onClick={() => !disabled && props.onBump(delta)} disabled={disabled}
      style={{ width: 28, height: 28, borderRadius: 9, border: '2px solid var(--ink)', background: '#fff', cursor: disabled ? 'default' : 'pointer', fontFamily: 'var(--disp)', fontWeight: 800, fontSize: 16, lineHeight: 1, color: 'var(--ink)', opacity: disabled ? .35 : 1, padding: 0 }}>{label}</button>
  );
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
      {btn('−', -1, props.value <= 0)}
      <span className="dh" style={{ fontSize: 22, width: 18, textAlign: 'center' }}>{props.value}</span>
      {btn('+', 1, false)}
    </div>
  );
}

/* ---- the overlay (portalled to #root so it covers the full phone screen) */
function WhatIfSheet(props) {
  const f = props.f;
  const me = props.me;
  // score is [goalsA, goalsB] (or null before a pick). The outcome is derived,
  // so a quick "1–0" preset and a hand-entered scoreline share one code path.
  const [score, setScore] = wiState(null);

  if (!f) return null;

  const ta = wiTeam(f.a), tb = wiTeam(f.b);
  const isGroup = (f.stage || 'group') === 'group';

  const outcome = score ? (score[0] > score[1] ? 'a' : score[1] > score[0] ? 'b' : 'draw') : null;
  const hypo = score;
  const koLevel = !isGroup && outcome === 'draw'; // knockouts can't end level
  const groupRows = (hypo && isGroup) ? wiGroupImpact(f, hypo) : null;
  const sweepRows = groupRows ? wiSweepImpact(groupRows) : [];
  const bigWinner = sweepRows.find(r => r.move > 0);
  const bigLoser = sweepRows.slice().reverse().find(r => r.move < 0);
  const openMarkets = wiMarkets(f);

  const allPeople = Swi ? Swi.allSync() : (WCwi.PEOPLE || []);
  const ownersOf = (code) => allPeople.filter(p => p.team === code);

  const stageLabel = { final: 'Final', sf: 'Semi-final', qf: 'Quarter-final', r16: 'Round of 16', r32: 'Round of 32' }[f.stage] || null;

  const koAdvance = (outcome === 'a' || outcome === 'b') ? (outcome === 'a' ? ta : tb) : null;
  const koOut = (outcome === 'a' || outcome === 'b') ? (outcome === 'a' ? tb : ta) : null;

  const presetScore = { a: [1, 0], draw: [0, 0], b: [0, 1] };
  const bumpGoal = (side, delta) => {
    const base = score || [0, 0];
    const next = side === 0 ? [Math.max(0, base[0] + delta), base[1]] : [base[0], Math.max(0, base[1] + delta)];
    setScore(next);
  };

  // Which scenario is the user's drawn team winning? Star it so they instantly
  // see the result that helps them.
  const myWin = me ? (f.a === me.team ? 'a' : f.b === me.team ? 'b' : null) : null;
  const star = (k) => (k === myWin ? '⭐ ' : '');

  const scenarios = isGroup
    ? [['a', star('a') + ta.flag + ' ' + ta.name + ' win'], ['draw', 'Draw'], ['b', star('b') + tb.flag + ' ' + tb.name + ' win']]
    : [['a', star('a') + ta.flag + ' ' + ta.name + ' win'], ['b', star('b') + tb.flag + ' ' + tb.name + ' win']];

  const content = (
    <div className="moment rise" style={{ zIndex: 65, background: 'var(--bg)' }}>
      {/* header */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '12px 16px 10px', borderBottom: '1.5px solid var(--line)', flexShrink: 0, background: 'rgba(244,238,227,.96)' }}>
        <button onClick={props.onClose} style={{ border: 'none', background: 'none', cursor: 'pointer', fontSize: 20, fontWeight: 900, color: 'var(--ink)', padding: '2px 6px 2px 0', lineHeight: 1 }}>←</button>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div className="dh" style={{ fontSize: 22 }}>What If?</div>
          <div style={{ fontSize: 11.5, fontWeight: 600, color: 'var(--ink2)' }}>
            {stageLabel || ('Group ' + f.group)} · {f.dateLabel} {f.time}
          </div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexShrink: 0 }}>
          <span style={{ fontSize: 26 }}>{ta.flag}</span>
          {hypo
            ? <span className="dh pop" key={outcome} style={{ fontSize: 17, color: 'var(--red)' }}>{hypo[0]}–{hypo[1]}</span>
            : <span style={{ fontSize: 13, fontWeight: 700, color: 'var(--ink2)' }}>v</span>}
          <span style={{ fontSize: 26 }}>{tb.flag}</span>
        </div>
      </div>

      <div className="mscroll">
        <div className="pad">

          {/* scenario picker */}
          <div style={{ marginBottom: 14 }}>
            <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', gap: 8, marginBottom: 8 }}>
              <span style={{ fontSize: 10, fontWeight: 800, letterSpacing: '.07em', textTransform: 'uppercase', color: 'var(--ink2)' }}>Pick a scenario</span>
              {myWin && <span style={{ fontSize: 10, fontWeight: 800, color: 'var(--red)' }}>⭐ your team</span>}
            </div>
            <div style={{ display: 'flex', gap: 6 }}>
              {scenarios.map(([k, lab]) => (
                <button key={k} onClick={() => setScore(outcome === k ? null : presetScore[k])}
                  className={'wc-btn wc-btn--sm' + (outcome === k ? ' wc-btn--primary' : '')}
                  style={{ flex: 1, fontSize: 12, padding: '11px 6px', boxShadow: outcome === k ? '0 4px 0 var(--ink)' : '0 4px 0 var(--shadow)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                  {lab}
                </button>
              ))}
            </div>

            {/* exact scoreline stepper — appears once a scenario is picked */}
            {score && (
              <div style={{ marginTop: 10, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10, background: 'var(--bg2)', border: '2px solid var(--line)', borderRadius: 13, padding: '9px 12px' }}>
                <span style={{ fontSize: 22 }}>{ta.flag}</span>
                <WiGoalStepper value={score[0]} onBump={(d) => bumpGoal(0, d)} />
                <span className="dh" style={{ fontSize: 16, color: 'var(--ink2)' }}>–</span>
                <WiGoalStepper value={score[1]} onBump={(d) => bumpGoal(1, d)} />
                <span style={{ fontSize: 22 }}>{tb.flag}</span>
              </div>
            )}
          </div>

          {/* idle state */}
          {!score && (
            <div style={{ textAlign: 'center', padding: '36px 0 24px' }}>
              <Wwi mood="confident" size={68} animate />
              <div className="dh" style={{ fontSize: 20, marginTop: 12 }}>Run the numbers</div>
              <div style={{ fontSize: 13.5, fontWeight: 600, color: 'var(--ink2)', marginTop: 5, lineHeight: 1.4 }}>
                {isGroup
                  ? 'Pick a winner — or set the exact score — to see how the group table shifts and who wins or loses in the sweepstake.'
                  : 'Pick a winner — or set the exact score — to see who advances and what it means for the draw.'}
              </div>
            </div>
          )}

          {/* knockout can't end level */}
          {koLevel && (
            <div style={{ textAlign: 'center', padding: '22px 12px', background: 'rgba(232,39,42,.06)', border: '2px solid var(--red)', borderRadius: 16 }}>
              <div style={{ fontSize: 28 }}>⚖️</div>
              <div className="dh" style={{ fontSize: 17, marginTop: 4 }}>A knockout can't end level</div>
              <div style={{ fontSize: 12.5, fontWeight: 600, color: 'var(--ink2)', marginTop: 4 }}>Nudge the score so one side comes out on top.</div>
            </div>
          )}

          {/* ---- GROUP GAME RESULTS ---- */}
          {outcome && isGroup && groupRows && <>

            <SHwi aside={'Group ' + f.group + ' · if this result stands'}>Hypothetical table</SHwi>
            <WiGroupTable rows={groupRows} fa={f.a} fb={f.b} />
            <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--ink2)', marginTop: 6, marginBottom: 16, lineHeight: 1.35 }}>
              Based on results so far, with a {hypo[0]}–{hypo[1]} {ta.name} v {tb.name} added in. Adjust the score above to test the goal difference.
            </div>

            {/* biggest winner / loser cards */}
            {(bigWinner || bigLoser) && (
              <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
                {bigWinner ? (
                  <div style={{ flex: 1, background: 'rgba(26,122,68,.1)', border: '2.5px solid var(--green)', borderRadius: 16, padding: '11px 12px' }}>
                    <div style={{ fontSize: 9.5, fontWeight: 800, color: 'var(--green)', letterSpacing: '.04em' }}>📈 BIGGEST WINNER</div>
                    <div className="dh" style={{ fontSize: 17, marginTop: 5, lineHeight: 1.05, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{bigWinner.person.name}</div>
                    <div style={{ fontSize: 11.5, fontWeight: 700, color: 'var(--ink2)', marginTop: 2 }}>
                      {bigWinner.team.flag} {bigWinner.team.name}
                      <span style={{ color: 'var(--green)', marginLeft: 4 }}>▲{bigWinner.move}</span>
                    </div>
                    {bigWinner.qualAfter && !bigWinner.qualBefore && (
                      <div style={{ fontSize: 10, fontWeight: 800, color: 'var(--green)', marginTop: 4 }}>Moves into a qualifying spot</div>
                    )}
                  </div>
                ) : (
                  <div style={{ flex: 1, background: 'var(--bg2)', border: '2px solid var(--line)', borderRadius: 16, padding: '11px 12px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--ink2)', textAlign: 'center' }}>No one moves up</div>
                  </div>
                )}
                {bigLoser ? (
                  <div style={{ flex: 1, background: 'rgba(232,39,42,.07)', border: '2.5px solid var(--red)', borderRadius: 16, padding: '11px 12px' }}>
                    <div style={{ fontSize: 9.5, fontWeight: 800, color: 'var(--red)', letterSpacing: '.04em' }}>📉 BIGGEST LOSER</div>
                    <div className="dh" style={{ fontSize: 17, marginTop: 5, lineHeight: 1.05, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{bigLoser.person.name}</div>
                    <div style={{ fontSize: 11.5, fontWeight: 700, color: 'var(--ink2)', marginTop: 2 }}>
                      {bigLoser.team.flag} {bigLoser.team.name}
                      <span style={{ color: 'var(--red)', marginLeft: 4 }}>▼{Math.abs(bigLoser.move)}</span>
                    </div>
                    {!bigLoser.qualAfter && bigLoser.qualBefore && (
                      <div style={{ fontSize: 10, fontWeight: 800, color: 'var(--red)', marginTop: 4 }}>Falls out of a qualifying spot</div>
                    )}
                  </div>
                ) : (
                  <div style={{ flex: 1, background: 'var(--bg2)', border: '2px solid var(--line)', borderRadius: 16, padding: '11px 12px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--ink2)', textAlign: 'center' }}>No one drops</div>
                  </div>
                )}
              </div>
            )}

            {/* sweepstake participants in this group */}
            {sweepRows.length > 0 && <>
              <SHwi aside={sweepRows.length + ' players'}>Sweepstake impact</SHwi>
              <Cwi flat style={{ padding: '8px 12px' }}>
                {sweepRows.map((r, i) => {
                  const isMe = me && r.person.id === me.id;
                  return (
                    <div key={r.person.id} style={{ display: 'flex', alignItems: 'center', gap: 9, padding: '8px 2px', borderBottom: i < sweepRows.length - 1 ? '1.5px solid var(--line)' : 'none', background: isMe ? 'rgba(245,200,0,.12)' : 'transparent', borderRadius: isMe ? 9 : 0, paddingLeft: isMe ? 6 : 2 }}>
                      <Fwi team={r.team} size={22} />
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontWeight: 800, fontSize: 13, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                          {r.person.name}
                          {isMe && <span style={{ color: 'var(--red)', marginLeft: 4 }}>you</span>}
                        </div>
                        <div style={{ fontSize: 11, fontWeight: 700, color: r.qualAfter ? 'var(--green)' : 'var(--ink2)' }}>
                          {r.team.name} · {r.qualAfter ? 'qualifying' : 'not qualifying'}
                        </div>
                      </div>
                      <span style={{ fontWeight: 900, fontSize: 13, color: r.move > 0 ? 'var(--green)' : r.move < 0 ? 'var(--red)' : 'var(--ink2)', width: 32, textAlign: 'right' }}>
                        {r.move > 0 ? '▲' + r.move : r.move < 0 ? '▼' + Math.abs(r.move) : '–'}
                      </span>
                      <span className="dh" style={{ fontSize: 17, color: r.afterPos <= 2 ? 'var(--green)' : 'var(--ink2)', width: 22, textAlign: 'center' }}>{r.afterPos}</span>
                    </div>
                  );
                })}
              </Cwi>
            </>}

            {sweepRows.length === 0 && (
              <Cwi flat style={{ textAlign: 'center', padding: '18px 12px' }}>
                <div style={{ fontSize: 12.5, fontWeight: 600, color: 'var(--ink2)' }}>No players have drawn teams in this group.</div>
              </Cwi>
            )}

            {/* open prediction markets */}
            {openMarkets.length > 0 && <>
              <SHwi aside={openMarkets.length + ' unresolved'}>Predictions still alive</SHwi>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 7 }}>
                {openMarkets.map(m => (
                  <Chwi key={m.key} tone="ghost">{m.label}</Chwi>
                ))}
              </div>
              <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--ink2)', marginTop: 6, lineHeight: 1.35 }}>
                These open markets feature {ta.name} or {tb.name} — the result here keeps them live or may shape their outcome.
              </div>
            </>}
          </>}

          {/* ---- KO GAME RESULTS ---- */}
          {outcome && !isGroup && koAdvance && (
            <>
              <SHwi aside={stageLabel || f.stage}>{koAdvance.name} advance</SHwi>
              <Cwi bordered style={{ background: 'var(--ink)', color: '#fff', marginBottom: 10 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
                  <span style={{ fontSize: 42, lineHeight: 1 }}>{koAdvance.flag}</span>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div className="dh" style={{ fontSize: 22, color: '#fff', lineHeight: 1 }}>{koAdvance.name}</div>
                    <div style={{ fontSize: 11.5, fontWeight: 700, color: 'rgba(255,255,255,.6)', marginTop: 3 }}>advance to the next round</div>
                  </div>
                  <Chwi tone="green" style={{ flexShrink: 0 }}>through</Chwi>
                </div>
                {ownersOf(koAdvance.code).length > 0 && (
                  <div style={{ marginTop: 12, background: 'rgba(245,200,0,.15)', borderRadius: 11, padding: '9px 12px' }}>
                    <div style={{ fontSize: 9.5, fontWeight: 800, color: 'var(--yellow)', letterSpacing: '.05em' }}>DRAWN BY</div>
                    <div style={{ fontSize: 14, fontWeight: 700, color: '#fff', marginTop: 3 }}>
                      {ownersOf(koAdvance.code).map(p => p.name).join(', ')}
                    </div>
                  </div>
                )}
              </Cwi>

              <Cwi flat style={{ marginBottom: 10, opacity: .7 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
                  <span style={{ fontSize: 42, lineHeight: 1, filter: 'grayscale(1)' }}>{koOut.flag}</span>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div className="dh" style={{ fontSize: 22, color: 'var(--ink2)', textDecoration: 'line-through', lineHeight: 1 }}>{koOut.name}</div>
                    <div style={{ fontSize: 11.5, fontWeight: 700, color: 'var(--ink2)', marginTop: 3 }}>eliminated</div>
                  </div>
                </div>
                {ownersOf(koOut.code).length > 0 && (
                  <div style={{ marginTop: 12, background: 'rgba(232,39,42,.08)', borderRadius: 11, padding: '9px 12px' }}>
                    <div style={{ fontSize: 9.5, fontWeight: 800, color: 'var(--red)', letterSpacing: '.05em' }}>DRAWN BY</div>
                    <div style={{ fontSize: 14, fontWeight: 700, marginTop: 3 }}>
                      {ownersOf(koOut.code).map(p => p.name).join(', ')}
                    </div>
                  </div>
                )}
              </Cwi>

              {openMarkets.length > 0 && <>
                <SHwi aside={openMarkets.length + ' unresolved'}>Predictions still alive</SHwi>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 7 }}>
                  {openMarkets.map(m => (
                    <Chwi key={m.key} tone="ghost">{m.label}</Chwi>
                  ))}
                </div>
              </>}
            </>
          )}

          <div style={{ height: 28 }} />
        </div>
      </div>
    </div>
  );

  const root = document.getElementById('root');
  return root ? ReactDOM.createPortal(content, root) : content;
}

window.WhatIfSheet = WhatIfSheet;

</script>

<script type="text/babel">
/* ===========================================================================
    ADMIN — Wheesht's clipboard. Run the sweepstake through the tournament:
    set the phase, mark teams out (owners flip to eliminated automatically),
    enter match results (fixtures go live / done), and set prediction answers
    (everyone's score + the league re-grade instantly). All changes persist via
    Store and, in live mode, push to the backend so every device picks them up.
    =========================================================================== */
const WCa = window.WC;
const Wa = window.Wheesht;
const Sa = window.Store;
const { Card: Ca, Btn: Ba, Flag: Fa, Chip: Cha, SectionHead: SHa } = window;
const { useState: aState2 } = React;

function adminTeam(code) {
  return WCa.TEAMS[code] || { code: code || 'TBD', name: code || 'To be decided', flag: '🏳️' };
}

/* ---- match banter ----------------------------------------------------------
    When the organiser saves a full-time score, Wheesht pipes up in the house
    voice: homeland bias for Scotland, dry "remaining professional" digs at
    England, plain dry wit for everyone else. Returns {text, mood} for wcToast. */
function matchBanter(f, a, b) {
   const ta = WCa.TEAMS[f.a], tb = WCa.TEAMS[f.b];
   const na = ta ? ta.name : f.a, nb = tb ? tb.name : f.b;
   const draw = a === b, aWin = a > b, margin = Math.abs(a - b);
   const wName = aWin ? na : nb, lName = aWin ? nb : na;
   const pick = arr => arr[(Math.random() * arr.length) | 0];

   if (f.a === 'SCO' || f.b === 'SCO') {
     const scoWon = (f.a === 'SCO' && aWin) || (f.b === 'SCO' && !aWin);
     const other = f.a === 'SCO' ? nb : na;
     if (draw) return { text: pick([
       'Scotland hold ' + other + ' to a draw. A point is a point. Wheesht will take it.',
       'Honours even for Scotland. Wheesht is calling that a moral victory.'
     ]), mood: 'confident' };
     if (scoWon) return { text: pick([
       'SCOTLAND WIN, ' + a + '–' + b + '. Wheesht is not greetin\'. Wheesht has something in its eye.',
       'Scotland see off ' + other + '. Write it down. Frame it. Wheesht aye believed.',
       'The homeland delivers. ' + other + ' sent homeward tae think again.'
     ]), mood: 'scottish' };
     return { text: pick([
       'Scotland fall to ' + other + '. Wheesht expected nothing and is somehow still disappointed.',
       'A gallant Scotland defeat — the most Scottish result there is. Wheesht endures.',
       'Scotland lose. Wheesht is fine. Wheesht is always fine. (Wheesht is not fine.)'
     ]), mood: 'crying' };
   }

   if (f.a === 'ENG' || f.b === 'ENG') {
     const engWon = (f.a === 'ENG' && aWin) || (f.b === 'ENG' && !aWin);
     const other = f.a === 'ENG' ? nb : na;
     if (draw) return { text: 'England draw with ' + other + '. Wheesht is remaining professional. Barely.', mood: 'mischievous' };
     if (engWon) return { text: pick([
       'England beat ' + other + '. Wheesht is noting it down. Without comment. For now.',
       'England win. Wheesht is remaining professional. It is costing Wheesht dearly.'
     ]), mood: 'mischievous' };
     return { text: pick([
       'England lose to ' + other + '. Wheesht is staying neutral. Wheesht is struggling.',
       other + ' see off England. Wheesht has no comment — and a small, private smile.'
     ]), mood: 'smug' };
   }

   if (draw) return { text: pick([
     na + ' and ' + nb + ' share the points, ' + a + '–' + b + '. Wheesht has seen worse.',
     'All square: ' + na + ' ' + a + '–' + b + ' ' + nb + '. Result logged.'
   ]), mood: 'neutral' };
   if (margin >= 3) return { text: pick([
     wName + ' take ' + lName + ' apart, ' + a + '–' + b + '. Wheesht almost felt sorry for them. Almost.',
     'A rout. ' + wName + ' run riot against ' + lName + '. Wheesht is impressed and a wee bit frightened.'
   ]), mood: 'shocked' };
   return { text: pick([
     wName + ' edge ' + lName + ', ' + a + '–' + b + '. Result logged. Wheesht remembers everything.',
     wName + ' take it. ' + lName + ' will have words in the dressing room. Wheesht logged it.'
   ]), mood: 'confident' };
}

function PhaseSeg() {
   const cur = Sa.phase();
   const opts = [['pre', 'Pre-kickoff'], ['live', 'In play'], ['done', 'Finished']];
   return (
     <div style={{ display: 'flex', gap: 8 }}>
       {opts.map(([k, lab]) => (
         <button key={k} onClick={() => Sa.setPhase(k)} className="wc-btn wc-btn--sm"
           style={{ flex: 1, background: cur === k ? 'var(--yellow)' : '#fff', boxShadow: cur === k ? '0 4px 0 var(--ink)' : '0 4px 0 var(--shadow)' }}>{lab}</button>
       ))}
     </div>
   );
}

function TeamToggle(props) {
   const t = props.t; const owners = props.owners;
   return (
     <div style={{ display: 'flex', alignItems: 'center', gap: 9, padding: '8px 4px', borderBottom: '1.5px solid var(--line)', opacity: t.alive ? 1 : .6 }}>
       <Fa team={t} size={22} />
       <div style={{ flex: 1, minWidth: 0 }}>
         <div style={{ fontWeight: 800, fontSize: 13.5, textDecoration: t.alive ? 'none' : 'line-through' }}>{t.name}</div>
         {owners > 0 && <div style={{ fontSize: 10.5, fontWeight: 800, color: 'var(--red)' }}>{owners} in the draw</div>}
       </div>
       <button onClick={() => Sa.setTeamOut(t.code, t.alive)} className="wc-btn wc-btn--sm"
         style={{ padding: '6px 12px', background: t.alive ? '#fff' : 'var(--ink)', color: t.alive ? 'var(--ink)' : '#fff', boxShadow: t.alive ? '0 3px 0 var(--shadow)' : '0 3px 0 #000' }}>
         {t.alive ? 'Knock out' : 'Bring back'}
       </button>
     </div>
   );
}

function ScoreStepper(props) {
   const [a, setA] = aState2(props.a); const [b, setB] = aState2(props.b);
   const ta = adminTeam(props.f.a), tb = adminTeam(props.f.b);
   function step(box, setter, val, d) { var n = Math.max(0, val + d); setter(n); }
   const num = { width: 34, textAlign: 'center', fontFamily: 'var(--disp)', fontWeight: 800, fontSize: 22 };
   const sbtn = { width: 28, height: 28, borderRadius: 8, border: '2px solid var(--ink)', background: '#fff', fontWeight: 900, fontSize: 16, cursor: 'pointer', lineHeight: 1 };
   return (
     <div style={{ marginTop: 10, background: 'var(--bg)', borderRadius: 12, padding: '12px' }}>
       {[[ta, a, setA], [tb, b, setB]].map(([t, v, set], i) => (
         <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: i === 0 ? 8 : 0 }}>
           <span style={{ fontSize: 20 }}>{t.flag}</span>
           <span style={{ flex: 1, fontWeight: 800, fontSize: 14 }}>{t.name}</span>
           <button style={sbtn} onClick={() => step(i, set, v, -1)}>–</button>
           <span style={num}>{v}</span>
           <button style={sbtn} onClick={() => step(i, set, v, 1)}>+</button>
         </div>
       ))}
       <div style={{ display: 'flex', gap: 8, marginTop: 11 }}>
         <Ba variant="ink" sm block onClick={() => props.onSave(a, b)}>Save full-time</Ba>
         <button onClick={props.onCancel} className="wc-btn wc-btn--sm" style={{ boxShadow: '0 4px 0 var(--shadow)', padding: '0 14px' }}>Cancel</button>
       </div>
     </div>
   );
}

function FixtureAdminRow(props) {
   const f = props.f; const [open, setOpen] = aState2(false);
   const ta = adminTeam(f.a), tb = adminTeam(f.b);
   const st = f.status || 'upcoming';
   return (
     <Ca flat style={{ padding: '11px 13px', marginBottom: 8 }}>
       <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
         <div style={{ display: 'flex', gap: 5, alignItems: 'center', flex: 1, minWidth: 0 }}>
           <span style={{ fontSize: 18 }}>{ta.flag}</span>
           <span style={{ fontWeight: 800, fontSize: 13, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{ta.code}</span>
           <span style={{ color: 'var(--ink2)', fontWeight: 800, fontSize: 12, padding: '0 2px' }}>
             {st === 'done' && f.score ? f.score[0] + '–' + f.score[1] : 'v'}
           </span>
           <span style={{ fontWeight: 800, fontSize: 13, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{tb.code}</span>
           <span style={{ fontSize: 18 }}>{tb.flag}</span>
         </div>
         {st === 'done'
           ? <Cha tone="ink">FT</Cha>
           : st === 'halfTime'
             ? <Cha tone="yellow">HT</Cha>
           : st === 'live'
             ? <span style={{ fontSize: 10.5, fontWeight: 800, color: 'var(--red)' }}>● LIVE</span>
             : <span style={{ fontSize: 11, fontWeight: 700, color: 'var(--ink2)' }}>{f.time}</span>}
       </div>
       <div style={{ display: 'flex', alignItems: 'center', gap: 7, marginTop: 8 }}>
         <span style={{ fontSize: 10.5, fontWeight: 700, color: 'var(--ink2)', flex: 1 }}>Gp {f.group} · {f.dateLabel}</span>
         {st !== 'done' && <button onClick={() => Sa.setFixtureLive(f.id, st !== 'live' && st !== 'halfTime')} className="wc-btn wc-btn--sm" style={{ padding: '5px 10px', boxShadow: '0 3px 0 var(--shadow)' }}>{st === 'upcoming' ? 'Go live' : 'Go back'}</button>}
         <button onClick={() => setOpen(!open)} className="wc-btn wc-btn--sm" style={{ padding: '5px 10px', boxShadow: '0 3px 0 var(--shadow)' }}>{st === 'done' ? 'Edit score' : 'Enter score'}</button>
         {st === 'done' && <button onClick={() => Sa.clearFixture(f.id)} className="wc-btn wc-btn--sm" style={{ padding: '5px 10px', boxShadow: '0 3px 0 var(--shadow)' }}>Undo</button>}
       </div>
       {open && <ScoreStepper f={f} a={f.score ? f.score[0] : 0} b={f.score ? f.score[1] : 0}
         onSave={(a, b) => {
           Sa.setFixtureResult(f.id, a, b);
           setOpen(false);
           const bn = matchBanter(f, a, b);
           if (window.wcToast) window.wcToast(bn.text, bn.mood);
         }} onCancel={() => setOpen(false)} />}
     </Ca>
   );
}

function PredAdmin(props) {
   const m = props.m;
   function label(opt) {
     if (m.kind === 'player') return opt.name;
     if (m.kind === 'stage') return opt;
     return WCa.TEAMS[opt] ? WCa.TEAMS[opt].name : opt;
   }
   function id(opt) { return m.kind === 'player' ? opt.id : opt; }
   const isTwo = m.kind === 'team2';
   const isNumber = m.kind === 'number';
   const ans = m.answer;
   const hiddenPreds = Sa.hiddenPredictions ? Sa.hiddenPredictions() : [];
   const isHidden = hiddenPreds.indexOf(m.key) >= 0;
   function choose(oid) {
     if (isTwo) {
       let arr = Array.isArray(ans) ? ans.slice() : [];
       if (arr.indexOf(oid) >= 0) arr = arr.filter(x => x !== oid); else { arr.push(oid); if (arr.length > 2) arr.shift(); }
       Sa.setPredictionAnswer(m.key, arr.length ? arr : null);
     } else Sa.setPredictionAnswer(m.key, ans === oid ? null : oid);
   }
   const picked = (oid) => isTwo ? (Array.isArray(ans) && ans.indexOf(oid) >= 0) : ans === oid;
   function setNumberAnswer(v) {
     if (v === '') Sa.setPredictionAnswer(m.key, null);
     else Sa.setPredictionAnswer(m.key, Number(v));
   }
   return (
     <Ca flat style={{ padding: '11px 13px', marginBottom: 8, opacity: isHidden ? 0.55 : 1 }}>
       <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8, gap: 8 }}>
         <div className="dh" style={{ fontSize: 15, flex: 1 }}>{m.q}</div>
         <button onClick={() => Sa.togglePredictionHidden(m.key)} className="wc-btn wc-btn--sm"
           style={{ background: isHidden ? 'var(--ink)' : '#fff', color: isHidden ? '#fff' : 'var(--ink)', border: '2px solid var(--ink)', fontSize: 11, padding: '4px 9px', flexShrink: 0 }}>
           {isHidden ? 'Hidden' : 'Visible'}
         </button>
         <Cha tone={ans != null && (!isTwo || ans.length) ? 'green' : 'ghost'}>{ans != null && (!isTwo || ans.length) ? 'set' : 'open'}</Cha>
       </div>
       {!isHidden && isNumber && (
         <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
           <input
             type="number"
             min="0"
             step="1"
             value={ans == null ? '' : ans}
             onChange={e => setNumberAnswer(e.target.value)}
             placeholder={m.placeholder || 'Set result'}
             style={{ flex: 1, border: '2px solid var(--ink)', borderRadius: 10, padding: '8px 10px', fontFamily: 'var(--body)', fontWeight: 800, fontSize: 14, outline: 'none', background: '#fff' }}
           />
           {ans != null && <button onClick={() => Sa.setPredictionAnswer(m.key, null)} className="wc-btn wc-btn--sm">Clear</button>}
         </div>
       )}
       {!isHidden && !isNumber && <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
         {(m.options || []).map((opt, i) => {
           const on = picked(id(opt));
           return <button key={i} onClick={() => choose(id(opt))}
             style={{ border: '2px solid ' + (on ? 'var(--ink)' : 'var(--line)'), background: on ? 'var(--yellow)' : '#fff', borderRadius: 10, padding: '6px 10px', fontFamily: 'var(--body)', fontWeight: 700, fontSize: 13, cursor: 'pointer' }}>{label(opt)}</button>;
         })}
       </div>}
       {isHidden && <div style={{ fontSize: 11.5, fontWeight: 600, color: 'var(--ink2)' }}>Hidden from players. Tap Visible to re-enable.</div>}
     </Ca>
   );
}

function moneyAdmin(n) {
   return '£' + (Math.round(Number(n || 0) * 100) / 100).toLocaleString('en-GB', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
}

function SettingsAdmin() {
   const [, bump] = aState2(0);
   React.useEffect(() => Sa.subscribe(() => bump(x => x + 1)), []);
   const feeNow = Sa.entryFee ? Sa.entryFee() : WCa.FEE;
   const [fee, setFee] = aState2(String(feeNow || 0));
   React.useEffect(() => setFee(String(feeNow || 0)), [feeNow]);
   const locationsNow = Sa.locations ? Sa.locations() : ['Edinburgh', 'London'];
   const [locInput, setLocInput] = aState2(locationsNow.join(', '));
   React.useEffect(() => setLocInput(locationsNow.join(', ')), [locationsNow.join(',')]);
   const entrants = Sa.allSync().length;
   const split = Sa.charitySplit ? Sa.charitySplit() : 0.5;
   const purpose = Sa.purpose ? Sa.purpose() : 'work';
   const includeDept = Sa.includeDepartment ? Sa.includeDepartment() : true;
   const includeLocation = Sa.includeLocation ? Sa.includeLocation() : true;
   const includeLtMember = Sa.includeLtMember ? Sa.includeLtMember() : true;
   const locationsFreeText = Sa.locationsFreeText ? Sa.locationsFreeText() : false;
   const predDeadlineNow = Sa.predDeadline ? Sa.predDeadline() : null;
   const [predDeadlineInput, setPredDeadlineInput] = aState2(predDeadlineNow ? predDeadlineNow.slice(0, 16) : '');
   React.useEffect(() => setPredDeadlineInput(predDeadlineNow ? predDeadlineNow.slice(0, 16) : ''), [predDeadlineNow]);
   function saveDeadline() {
     const val = predDeadlineInput.trim();
     if (val) {
       const dt = new Date(val);
       if (isNaN(dt.getTime())) return;
       Sa.setPredDeadline(dt.toISOString());
       if (window.wcToast) window.wcToast('Prediction deadline set.', 'confident');
     } else {
       Sa.setPredDeadline(null);
       if (window.wcToast) window.wcToast('Deadline cleared.', 'neutral');
     }
   }
   const n = Number(fee);
   const feeNum = isFinite(n) && n >= 0 ? n : feeNow;
   const gross = entrants * feeNum;
   const charity = gross * split;
   const winner = gross * (1 - split);
   const fld = { width: '100%', border: '2.5px solid var(--ink)', borderRadius: 12, padding: '11px 13px', fontFamily: 'var(--disp)', fontWeight: 800, fontSize: 22, outline: 'none', background: '#fff' };
   function saveFee() {
     const val = Number(fee);
     if (!isFinite(val) || val < 0) { setFee(String(feeNow || 0)); return; }
     Sa.setEntryFee(val);
     if (window.wcToast) window.wcToast('Entry fee set to £' + val.toLocaleString('en-GB'), 'confident');
   }
   function saveLocations() {
     const arr = locInput.split(',').map(s => s.trim()).filter(Boolean);
     if (!arr.length) return;
     Sa.setLocations(arr);
     if (window.wcToast) window.wcToast(arr.length + ' location' + (arr.length > 1 ? 's' : '') + ' saved.', 'confident');
   }
   function toggleRow(onClick, on, title, text) {
     return <button onClick={onClick} style={{ width: '100%', display: 'flex', alignItems: 'center', gap: 11, textAlign: 'left', border: '2px solid var(--line)', borderRadius: 13, background: '#fff', padding: '11px 12px', cursor: 'pointer', marginBottom: 8 }}>
       <span style={{ width: 42, height: 24, borderRadius: 999, background: on ? 'var(--green)' : 'var(--line)', border: '2px solid var(--ink)', position: 'relative', flex: '0 0 auto' }}>
         <span style={{ position: 'absolute', top: 2, left: on ? 20 : 2, width: 16, height: 16, borderRadius: '50%', background: '#fff', border: '2px solid var(--ink)' }} />
       </span>
       <span style={{ flex: 1, minWidth: 0 }}>
         <span className="dh" style={{ display: 'block', fontSize: 15 }}>{title}</span>
         <span style={{ display: 'block', fontSize: 12, fontWeight: 600, color: 'var(--ink2)', marginTop: 2, lineHeight: 1.3 }}>{text}</span>
       </span>
     </button>;
   }
   const splitPct = Math.round(split * 100);
   return (
     <>
       <Ca bordered style={{ background: 'var(--yellow)', marginBottom: 12 }}>
         <div style={{ fontSize: 11, fontWeight: 800, letterSpacing: '.06em', textTransform: 'uppercase' }}>Entry fee</div>
         <div style={{ display: 'flex', gap: 9, alignItems: 'center', marginTop: 7 }}>
           <span className="dh" style={{ fontSize: 24 }}>£</span>
           <input type="number" min="0" step="0.5" value={fee} onChange={e => setFee(e.target.value)} style={fld} />
           <button onClick={saveFee} className="wc-btn wc-btn--sm wc-btn--ink" style={{ flex: '0 0 auto' }}>Save</button>
         </div>
         <div style={{ fontSize: 12.5, fontWeight: 700, color: 'var(--ink2)', marginTop: 9 }}>{entrants} entrants at {moneyAdmin(feeNum)} each.</div>
       </Ca>

       <Ca flat style={{ padding: '12px 13px', marginBottom: 12 }}>
         {[
           ['Total collected', gross, 'var(--ink)'],
           ['Winner fund', winner, 'var(--green)'],
           ['Charity fund', charity, 'var(--red)'],
         ].map((r, i) => (
           <div key={r[0]} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: i ? '8px 0 0' : '0', borderTop: i ? '1.5px solid var(--line)' : 'none', marginTop: i ? 8 : 0 }}>
             <span style={{ flex: 1, fontSize: 13, fontWeight: 800, color: 'var(--ink2)' }}>{r[0]}</span>
             <span className="dh" style={{ fontSize: 19, color: r[2] }}>{moneyAdmin(r[1])}</span>
           </div>
         ))}
       </Ca>

       <SHa>Charity split</SHa>
       <div style={{ display: 'flex', gap: 7, marginBottom: 8 }}>
         {[0, 25, 50, 75, 100].map(pct => (
           <button key={pct} onClick={() => Sa.setCharitySplit(pct / 100)} className="wc-btn wc-btn--sm"
             style={{ flex: 1, background: splitPct === pct ? 'var(--yellow)' : '#fff', boxShadow: splitPct === pct ? '0 4px 0 var(--ink)' : '0 4px 0 var(--shadow)' }}>
             {pct}%
           </button>
         ))}
       </div>
       <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--ink2)', marginBottom: 16, lineHeight: 1.4 }}>
         {split < 0.01 ? 'No charity split — everything goes to the winner.' : split > 0.99 ? 'All entry fees go to charity. No winner fund.' : splitPct + '% of each entry goes to charity, the rest to the winner.'}
       </div>

       <SHa>Sweepstake type</SHa>
       <div style={{ display: 'flex', gap: 8, marginBottom: 8 }}>
         {[['work', 'Work'], ['friends', 'Friends & family']].map(([k, lab]) => (
           <button key={k} onClick={() => Sa.setPurpose(k)} className="wc-btn wc-btn--sm"
             style={{ flex: 1, background: purpose === k ? 'var(--yellow)' : '#fff', boxShadow: purpose === k ? '0 4px 0 var(--ink)' : '0 4px 0 var(--shadow)' }}>
             {lab}
           </button>
         ))}
       </div>
       <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--ink2)', marginBottom: 16, lineHeight: 1.4 }}>
         {purpose === 'work' ? 'Shows department, location and LT fields. You can toggle them individually below.' : 'Just names — no work details collected. Individual toggles below still apply.'}
       </div>

       <SHa>Locations</SHa>
       <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--ink2)', marginBottom: 8, lineHeight: 1.4 }}>List your offices or locations, separated by commas. People pick from these when signing up.</div>
       <div style={{ display: 'flex', gap: 7, alignItems: 'center', marginBottom: 8 }}>
         <input value={locInput} onChange={e => setLocInput(e.target.value)}
           onKeyDown={e => e.key === 'Enter' && saveLocations()}
           style={{ flex: 1, border: '2px solid var(--ink)', borderRadius: 11, padding: '9px 12px', fontFamily: 'var(--body)', fontWeight: 600, fontSize: 14, outline: 'none', background: '#fff' }}
           placeholder="e.g. Edinburgh, London, Remote" />
         <button onClick={saveLocations} className="wc-btn wc-btn--sm wc-btn--ink">Save</button>
       </div>
       {toggleRow(
         () => Sa.setLocationsFreeText(!locationsFreeText),
         locationsFreeText,
         'Allow custom location',
         locationsFreeText ? 'People can type their own location (your list shows as suggestions).' : 'People must pick from your list above.'
       )}

       <SHa>Predictions deadline</SHa>
       <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--ink2)', marginBottom: 8, lineHeight: 1.4 }}>Set a cut-off date and time. Predictions lock automatically once it passes.</div>
       <div style={{ display: 'flex', gap: 7, alignItems: 'center', marginBottom: 6 }}>
         <input
           type="datetime-local"
           value={predDeadlineInput}
           onChange={e => setPredDeadlineInput(e.target.value)}
           style={{ flex: 1, border: '2px solid var(--ink)', borderRadius: 11, padding: '9px 12px', fontFamily: 'var(--body)', fontWeight: 600, fontSize: 14, outline: 'none', background: '#fff' }}
         />
         <button onClick={saveDeadline} className="wc-btn wc-btn--sm wc-btn--ink">Set</button>
         {predDeadlineNow && <button onClick={() => { setPredDeadlineInput(''); Sa.setPredDeadline(null); if (window.wcToast) window.wcToast('Deadline cleared.', 'neutral'); }} className="wc-btn wc-btn--sm">Clear</button>}
       </div>
       {predDeadlineNow && (() => {
         const past = new Date() > new Date(predDeadlineNow);
         return <div style={{ fontSize: 12, fontWeight: 700, color: past ? 'var(--red)' : 'var(--ink2)', marginBottom: 16 }}>
           {past ? 'Locked — deadline has passed.' : 'Locks at ' + new Date(predDeadlineNow).toLocaleString('en-GB', { dateStyle: 'medium', timeStyle: 'short' }) + '.'}
         </div>;
       })()}
       {!predDeadlineNow && <div style={{ height: 16 }} />}

       <SHa>Signup fields</SHa>
       {toggleRow(

}

           <div style={{ fontSize: 11.5, fontWeight: 700, color: 'var(--yellow)' }}>{(Sa.activeLeague && Sa.activeLeague()) ? Sa.activeLeague().name : 'Admin'} · {allPeople.length} entrants</div>
         </div>
         <button onClick={props.onClose} style={{ border: 'none', background: 'rgba(255,255,255,.16)', color: '#fff', width: 34, height: 34, borderRadius: 10, fontSize: 18, fontWeight: 900, cursor: 'pointer', padding: 0 }}>✕</button>

function PeopleAdmin() {

   const includeDept = Sa.includeDepartment ? Sa.includeDepartment() : true;
   const all = Sa.allSync().slice().sort((a, b) => (a.name || '').localeCompare(b.name || ''));
   const list = q.trim() ? all.filter(p => (p.name || '').toLowerCase().indexOf(q.toLowerCase()) >= 0) : all;
   const fld = { width: '100%', border: '2.5px solid var(--ink)', borderRadius: 12, padding: '10px 13px', fontFamily: 'var(--body)', fontWeight: 600, fontSize: 15, outline: 'none', marginBottom: 12 };
   function remove(p) {
     if (window.confirm('Remove ' + (p.name || 'this entrant') + ' from the sweepstake? This frees their entry and adjusts the pot.')) Sa.removeParticipant(p.id);
   }
   function resetPw(p) {
     if (window.confirm("Clear " + (p.name || 'this entrant') + "'s password? They'll be able to set a new one and sign in again.")) {
       Promise.resolve(Sa.setAccountPassword(p.id, { newPassword: '' })).then(function () {
         if (window.wcToast) window.wcToast('Password cleared for ' + (p.name || 'entrant') + '.', 'neutral');
       });
     }
   }
   function clearPhoto(p) {
     if (window.confirm("Remove " + (p.name || 'this entrant') + "'s photo?")) {
       Promise.resolve(Sa.removeAvatar(p.id)).then(function () {
         if (window.wcToast) window.wcToast('Photo removed.', 'neutral');
       });
     }
   }
   return (
     <>
       <div style={{ fontSize: 12.5, fontWeight: 600, color: 'var(--ink2)', marginBottom: 10 }}>Remove an entrant — say they dropped out or paid late. Frees their slot and trims the pot &amp; charity.</div>
       <input style={fld} placeholder="Search entrants…" value={q} onChange={e => setQ(e.target.value)} />
