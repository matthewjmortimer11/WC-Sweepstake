    filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}
`;

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

    segs.forEach(s=>{ const ra=WC.rate(s.a.list),rb=WC.rate(s.b.list); const g=Math.abs(ra-rb); if(g>gap){gap=g;worst= ra<rb? s.a.name : s.b.name;} });
    return worst;
  })();
  return (
    <Card>
      <div className="dh" style={{fontSize:17,marginBottom:2}}>Who’s surviving?</div>
      <div style={{fontSize:12,fontWeight:600,color:'var(--ink2)',marginBottom:6}}>Survival rate, head to head.</div>

  );

/* =================== TRACKER (who's still in) =================== */
function FieldCard(){
  const P = window.Store ? window.Store.allSync() : WC.PEOPLE;
  const maxTeams = (WC.meta && WC.meta.maxTeams) || WC.TEAM_LIST.length;
  const claimed = new Set(P.map(p=>p.team)); const distinct = claimed.size;
  const remaining = Math.max(0, maxTeams - distinct);
  const sharing = distinct >= maxTeams;
  const rows = [
    {label:'Entrants', n:P.length, sub:'and counting', c:'var(--ink)'},
    {label:'Countries claimed', n:distinct, sub:'of '+maxTeams, c:'var(--yellow)'},
    {label:sharing?'Doubled up':'Up for grabs', n:sharing?(P.length-distinct):remaining, sub:sharing?'countries shared':'still free', c:'var(--green)'},
  ];
  return (
    <Card bordered>
      <div className="dh" style={{fontSize:17,marginBottom:2}}>The field so far</div>
      <div style={{fontSize:12,fontWeight:600,color:'var(--ink2)',marginBottom:12}}>Not a ball kicked — everyone’s still in. The pot grows with every sign-up.</div>
      <div style={{display:'flex',gap:9}}>
        {rows.map((s,i)=>(
          <div key={i} style={{flex:1,background:'var(--bg)',border:'2px solid var(--line)',borderRadius:13,padding:'11px 8px',textAlign:'center'}}>

function TrackerScreen(){
  const [filter,setFilter]=uState('all');
  const [dept,setDept]=uState('');
  const pre = WC.meta.phase === 'pre';
  const P = window.Store ? window.Store.allSync() : WC.PEOPLE;
  const youId = window.Store ? window.Store.activeId() : null;
  const includeDept = window.Store && window.Store.includeDepartment ? window.Store.includeDepartment() : true;
  React.useEffect(function(){ if(!includeDept) setDept(''); }, [includeDept]);
  const depts = Array.from(new Set(P.map(p=>p.department).filter(Boolean))).sort();
  const filters=[['all','Everyone'],['in','Still in'],['out','Out'],['London','London'],['Edinburgh','Edinburgh'],['lt','LT members']];
  let list=P.slice();
  if(filter==='in') list=list.filter(p=>p.alive);
  else if(filter==='out') list=list.filter(p=>!p.alive);
  else if(filter==='London'||filter==='Edinburgh') list=list.filter(p=>(p.location||p.city)===filter);
  else if(filter==='lt') list=list.filter(p=>p.ltMember||p.leadership);
  if(includeDept && dept) list=list.filter(p=>p.department===dept);
  list.sort((a,b)=>{ if(a.id===youId)return -1; if(b.id===youId)return 1; return (WC.TEAMS[b.team]||{rounds:0}).rounds-(WC.TEAMS[a.team]||{rounds:0}).rounds; });

        : <WheeshtSays mood="confident" label="broadcast mode" animate>The field’s thinning. <b>England</b> just went. Wheesht is, of course, saying nothing.</WheeshtSays>}
      <div style={{display:'flex',gap:7,overflowX:'auto',padding:'16px 0 10px',margin:'0 -2px'}}>
        {filtersShown.map(([k,lab])=>(
          <button key={k} onClick={()=>setFilter(k)} className={'wc-chip'+(filter===k?' wc-chip--yellow':'')} style={{whiteSpace:'nowrap',cursor:'pointer',flex:'0 0 auto'}}>{lab}</button>
        ))}
      </div>
      {includeDept && <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:6}}>
        <span style={{fontSize:12,fontWeight:800,color:'var(--ink2)'}}>Dept</span>
        <select value={dept} onChange={e=>setDept(e.target.value)} style={{flex:1,border:'2px solid var(--line)',borderRadius:10,padding:'7px 10px',fontFamily:'var(--body)',fontWeight:700,fontSize:13,background:'#fff',color:'var(--ink)'}}>
          <option value="">All departments</option>
          {depts.map(d=><option key={d} value={d}>{d}</option>)}
        </select>
      </div>}
      <Card flat style={{padding:'4px 14px'}}>
        {list.map(p=><PersonRow key={p.id} person={p} you={p.id===youId} pre={pre}/>)}
      </Card>
    </div>
  );
}

window.DashboardScreen = DashboardScreen;
window.TrackerScreen = TrackerScreen;

/* =================== THE VERDICT ===================
   Wheesht's running commentary — built ENTIRELY from what the organiser has
   actually entered (real fixtures/scores, real eliminations, a declared
   champion). Nothing is fabricated: if a result hasn't been logged, it isn't
   shown. Empty states keep the page honest before the football catches up. */

function vPeople(){ return window.Store ? window.Store.allSync() : (WC2.PEOPLE || []); }
function vTeam(code){ return WC2.TEAMS[code] || { code: code || '?', name: code || 'TBD', flag: '🏳️', group: '?', odds: '0', alive: true, rounds: 0 }; }
function vOwners(code){ return vPeople().filter(function(p){ return p.team === code; }); }
function vDoneFixtures(){ return (WC2.FIXTURES || []).filter(function(f){ return f.status === 'done' && f.score; }); }
function vAnswer(key){ const m = (WC2.PREDICTIONS || []).find(function(x){ return x.key === key; }); return m ? m.answer : null; }
function vEliminated(){ return WC2.TEAM_LIST.filter(function(t){ return !t.alive; }); }
function vPot(){ return window.Store ? window.Store.pot() : WC2.POT * 0.5; }
function vCharity(){ return window.Store ? window.Store.charity() : WC2.POT * 0.5; }

/* A short, in-voice line for a logged result — homeland bias, dry on England. */
function vResultNote(f){
  const a = f.score[0], b = f.score[1];
  const ta = vTeam(f.a), tb = vTeam(f.b);
  const draw = a === b, aWin = a > b;
  const wN = aWin ? ta.name : tb.name, lN = aWin ? tb.name : ta.name;
  if (f.a === 'SCO' || f.b === 'SCO'){
    const scoWon = (f.a === 'SCO' && aWin) || (f.b === 'SCO' && !aWin);
    if (draw) return 'Scotland share the spoils. Wheesht calls it a moral victory.';
    return scoWon ? 'The homeland delivers. Wheesht needs a quiet minute.' : 'Scotland fall. Wheesht is fine. Wheesht is always fine.';
  }
  if (f.a === 'ENG' || f.b === 'ENG'){
    const engWon = (f.a === 'ENG' && aWin) || (f.b === 'ENG' && !aWin);
    if (draw) return 'England draw. Wheesht is remaining professional. Barely.';
    return engWon ? 'England win. Wheesht is noting it down without comment.' : 'England lose. Wheesht has no comment — and a small, private smile.';
  }
  if (draw) return wN + ' and ' + lN + ' share the points. Wheesht has seen worse.';
  if (Math.abs(a - b) >= 3) return wN + ' take ' + lN + ' apart. Wheesht is a wee bit frightened.';
  return wN + ' edge ' + lN + '. Result logged. Wheesht remembers everything.';
}

}

function StandingsBlock(){
  // Pot / charity / entrants / fee — always true, drawn from live numbers.
  const P = vPeople();
  const pot = vPot(), char = vCharity();
  const cells = [];
  if (pot > 0) cells.push({ v: money2(pot), l: char > 0 ? 'winner takes all' : 'whole pot to the winner', c: 'var(--green)' });
  if (char > 0) cells.push({ v: money2(char), l: pot > 0 ? 'raised for charity' : 'whole pot to charity', c: 'var(--red)' });
  cells.push({ v: P.length, l: P.length === 1 ? 'entrant' : 'entrants', c: 'var(--ink)' });
  cells.push({ v: '£' + (WC2.FEE || 0), l: 'to enter', c: 'var(--ink)' });
  return (
    <>
      <SH2>Where it stands</SH2>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9}}>
        {cells.map(function(s,i){ return <StatCard key={i} value={s.v} label={s.l} color={s.c}/>; })}
      </div>
    </>
  );
}

/* ---- PRE: nothing has kicked off; keep it honest and inviting. ---- */
function PreVerdict(){
  const P = vPeople();

        <div className="dh" style={{fontSize:32,margin:'4px 0 2px',color:'#fff'}}>Not yet under way</div>

/* ---- The champion card — only painted when the organiser declares a winner. ---- */
function ChampionCard(){
  const code = vAnswer('winner');           // set in the organiser's clipboard
  if (!code) return null;
  const t = vTeam(code);
  const owners = vOwners(code);
  const win = vPot();
  return (
    <>
      <SH2>Champions of the world</SH2>
      <Card2 bordered className="pop" style={{background:'var(--yellow)',textAlign:'center',padding:'22px 18px'}}>
        <div style={{fontSize:56,lineHeight:1}}>{t.flag}</div>
        <div className="dh" style={{fontSize:34,marginTop:6}}>{t.name}</div>
        <div style={{fontSize:12.5,fontWeight:800,letterSpacing:'.05em',textTransform:'uppercase',color:'var(--ink2)',marginTop:4}}>Lift the trophy</div>
        {owners.length > 0 && (
          <div style={{marginTop:14,background:'var(--ink)',color:'#fff',borderRadius:16,padding:'13px 14px'}}>
            <div style={{fontSize:11,fontWeight:800,letterSpacing:'.05em',textTransform:'uppercase',color:'var(--yellow)'}}>Your sweepstake winner{owners.length>1?'s':''}</div>
            <div className="dh" style={{fontSize:24,margin:'4px 0',color:'#fff'}}>{owners.map(function(o){ return o.name; }).join(', ')}</div>
            <div className="dh" style={{fontSize:34,color:'var(--yellow)'}}>{money2(owners.length>1 ? win/owners.length : win)}</div>
            <div style={{fontSize:12,fontWeight:700,opacity:.8}}>held {t.name} from the very first draw. Insufferable. Deserved.</div>
          </div>
        )}
      </Card2>
    </>
  );
}

/* ---- LIVE / DONE: built from real, organiser-entered results. ---- */
function LiveVerdict(){
  const done = vDoneFixtures().slice().sort(function(a,b){ return (b.dateISO||'').localeCompare(a.dateISO||'') || (b.time||'').localeCompare(a.time||''); });
  const recent = done.slice(0, 6);
  const goals = done.reduce(function(s,f){ return s + (f.score[0]||0) + (f.score[1]||0); }, 0);
  const teamsLeft = WC2.TEAM_LIST.filter(function(t){ return t.alive; }).length;
  const elim = vEliminated().map(function(t){ return { t: t, owners: vOwners(t.code) }; }).filter(function(x){ return x.owners.length > 0; });
  const phaseDone = WC2.meta.phase === 'done';
  const hasResults = done.length > 0;

  return (
    <div className="pad">
      <VerdictHeader sub={phaseDone ? 'Full time on the whole thing — Wheesht’s last word.' : 'Wheesht’s running commentary, now the football has started.'}/>
      <Says2 mood="broadcast" label={phaseDone?'full time':'live'} animate>
        {phaseDone
          ? 'That’s yer lot. Wheesht has watched every minute, taken every note, and is ready to deliver the final word.'
          : 'The whistle’s gone. Wheesht is watching every one of ye, logging every result, and judging — gently, professionally, constantly.'}
      </Says2>

      <ChampionCard/>

      <SH2 aside={hasResults ? done.length + ' logged' : null}>What’s happened</SH2>
      {!hasResults
        ? <Card2 flat style={{textAlign:'center',padding:'26px 16px'}}>
            <W2 mood="neutral" size={56} animate/>
            <div className="dh" style={{fontSize:17,marginTop:6}}>No full-time results yet.</div>
            <div style={{fontSize:12.5,fontWeight:600,color:'var(--ink2)',marginTop:3}}>As the organiser logs scores in the clipboard, Wheesht’s verdict fills in here.</div>
          </Card2>
        : recent.map(function(f){
            const ta = vTeam(f.a), tb = vTeam(f.b);
            const aWin = f.score[0] > f.score[1], bWin = f.score[1] > f.score[0];
            return (
              <Card2 key={f.id} style={{marginBottom:9,padding:'12px 14px'}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:22}}>{ta.flag}</span>
                  <span style={{flex:1,fontWeight:800,fontSize:14,textAlign:'right',opacity:bWin?.5:1,textDecoration:bWin?'line-through':'none'}}>{ta.name}</span>
                  <span className="dh" style={{fontSize:20,padding:'0 4px'}}>{f.score[0]}–{f.score[1]}</span>
                  <span style={{flex:1,fontWeight:800,fontSize:14,opacity:aWin?.5:1,textDecoration:aWin?'line-through':'none'}}>{tb.name}</span>
                  <span style={{fontSize:22}}>{tb.flag}</span>
                </div>
                <div style={{display:'flex',gap:8,alignItems:'flex-start',marginTop:9,paddingTop:9,borderTop:'1.5px solid var(--line)'}}>
                  <span style={{fontSize:11,fontWeight:800,letterSpacing:'.05em',textTransform:'uppercase',color:'var(--red)',whiteSpace:'nowrap'}}>FT · Gp {f.group}</span>
                  <span style={{flex:1,fontSize:12.5,fontWeight:600,color:'var(--ink2)',lineHeight:1.32}}>{vResultNote(f)}</span>
                </div>
              </Card2>
            );
          })}

      <SH2>The damage</SH2>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9}}>
        <StatCard value={done.length} label={done.length===1?'game played':'games played'}/>
        <StatCard value={goals} label={goals===1?'goal scored':'goals scored'} color="var(--green)"/>
        <StatCard value={teamsLeft} label="teams still in"/>
        <StatCard value={elim.length} label="entrants knocked out" color={elim.length?'var(--red)':'var(--ink)'}/>
      </div>

      {elim.length > 0 && <>
        <SH2 aside="owners flip to the side game">Knocked out</SH2>
        <Card2 flat style={{padding:'4px 14px'}}>
          {elim.map(function(x,i){ return (
            <div key={x.t.code} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:i<elim.length-1?'1.5px solid var(--line)':'none'}}>
              <Flag2 team={x.t} size={24}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:800,fontSize:14,textDecoration:'line-through',textDecorationColor:'var(--red)'}}>{x.t.name}</div>
                <div style={{fontSize:11.5,fontWeight:700,color:'var(--ink2)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{x.owners.map(function(o){ return o.name; }).join(', ')}</div>
              </div>
              <Stamp2 tone="red" rotate={-5} style={{fontSize:10.5}}>OUT</Stamp2>
            </div>
          ); })}
        </Card2>
      </>}

      <StandingsBlock/>

      <div style={{height:16}}/>
      <Btn2 variant="ink" block onClick={function(){ window.wcConfetti&&window.wcConfetti({y:.5}); window.wcToast&&window.wcToast('Share card saved. Show the group chat who’s boss.','celebrating'); }}>Make my share card 📸</Btn2>
    </div>
  );
}

function SummaryScreen(props){
  return (WC2.meta.phase === 'pre') ? <PreVerdict/> : <LiveVerdict/>;
}

window.SideBetsScreen = SideBetsScreen;
window.SummaryScreen = SummaryScreen;

</script>

<script type="text/babel">
/* ===========================================================================
   ONBOARDING & IDENTITY SCREENS

const WCo = window.WC;
const Wo = window.Wheesht;
const So = window.Store;
const { Card: Co, Btn: Bo, Flag: Fo, Avatar: Ao, Chip: Cho, Stamp: Sto } = window;
const { useState: oState, useEffect: oEffect, useRef: oRef } = React;

const DEPTS = ['Engineering', 'Product', 'Design', 'Sales', 'Marketing', 'Finance', 'Legal', 'People', 'Operations', 'Data', 'Support', 'Delivery'];

const inp = {
  width: '100%', border: '2.5px solid var(--ink)', borderRadius: 13, padding: '13px 14px',

};
function Lab(p) { return <label style={{ fontWeight: 800, fontSize: 13, fontFamily: 'var(--disp)', letterSpacing: '.02em' }}>{p.children}{p.opt && <span style={{ color: 'var(--ink2)', fontWeight: 600 }}> · optional</span>}</label>; }
function Seg(p) {
  return <div style={{ display: 'flex', gap: 8, marginTop: 6 }}>
    {p.options.map(o => (
      <button key={o.value} onClick={() => p.onChange(o.value)} className="wc-btn wc-btn--sm"
        style={{ flex: 1, background: p.value === o.value ? 'var(--yellow)' : '#fff', boxShadow: p.value === o.value ? '0 4px 0 var(--ink)' : '0 4px 0 var(--shadow)' }}>
        {o.label}
      </button>

}

/* =================== ACCOUNT / LEAGUE GATE =================== */
function AccountGate(props) {
  // All device accounts across every league, so people can hop back in.
  const accounts = So.allDeviceAccounts ? So.allDeviceAccounts() : [];
  const leagues = So.knownLeagues ? So.knownLeagues() : {};
  return (
    <div className="moment">
      <div className="mscroll" style={{ padding: '34px 22px 28px' }}>
        <div style={{ textAlign: 'center' }}>
          <div style={{ display: 'inline-block' }} className="pop"><Wo mood="happy" size={148} animate track /></div>
          <div className="dh" style={{ fontSize: 30, marginTop: 8, lineHeight: 1 }}>{WCo.meta.name}</div>
          <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--ink2)', marginTop: 6 }}>{WCo.meta.season} · {WCo.meta.stageLabel}</div>
          <div style={{ display: 'inline-flex', marginTop: 14, background: 'var(--ink)', color: '#fff', borderRadius: '16px 16px 16px 5px', padding: '11px 15px', maxWidth: 320, textAlign: 'left' }}>
            <div style={{ fontSize: 14, fontWeight: 600, lineHeight: 1.35 }}><span style={{ color: 'var(--yellow)', fontWeight: 800 }}>Wheesht here.</span> Officially impartial. Constitutionally Scottish. Join a league or start your own.</div>
          </div>
        </div>

        {accounts.length > 0 && <>
          <div className="wc-sec" style={{ margin: '26px 4px 11px' }}><h3>Jump back in</h3><span>{accounts.length} on this device</span></div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 9 }}>
            {accounts.map(p => {
              const t = WCo.TEAMS[p.team];

              return <button key={p.id} onClick={() => props.onResume(p.id)} style={{ display: 'flex', alignItems: 'center', gap: 12, background: '#fff', border: '2.5px solid var(--ink)', borderRadius: 16, padding: '11px 13px', cursor: 'pointer', textAlign: 'left', boxShadow: '0 4px 0 var(--ink)' }}>
                <Ao person={p} size={44} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div className="dh" style={{ fontSize: 17 }}>{p.name}</div>
                  <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--ink2)' }}>{lg ? lg.name : (p.leagueCode || 'Sweepstake')}{t ? ' · ' + t.name : ''}</div>
                </div>
                {t && <Fo team={t} size={26} />}
                <span className="dh" style={{ fontSize: 20 }}>→</span>
              </button>;
            })}
          </div>
        </>}

        <div className="wc-sec" style={{ margin: '26px 4px 11px' }}><h3>{accounts.length ? 'Another league' : 'Get started'}</h3></div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          <Bo variant="ink" block onClick={props.onJoin}>Join a league →</Bo>
          <Bo variant="primary" block onClick={props.onCreate}>Create a new league →</Bo>
        </div>
      </div>
    </div>
  );
}

/* =================== JOIN A LEAGUE =================== */
function JoinLeague(props) {
  const [code, setCode] = oState('');
  const [pw, setPw] = oState('');
  const [err, setErr] = oState('');
  const [busy, setBusy] = oState(false);
  const ok = code.trim().length >= 2 && pw.length > 0;

  function submit() {
    if (!ok || busy) return;
    setBusy(true); setErr('');
    So.joinLeague(code.trim(), pw).then(function (res) {
      setBusy(false);
      props.onJoined(res.league);
    }).catch(function (e) {
      setBusy(false);
      setErr((e && e.message) || 'Could not join that league.');
    });
  }

  return (
    <div className="moment">
      <div className="mscroll" style={{ padding: '30px 22px 28px' }}>
        <button onClick={props.onBack} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 14, fontWeight: 800, color: 'var(--ink2)', padding: 0, marginBottom: 14 }}>← Back</button>
        <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
          <Wo mood="mischievous" size={72} animate />
          <div>
            <div className="dh" style={{ fontSize: 24, lineHeight: 1 }}>Join a league</div>
            <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--ink2)', marginTop: 4 }}>Enter the league code and password your organiser gave you.</div>
          </div>
        </div>
        <div style={{ marginTop: 20 }}>
          <Lab>League code</Lab>
          <input
            autoFocus
            style={{ ...inp, textTransform: 'uppercase', letterSpacing: '.14em', fontSize: 22, textAlign: 'center' }}
            value={code}
            onChange={e => { setCode(e.target.value); setErr(''); }}
            placeholder="e.g. OFFICE26"
            maxLength={12}
          />
        </div>
        <div style={{ marginTop: 14 }}>
          <Lab>Password</Lab>
          <input
            type="password"
            style={inp}
            value={pw}
            onChange={e => { setPw(e.target.value); setErr(''); }}
            onKeyDown={e => e.key === 'Enter' && submit()}
            placeholder="League password"
          />
        </div>
        {err && <div style={{ marginTop: 10, fontSize: 13, fontWeight: 700, color: 'var(--red)' }}>{err}</div>}
        <div style={{ marginTop: 18 }}>
          <Bo variant="ink" block onClick={submit}>{busy ? 'Checking…' : 'Join league →'}</Bo>
        </div>
        <button onClick={props.onCreate} style={{ width: '100%', marginTop: 12, background: 'none', border: 'none', cursor: 'pointer', fontSize: 13.5, fontWeight: 800, color: 'var(--ink2)', textDecoration: 'underline', padding: '4px 0' }}>No league yet? Create one</button>
      </div>
    </div>
  );
}

/* =================== CREATE A LEAGUE =================== */
function CreateLeague(props) {
  const [name, setName] = oState('');
  const [code, setCode] = oState('');
  const [pw, setPw] = oState('');
  const [err, setErr] = oState('');
  const [busy, setBusy] = oState(false);
  const cleanCode = code.trim().toUpperCase().replace(/[^A-Z0-9]/g, '');
  const ok = name.trim().length > 0 && cleanCode.length >= 2 && pw.length >= 4;

  function submit() {
    if (!ok || busy) return;
    setBusy(true); setErr('');
    So.createLeague(name.trim(), cleanCode, pw).then(function (res) {
      setBusy(false);
      props.onCreated(res.league);
    }).catch(function (e) {
      setBusy(false);
      setErr((e && e.message) || 'Could not create that league.');
    });
  }

  return (
    <div className="moment">
      <div className="mscroll" style={{ padding: '30px 22px 28px' }}>
        <button onClick={props.onBack} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 14, fontWeight: 800, color: 'var(--ink2)', padding: 0, marginBottom: 14 }}>← Back</button>
        <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
          <Wo mood="confident" size={72} animate />
          <div>
            <div className="dh" style={{ fontSize: 24, lineHeight: 1 }}>Create a league</div>
            <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--ink2)', marginTop: 4 }}>You'll be the organiser. Share the code and password with your group.</div>
          </div>
        </div>
        <div style={{ marginTop: 20, display: 'flex', flexDirection: 'column', gap: 14 }}>
          <div>
            <Lab>League name</Lab>
            <input autoFocus style={inp} value={name} onChange={e => { setName(e.target.value); setErr(''); }} placeholder="e.g. The Pub Quiz Crew" maxLength={60} />
          </div>
          <div>
            <Lab>League code</Lab>
            <input style={{ ...inp, textTransform: 'uppercase', letterSpacing: '.12em' }} value={code} onChange={e => { setCode(e.target.value); setErr(''); }} placeholder="e.g. PUBCREW" maxLength={12} />
            <div style={{ fontSize: 11.5, fontWeight: 600, color: 'var(--ink2)', marginTop: 4 }}>2–12 letters or numbers. People type this to join.</div>
          </div>
          <div>
            <Lab>Password</Lab>
            <input type="password" style={inp} value={pw} onChange={e => { setPw(e.target.value); setErr(''); }} onKeyDown={e => e.key === 'Enter' && submit()} placeholder="At least 4 characters" />
          </div>
        </div>
        {err && <div style={{ marginTop: 10, fontSize: 13, fontWeight: 700, color: 'var(--red)' }}>{err}</div>}
        <div style={{ marginTop: 18 }}>
          <Bo variant="ink" block onClick={() => ok && submit()}>{busy ? 'Creating…' : 'Create & continue →'}</Bo>
        </div>
      </div>
    </div>
  );
}

/* =================== FIND MY ENTRY =================== */
function FindMyEntry(props) {
  const [q, setQ] = oState('');

        <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>

          <div>
            <div className="dh" style={{ fontSize: 24, lineHeight: 1 }}>Find my entry</div>

              </div>
              {t && <Fo team={t} size={22} />}
              <span className="dh" style={{ fontSize: 16, color: 'var(--red)' }}>This is me →</span>
            </button>;
          })}
        </div>
      </div>
    </div>
  );
}

/* =================== ONBOARDING FORM =================== */
function OnboardingForm(props) {
  const [name, setName] = oState('');
  const [dept, setDept] = oState('');
  const includeDept = So.includeDepartment ? So.includeDepartment() : true;
  const includeLocation = So.includeLocation ? So.includeLocation() : true;
  const includeLtMember = So.includeLtMember ? So.includeLtMember() : true;
  const locationOpts = So.locations ? So.locations() : ['Edinburgh', 'London'];

  return (

        <div style={{ textAlign: 'center' }}>
          <div style={{ display: 'inline-block' }} className="pop"><Wo mood="confident" size={120} animate track /></div>
          <div className="dh" style={{ fontSize: 28, marginTop: 4, lineHeight: 1 }}>Let's get you signed up.</div>

        <div style={{ marginTop: 22, display: 'flex', flexDirection: 'column', gap: 16 }}>

            <Lab>Full name</Lab>
            <input autoFocus style={inp} value={name} onChange={e => setName(e.target.value)} placeholder="e.g. Alex Johnson" />
          </div>

/* =================== THE DRAW (with special events) =================== */
function DrawMoment(props) {
  const forceTeam = props.forceTeam || (props.participant && props.participant.team);
  const teams = WCo.TEAM_LIST;
  const target = teams.findIndex(t => t.code === forceTeam);
  const [phase, setPhase] = oState('ready'); // ready | rolling | revealed
  const [idx, setIdx] = oState(0);
  const timer = oRef(null);
  const t = WCo.TEAMS[forceTeam];
  const isSCO = forceTeam === 'SCO';
  const isENG = forceTeam === 'ENG';

  function verdict() {
    if (isSCO) return WCo.LINES.scotland;
    if (isENG) return WCo.LINES.england;
    const odds = parseInt(t.odds.slice(1), 10);
    return odds <= 2500 ? WCo.LINES.drawGood : odds <= 20000 ? WCo.LINES.drawMid : WCo.LINES.drawBad;
  }

  function spin() {
    setPhase('rolling');
    const fast = 22, slow = 12, total = fast + slow; let k = 0;
    function step() {
      k++;
      if (k >= total) {
        setIdx(target < 0 ? 0 : target); setPhase('revealed');
        if (isSCO) { /* takeover handles fx */ }
        else if (isENG) { window.wcToast && window.wcToast(WCo.LINES.england, 'mischievous'); }
        else { window.wcConfetti && window.wcConfetti({ y: .4, count: 150 }); }
        return;
      }
      setIdx(k % teams.length);
      const into = k - fast;
      timer.current = setTimeout(step, into <= 0 ? 46 : 46 + into * into * 3.4);
    }
    timer.current = setTimeout(step, 46);
  }
  oEffect(() => () => clearTimeout(timer.current), []);

  if (phase === 'revealed' && isSCO) return <ScotlandTakeover team={t} onDone={props.onDone} />;

  const cur = teams[idx] || teams[0];
  return (
    <div className="moment ink">
      <div className="mscroll" style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', minHeight: '100%', padding: '30px 22px', textAlign: 'center' }}>
        {phase !== 'revealed' && <>
          <div className="dh" style={{ fontSize: 14, letterSpacing: '.16em', color: 'var(--yellow)' }}>THE DRAW</div>
          <div style={{ margin: '14px 0' }}><Wo mood={phase === 'rolling' ? 'nervous' : 'confident'} size={128} animate /></div>
          <div className="dh" style={{ fontSize: 22, lineHeight: 1.04, maxWidth: 300 }}>
            {phase === 'ready' ? 'Wheesht is administering the draw. Personally.' : 'Here we go…'}
          </div>
          <div style={{ margin: '22px auto', width: 200, height: 200, borderRadius: 28, border: '4px solid var(--yellow)', background: '#000', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 0 0 6px rgba(245,200,0,.18)', overflow: 'hidden' }}>
            <span style={{ fontSize: 108, lineHeight: 1, filter: phase === 'rolling' ? 'blur(1px)' : 'none' }}>{cur.flag}</span>
          </div>
          {phase === 'ready'
            ? <Bo variant="primary" onClick={spin}>Do the draw</Bo>
            : <div className="dh" style={{ fontSize: 16, color: 'var(--yellow)' }}>Drawing…</div>}
        </>}

        {phase === 'revealed' && <div className="pop" style={{ width: '100%' }}>
          <div className="dh" style={{ fontSize: 14, letterSpacing: '.16em', color: 'var(--yellow)' }}>YOU DREW</div>
          <div style={{ fontSize: 116, lineHeight: 1, margin: '8px 0' }}>{t.flag}</div>
          <div className="dh" style={{ fontSize: 44 }}>{t.name}</div>
          <div style={{ display: 'flex', gap: 8, justifyContent: 'center', margin: '12px 0 4px' }}>
            <Cho tone="yellow">Group {t.group}</Cho>
            <Cho style={{ background: '#fff' }}>Odds {t.odds}</Cho>
            {t.alive ? <Cho tone="green">Still in</Cho> : <Cho tone="red">Out</Cho>}
          </div>
          <div style={{ marginTop: 18, display: 'flex', gap: 11, alignItems: 'flex-end', textAlign: 'left', background: '#fff', color: 'var(--ink)', borderRadius: 18, padding: 14 }}>
            <Wo mood={isENG ? 'mischievous' : (t.alive ? 'confident' : 'crying')} size={70} animate />
            <div>
              <div className="dh" style={{ fontSize: 11, letterSpacing: '.06em', color: 'var(--red)' }}>WHEESHT'S VERDICT</div>
              <div style={{ fontSize: 15, fontWeight: 600, lineHeight: 1.32, marginTop: 3 }}>{verdict()}</div>
            </div>
          </div>
          <div style={{ marginTop: 18, display: 'flex', flexDirection: 'column', gap: 10 }}>
            <Bo variant="primary" block onClick={() => window.wcToast && window.wcToast('Draw shared. The banter starts now.', 'mischievous')}>Share your draw</Bo>
            <Bo variant="ghost" block onClick={props.onDone} style={{ background: 'transparent', color: '#fff', boxShadow: '0 4px 0 rgba(255,255,255,.25)' }}>Into my dashboard →</Bo>
          </div>
        </div>}
      </div>
    </div>
  );
}

const WCd = window.WC;
const Wd = window.Wheesht;
const Sd = window.Store;
const { Card: Cd, Btn: Bd, Flag: Fd, Avatar: Ad, Chip: Chd, Stamp: Std, ProgressRing: PRd, WheeshtSays: Saysd, SectionHead: SHd } = window;

function money_d(n) { return '£' + Math.round(n).toLocaleString('en-GB'); }
const PRE = () => (WCd.meta.phase === 'pre');
function stageName(t) {
  if (t.stage === 'group') return 'Group stage';
  if (t.stage === 'qf') return 'Quarter-final';
  if (t.stage === 'r16') return 'Round of 16';
  if (t.stage === 'out-r16') return 'Out · Round of 16';
  if (t.stage === 'out-r32') return 'Out · Round of 32';
  return 'Out · Group stage';
}

// Read a chosen image file, square-crop (cover) and shrink it to a small JPEG
// data URL on the device, so only ~tens of KB ever travel to Postgres.
function resizeToDataUrl(file, size, cb) {
  const s = size || 256;
  const reader = new FileReader();
  reader.onload = function (e) {
    const img = new Image();
    img.onload = function () {
      const canvas = document.createElement('canvas');
      canvas.width = s; canvas.height = s;
      const ctx = canvas.getContext('2d');
      const scale = Math.max(s / img.width, s / img.height);
      const w = img.width * scale, h = img.height * scale;
      ctx.drawImage(img, (s - w) / 2, (s - h) / 2, w, h);
      try { cb(canvas.toDataURL('image/jpeg', 0.82)); } catch (err) { cb(null); }
    };
    img.onerror = function () { cb(null); };
    img.src = e.target.result;
  };
  reader.onerror = function () { cb(null); };
  reader.readAsDataURL(file);
}

function dashTeam(code) { return WCd.TEAMS[code] || { code: code || '?', name: code || 'TBD', flag: '🏳️', rounds: 0, stage: 'group', odds: '0' }; }
function dashPredictionResolved(m) {
  if (m.kind === 'team2') return Array.isArray(m.answer) && m.answer.length > 0 && m.answer.every(function (x) { return x != null; });
  return m.answer != null;
}
function dashPickComplete(m, picks) {
  const v = picks ? picks[m.key] : null;
  if (v == null) return false;
  if (m.kind === 'team2') return Array.isArray(v) && v.length === 2;
  if (m.kind === 'number') return v !== '' && isFinite(Number(v));
  return true;
}

function overallRank(me) {
  const rows = Sd.allSync().slice().sort((a, b) => {
    const ta = dashTeam(a.team), tb = dashTeam(b.team);
    if (tb.rounds !== ta.rounds) return tb.rounds - ta.rounds;
    return parseInt(String(ta.odds).slice(1) || '0') - parseInt(String(tb.odds).slice(1) || '0');
  });
  const i = rows.findIndex(p => p.id === me.id);
  return { rank: i < 0 ? rows.length : i + 1, total: rows.length };
}

function PasswordSection(props) {
  const me = props.me;
  const has = Sd.hasPassword ? Sd.hasPassword(me) : false;
  const [open, setOpen] = dState(false);
  const [cur, setCur] = dState('');
  const [pw1, setPw1] = dState('');
  const [busy, setBusy] = dState(false);
  const [msg, setMsg] = dState('');
  const lbl = { fontWeight: 800, fontSize: 13, fontFamily: 'var(--disp)' };

  function save() {
    if (busy) return;
    if (pw1.length < 4) { setMsg('Use at least 4 characters.'); return; }

    <div style={{ borderTop: '1.5px solid var(--line)', paddingTop: 14, marginTop: 4 }}>

}

function PredCard(props) {

  const score = Sd.predScoreOf(me); const max = Sd.maxPredPoints();

  const markets = Sd.visiblePredictions ? Sd.visiblePredictions() : (WCd.predictions || Sd.PREDICTIONS);
  const totalMkts = markets.length;

  const locked = Sd.predictionsLocked ? Sd.predictionsLocked() : !!WCd.meta.predictionsLocked;
  const note = locked
    ? 'Locked in. Time to pretend you were confident all along.'

  return (

          <span style={{ fontSize: 16 }}>❤️</span>

          <span className="dh" style={{ fontSize: 15, width: 64, textAlign: 'right', color: 'var(--red)' }}>{money_d(charity)}</span>

<script type="text/babel">
/* ===========================================================================
   COMPETITION LAYER — "My Group" & "My Rivals".

   Reframes the World Cup group your drawn team sits in as your personal
   rivalry pod: the other teams in your group are owned by other players in
   your sweepstake, so the group table IS the competition. Built entirely from
   the fixtures the client already holds (no new server data) — group points,
   qualification status, must-win games, rival gaps and recent movement are all
   derived from finished group results.
   =========================================================================== */
const WCc = window.WC;
const Sc = window.Store;
const Wc = window.Wheesht;
const { Card: Cc, Btn: Bc, Flag: Fc, Avatar: Ac, Chip: Chc, Stamp: Stc, ProgressRing: PRc, WheeshtSays: Saysc, SectionHead: SHc } = window;
const { useState: cgState } = React;

/* ---- standings maths (client-side, results-driven) ---------------------- */
function cmpRec(a, b) {
  if (b.Pts !== a.Pts) return b.Pts - a.Pts;
  const gda = a.GF - a.GA, gdb = b.GF - b.GA;
  if (gdb !== gda) return gdb - gda;
  if (b.GF !== a.GF) return b.GF - a.GF;
  return a.team.name.localeCompare(b.team.name);
}
function oddsVal(t) { const n = parseInt(String(t.odds || '0').replace(/[^0-9]/g, ''), 10); return isFinite(n) ? n : 999999; }
function emptyRec(t) { return { code: t.code, team: t, P: 0, W: 0, D: 0, L: 0, GF: 0, GA: 0, Pts: 0 }; }

function tallyTable(teams, fixtures, byOddsIfEmpty) {
  const rec = {}; teams.forEach(t => rec[t.code] = emptyRec(t));
  fixtures.forEach(f => {
    if (f.status !== 'done' || !f.score || f.score[0] == null || f.score[1] == null) return;
    const A = rec[f.a], B = rec[f.b]; if (!A || !B) return;
    const ga = f.score[0], gb = f.score[1];
    A.P++; B.P++; A.GF += ga; A.GA += gb; B.GF += gb; B.GA += ga;
    if (ga > gb) { A.W++; B.L++; A.Pts += 3; }
    else if (gb > ga) { B.W++; A.L++; B.Pts += 3; }
    else { A.D++; B.D++; A.Pts++; B.Pts++; }
  });
  const ranked = Object.keys(rec).map(k => rec[k]);
  const anyPlayed = ranked.some(r => r.P > 0);
  ranked.sort((a, b) => (!anyPlayed && byOddsIfEmpty) ? (oddsVal(a.team) - oddsVal(b.team)) : cmpRec(a, b));
  ranked.forEach((r, i) => r.pos = i + 1);
  return ranked;
}

function groupModel(groupId) {
  const teams = WCc.TEAM_LIST.filter(t => t.group === groupId);
  const fixtures = (WCc.FIXTURES || []).filter(f => f.stage === 'group' && f.group === groupId);
  const doneFx = fixtures.filter(f => f.status === 'done' && f.score && f.score[0] != null && f.score[1] != null);
  const ranked = tallyTable(teams, fixtures, true);
  // Previous standings (exclude the latest finished matchday) → recent movement.
  let latestMd = 0; doneFx.forEach(f => { if ((f.matchday || 0) > latestMd) latestMd = f.matchday || 0; });
  const prevFx = doneFx.filter(f => (f.matchday || 0) < latestMd);
  const prevRanked = tallyTable(teams, prevFx, false);
  const prevPos = {}; prevRanked.forEach(r => prevPos[r.code] = r.pos);
  ranked.forEach(r => { r.prevPos = prevFx.length ? (prevPos[r.code] || r.pos) : r.pos; r.move = r.prevPos - r.pos; });
  return { groupId, teams, fixtures, ranked, played: doneFx.length, total: fixtures.length, latestMd, hasResults: doneFx.length > 0 };
}

function ownersByCode() {
  const all = (Sc && Sc.allSync) ? Sc.allSync() : (WCc.PEOPLE || []);
  const map = {}; all.forEach(p => { (map[p.team] = map[p.team] || []).push(p); });
  return map;
}
function ownerLabel(owners, code, meId) {
  const list = owners[code] || [];
  if (!list.length) return { name: 'Unclaimed', mine: false, extra: 0, person: null };
  const mine = list.some(p => p.id === meId);
  const primary = mine ? list.find(p => p.id === meId) : list[0];
  const nm = (Sc && Sc.shownName) ? Sc.shownName(primary) : primary.name;
  return { name: nm, mine: mine, extra: list.length - 1, person: primary };
}

/* ---- qualification read (honest, non-speculative) ----------------------- */
function qualStatus(t, G, mePos, gamesLeft) {
  if (!t.alive) return { label: 'Eliminated', tone: 'red', mood: 'crying', mustWin: false, detail: 'Out of the group. The predictions league is still live, mind.' };
  if (t.rounds >= 1) return { label: 'Through to the knockouts', tone: 'green', mood: 'celebrating', mustWin: false, detail: 'Group survived. Now it gets serious.' };
  if (!G.hasResults) return { label: 'Not started', tone: 'ghost', mood: 'confident', mustWin: false, detail: 'No ball kicked yet. Everything to play for.' };
  if (mePos <= 2) return { label: 'In a qualifying spot', tone: 'green', mood: 'confident', mustWin: false, detail: 'Top two go through. Hold your nerve.' };
  if (mePos === 3) return { label: 'On the bubble', tone: 'yellow', mood: 'nervous', mustWin: gamesLeft > 0, detail: gamesLeft > 0 ? 'Outside the top two — a win pulls you back in.' : '3rd place. Sweating on a best-third spot.' };
  return { label: gamesLeft > 0 ? 'Must win' : 'All but out', tone: 'red', mood: 'shocked', mustWin: gamesLeft > 0, detail: gamesLeft > 0 ? 'Bottom of the group. Win or you are gone.' : 'Bottom with no games left.' };
}

<script type="text/babel">
/* ===========================================================================
   PREDICTIONS — tournament prediction markets, scoring & leaderboard.
   Replaces the old "side bets". Open markets are pickable; resolved markets
   are graded against your pick. Points roll up into the prediction league.
   =========================================================================== */
const WCp = window.WC;
const Wp = window.Wheesht;
const Sp = window.Store;
const { Card: Cp, Btn: Bp, Flag: Fp, Avatar: Ap, Chip: Chp, WheeshtSays: Saysp, SectionHead: SHp } = window;
const { useState: pState } = React;

function isResolved(m) {
  if (m.kind === 'team2') return Array.isArray(m.answer) && m.answer.length > 0 && m.answer.every(function (x) { return x != null; });
  return m.answer != null;
}

function pickComplete(m, picks) {
  const v = picks ? picks[m.key] : null;
  if (v == null) return false;
  if (m.kind === 'team2') return Array.isArray(v) && v.length === 2;
  if (m.kind === 'number') return v !== '' && isFinite(Number(v));
  return true;
}

function optLabel(m, opt) {
  if (m.kind === 'player') return { main: opt.name, sub: WCp.TEAMS[opt.team] ? WCp.TEAMS[opt.team].name : '', flag: WCp.TEAMS[opt.team] ? WCp.TEAMS[opt.team].flag : '', id: opt.id };
  if (m.kind === 'stage') return { main: opt, sub: '', flag: '', id: opt };
  const t = WCp.TEAMS[opt];
  return { main: t ? t.name : opt, sub: t ? 'Group ' + t.group + ' · ' + t.odds : '', flag: t ? t.flag : '', id: opt };
}

function Market(props) {
  const m = props.market, me = props.me, onPick = props.onPick;
  const isTwo = m.kind === 'team2';
  const isNumber = m.kind === 'number';
  const isTeam = m.kind === 'team' || isTwo;
  const locked = !!props.locked;
  const resolved = isResolved(m);
  const pick = me.picks ? me.picks[m.key] : null;
  const picked = (id) => isTwo ? (Array.isArray(pick) && pick.indexOf(id) >= 0) : pick === id;
  const gotIt = resolved && (isTwo
    ? (Array.isArray(pick) && Array.isArray(m.answer) && pick.length === m.answer.length && pick.every(id => m.answer.indexOf(id) >= 0))
    : isNumber ? Number(pick) === Number(m.answer)
    : pick === m.answer);
  const [teamQ, setTeamQ] = pState('');
  const presetCodes = isTeam ? new Set(m.options || []) : new Set();

  function choose(id) {
    if (resolved || locked) return;
    let made = false;
    if (isTwo) {
      let arr = Array.isArray(pick) ? pick.slice() : [];
      if (arr.indexOf(id) >= 0) arr = arr.filter(x => x !== id);
      else { arr.push(id); if (arr.length > 2) arr.shift(); made = true; }
      onPick(m.key, arr);
    } else {
      const toggling = picked(id);
      onPick(m.key, toggling ? null : id);
      made = !toggling;
    }
    setTeamQ('');
    if (made) {
      window.wcHaptic && window.wcHaptic('light');
      window.wcConfetti && window.wcConfetti({ count: 28, y: 0.5, x: 0.5 });
    }
  }

  const teamResults = isTeam && !resolved && teamQ.trim()
    ? WCp.TEAM_LIST.filter(t => !presetCodes.has(t.code) && (t.name.toLowerCase().indexOf(teamQ.toLowerCase()) >= 0 || t.code.toLowerCase().indexOf(teamQ.toLowerCase()) >= 0)).slice(0, 6)
    : [];

  function chooseNumber(v) {
    if (resolved || locked) return;
    if (v === '') onPick(m.key, null);
    else onPick(m.key, Number(v));
  }

  const hasPick = isNumber ? (pick != null && pick !== '' && isFinite(Number(pick))) : (pick != null && (!isTwo || (Array.isArray(pick) && pick.length > 0)));
  const hasFullPick = isNumber ? hasPick : (pick != null && (!isTwo || (Array.isArray(pick) && pick.length === 2)));

  return (
    <Cp style={{ marginBottom: 12 }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 4, gap: 8 }}>
        <div className="dh" style={{ fontSize: 17, lineHeight: 1.05 }}>{m.q}</div>
        <Chp tone={resolved ? (gotIt ? 'green' : 'red') : (hasFullPick ? 'yellow' : 'ghost')} style={{ whiteSpace: 'nowrap', flex: '0 0 auto' }}>
          {resolved ? (gotIt ? '+' + m.points + ' pts' : 'Missed') : '+' + m.points + ' pts'}
        </Chp>
      </div>
      <div style={{ fontSize: 11.5, fontWeight: 700, color: 'var(--ink2)', marginBottom: 9 }}>
        {resolved ? 'Result is in' : locked ? 'Predictions locked' : isTwo ? 'Pick the two finalists' : isNumber ? 'Open · type your answer' : 'Open · tap to pick'}
      </div>
      {isNumber && (
        <div style={{ display: 'flex', alignItems: 'center', gap: 9, padding: '10px 12px', border: '2.5px solid ' + (hasPick ? 'var(--ink)' : 'var(--line)'), borderRadius: 13, background: hasPick && !resolved ? 'var(--yellow)' : '#fff' }}>
          <input
            type="number"
            min="0"
            step="1"
            value={pick == null ? '' : pick}
            onChange={e => chooseNumber(e.target.value)}
            disabled={resolved || locked}
            placeholder={m.placeholder || 'Type a number'}
            style={{ flex: 1, minWidth: 0, border: 'none', outline: 'none', background: 'transparent', fontFamily: 'var(--disp)', fontWeight: 800, fontSize: 22, color: 'var(--ink)' }}
          />
          {resolved && <Chp tone={gotIt ? 'green' : 'red'} style={{ flex: '0 0 auto' }}>Answer: {m.answer}</Chp>}
          {!resolved && locked && hasPick && <Chp tone="yellow" style={{ flex: '0 0 auto' }}>Your pick</Chp>}
        </div>
      )}
      {!isNumber && <>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 7 }}>
        {(m.options || []).map((opt, i) => {
          const o = optLabel(m, opt);
          const on = picked(o.id);
          const isAnswer = resolved && (isTwo ? (Array.isArray(m.answer) && m.answer.indexOf(o.id) >= 0) : o.id === m.answer);
          const wrong = resolved && on && !isAnswer;
          let bg = '#fff', bd = 'var(--line)';
          if (isAnswer) { bg = 'rgba(26,122,68,.12)'; bd = 'var(--green)'; }
          else if (wrong) { bg = 'rgba(232,39,42,.08)'; bd = 'var(--red)'; }
          else if (on && !resolved) { bg = 'var(--yellow)'; bd = 'var(--ink)'; }
          return (
            <button key={i} onClick={() => choose(o.id)} disabled={resolved || locked} style={{
              display: 'flex', alignItems: 'center', gap: 10, padding: '10px 12px', cursor: (resolved || locked) ? 'default' : 'pointer',
              textAlign: 'left', border: '2.5px solid ' + bd, borderRadius: 13, background: bg, fontFamily: 'var(--body)', transition: 'all .12s'
            }}>
              {o.flag && <span style={{ fontSize: 24 }}>{o.flag}</span>}
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 800, fontSize: 14 }}>{o.main}</div>
                {o.sub && <div style={{ fontSize: 11.5, fontWeight: 600, color: 'var(--ink2)' }}>{o.sub}</div>}
              </div>
              {isAnswer && <Chp tone="green" style={{ flex: '0 0 auto' }}>Correct</Chp>}
              {!resolved && !locked && <span style={{ width: 22, height: 22, borderRadius: '50%', border: '2.5px solid var(--ink)', background: on ? 'var(--ink)' : '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 13, fontWeight: 900, flex: '0 0 auto' }}>{on ? '✓' : ''}</span>}
              {!resolved && locked && on && <Chp tone="yellow" style={{ flex: '0 0 auto' }}>Your pick</Chp>}
            </button>
          );
        })}
      </div>
      </>}
      {isTeam && !resolved && !locked && (
        <div style={{ marginTop: 10, borderTop: '1.5px solid var(--line)', paddingTop: 10 }}>
          <div style={{ fontSize: 11, fontWeight: 800, color: 'var(--ink2)', marginBottom: 6, textTransform: 'uppercase', letterSpacing: '.05em' }}>Search all 48 teams</div>
          <input
            value={teamQ}
            onChange={e => setTeamQ(e.target.value)}

            style={{ width: '100%', boxSizing: 'border-box', border: '2px solid var(--line)', borderRadius: 10, padding: '8px 11px', fontFamily: 'var(--body)', fontWeight: 600, fontSize: 14, outline: 'none' }}
          />
          {teamResults.length > 0 && (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 5, marginTop: 6 }}>
              {teamResults.map(t => {
                const on = picked(t.code);
                return (
                  <button key={t.code} onClick={() => choose(t.code)} style={{
                    display: 'flex', alignItems: 'center', gap: 10, padding: '8px 11px',
                    border: '2px solid ' + (on ? 'var(--ink)' : 'var(--line)'),
                    borderRadius: 11, background: on ? 'var(--yellow)' : '#fff',
                    cursor: 'pointer', fontFamily: 'var(--body)', textAlign: 'left'
                  }}>
                    <span style={{ fontSize: 22 }}>{t.flag}</span>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontWeight: 800, fontSize: 13.5 }}>{t.name}</div>

                    </div>
                    <span style={{ width: 20, height: 20, borderRadius: '50%', border: '2px solid var(--ink)', background: on ? 'var(--ink)' : '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 12, fontWeight: 900, flex: '0 0 auto' }}>{on ? '✓' : ''}</span>
                  </button>

    </Cp>
  );
}

function PredLeaderboard(props) {
  const me = props.me;
  const rows = Sp.rankedByPred();
  const top = rows.slice(0, 8);
  const meRow = rows.find(p => p.id === me.id);
  const inTop = top.some(p => p.id === me.id);
  return (
    <Cp flat style={{ padding: '4px 14px' }}>
      {top.map((p, i) => <LbRow key={p.id} p={p} i={i} me={me} />)}

        <div style={{ textAlign: 'center', color: 'var(--ink2)', fontWeight: 800, padding: '2px 0' }}>···</div>

}
function LbRow(props) {
  const { p, i, me } = props; const isMe = p.id === me.id;
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 11, padding: '9px 4px', borderRadius: 10, background: isMe ? 'rgba(245,200,0,.18)' : 'transparent', margin: '0 -4px' }}>

}

function PredictionsScreen(props) {
  const me = Sp.active();
  const [, bump] = pState(0);
  if (!me) return null;
  const markets = Sp.visiblePredictions ? Sp.visiblePredictions() : (WCp.predictions || Sp.PREDICTIONS).filter(m => ((WCp.meta && WCp.meta.hiddenPredictions) || []).indexOf(m.key) < 0);
  const open = markets.filter(m => !isResolved(m));
  const graded = markets.filter(m => isResolved(m));
  const made = Sp.madeVisiblePredictions ? Sp.madeVisiblePredictions(me) : (me.picks ? Object.keys(me.picks).filter(k => me.picks[k] != null && (!Array.isArray(me.picks[k]) || me.picks[k].length)).length : 0);
  const missing = open.filter(m => !pickComplete(m, me.picks || {}));
  const allOpenMade = open.length > 0 && missing.length === 0;
  const nextMissing = missing[0];
  const predDeadline = WCp.meta && WCp.meta.predDeadline;
  const deadlinePassed = predDeadline && new Date() > new Date(predDeadline);
  const locked = Sp.predictionsLocked ? Sp.predictionsLocked() : (!!(WCp.meta && WCp.meta.predictionsLocked) || !!deadlinePassed);
  function onPick(key, val) { Sp.setPick(me.id, key, val); bump(x => x + 1); }
  function fmtDeadline(dt) {
    try { return new Date(dt).toLocaleString('en-GB', { dateStyle: 'medium', timeStyle: 'short' }); } catch (e) { return dt; }
  }
  return (
    <div className="pad">
      <div className="appbar" style={{ padding: '2px 0 12px' }}>
        <div>
          <div className="dh" style={{ fontSize: 26 }}>Predictions</div>
          <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--ink2)' }}>
            {made} of {markets.length} made · {missing.length ? missing.length + ' still to call' : 'all open calls in'} · {Sp.predScoreOf(me)} pts banked
          </div>
        </div>
      </div>
      {locked && <div style={{ display: 'flex', alignItems: 'center', gap: 9, background: 'var(--ink)', color: '#fff', borderRadius: 13, padding: '10px 13px', marginBottom: 12, fontSize: 13, fontWeight: 700 }}>
        <span style={{ fontSize: 18 }}>🔒</span>
        <span>{deadlinePassed ? 'Predictions are locked — deadline has passed.' : 'Predictions are locked by the organiser.'}</span>
      </div>}
      {!locked && predDeadline && <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--ink2)', marginBottom: 10, padding: '7px 12px', background: 'rgba(245,200,0,.2)', borderRadius: 10 }}>
        Picks lock at {fmtDeadline(predDeadline)} — get yours in.
      </div>}
      {!locked && nextMissing && <Cp flat style={{ marginBottom: 12, padding: '11px 13px', background: 'rgba(245,200,0,.22)', border: '2px solid rgba(26,26,26,.16)' }}>
        <div style={{ fontSize: 10.5, fontWeight: 900, letterSpacing: '.07em', textTransform: 'uppercase', color: 'var(--ink2)' }}>Next call to make</div>
        <div className="dh" style={{ fontSize: 18, marginTop: 3 }}>{nextMissing.q}</div>
        <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--ink2)', marginTop: 3 }}>{missing.length === 1 ? 'Last one. No pressure, obviously.' : missing.length + ' picks left on the card.'}</div>
      </Cp>}
      {!locked && allOpenMade && <Cp flat style={{ marginBottom: 12, padding: '11px 13px', background: 'rgba(26,122,68,.10)', border: '2px solid rgba(26,122,68,.28)' }}>
        <div style={{ fontSize: 10.5, fontWeight: 900, letterSpacing: '.07em', textTransform: 'uppercase', color: 'var(--green)' }}>All calls made</div>
        <div className="dh" style={{ fontSize: 18, marginTop: 3 }}>Full card submitted.</div>
        <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--ink2)', marginTop: 3 }}>You can still change picks until they lock. Wheesht has the draft in pencil.</div>
      </Cp>}
      <Saysp mood="mischievous" label="on the record" animate>{WCp.LINES.predOpen}</Saysp>
      <SHp aside={open.length ? (missing.length ? missing.length + ' left' : 'all in') : 'closed'}>{allOpenMade ? 'Review your calls' : 'Make your call'}</SHp>
      {open.map(m => <Market key={m.key} market={m} me={me} onPick={onPick} locked={locked} />)}
      {graded.length > 0 && <>
        <SHp aside="graded">Already settled</SHp>
        {graded.map(m => <Market key={m.key} market={m} me={me} onPick={onPick} locked={locked} />)}
      </>}
      <SHp aside="org-wide">Prediction league</SHp>
      <PredLeaderboard me={me} />
      <div style={{ height: 14 }} />
      <Saysp mood="confident" compact>Every point's logged. Wheesht remembers. Especially the bad calls.</Saysp>
    </div>
  );
}

window.PredictionsScreen = PredictionsScreen;

</script>

<script type="text/babel">
/* ===========================================================================
   GAMES — upcoming fixtures tracker.
   The full group-stage schedule with date grouping, status, and filters
   (all / my team / teams in the sweepstake). Highlights games that matter to
   the people who've signed up. Reads WC.FIXTURES + live Store ownership.
   =========================================================================== */
const WCg = window.WC;
const Wg = window.Wheesht;
const Sg = window.Store;
const { Card: Cg, Btn: Bg, Flag: Fg, Chip: Chg, WheeshtSays: Saysg, SectionHead: SHg } = window;
const { useState: gState } = React;

function gameTeam(code) {
  return WCg.TEAMS[code] || { code: code || 'TBD', name: code || 'To be decided', flag: '🏳️' };
}

function ownedSet() {
  var set = {};
  (Sg ? Sg.allSync() : WCg.PEOPLE).forEach(function (p) { set[p.team] = (set[p.team] || 0) + 1; });
  return set;
}
function statusOf(f) {

}

function TeamLine(props) {
  const t = gameTeam(props.code); const owners = props.owners;
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, flex: 1, minWidth: 0 }}>

      <div style={{ fontWeight: 800, fontSize: 13.5, textAlign: 'center', lineHeight: 1.1, textWrap: 'balance' }}>{t.name}</div>

    </div>

}

function FixtureRow(props) {
  const f = props.f; const owned = props.owned;
  const oa = owned[f.a] || 0, ob = owned[f.b] || 0;
  const mine = props.mineTeam && (f.a === props.mineTeam || f.b === props.mineTeam);
  const hot = oa + ob > 0;
  const st = statusOf(f);
  return (
    <Cg flat style={{ padding: '12px 14px', marginBottom: 9, border: mine ? '2.5px solid var(--ink)' : '2px solid var(--line)', boxShadow: mine ? '0 4px 0 var(--shadow)' : 'none' }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 9 }}>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          <Chg tone="ghost">Group {f.group}</Chg>
          <span style={{ fontSize: 11, fontWeight: 700, color: 'var(--ink2)' }}>MD{f.matchday}</span>
          {mine && <Chg tone="yellow">Your team</Chg>}
        </div>
        {st === 'done' && f.score
          ? <Chg tone="ink">FT {f.score[0]}–{f.score[1]}</Chg>
          : st === 'halfTime'
            ? <Chg tone="yellow">HT {f.score ? f.score[0] + '–' + f.score[1] : ''}</Chg>
          : st === 'live'
            ? <span style={{ fontSize: 11, fontWeight: 800, color: 'var(--red)' }}>● LIVE</span>

        <span className="dh" style={{ fontSize: 14, color: 'var(--ink2)', padding: '8px 2px 0' }}>v</span>

      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 9, fontSize: 11, fontWeight: 600, color: 'var(--ink2)' }}>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4"><path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11z" /><circle cx="12" cy="10" r="2.4" /></svg>

function NextUp(props) {
  const f = props.f; if (!f) return null;
  const ta = gameTeam(f.a), tb = gameTeam(f.b);
  return (
    <Cg bordered style={{ background: 'var(--ink)', color: '#fff' }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <span style={{ fontSize: 11, fontWeight: 800, letterSpacing: '.08em', color: 'var(--yellow)', textTransform: 'uppercase' }}>{props.label || 'First whistle'}</span>

        </div>
        <span className="dh" style={{ fontSize: 20, color: 'var(--yellow)' }}>v</span>
        <div style={{ textAlign: 'center', flex: 1 }}>
          <div style={{ fontSize: 40 }}>{tb.flag}</div>

function GamesScreen() {
  const me = Sg ? Sg.active() : null;
  const mineTeam = me ? me.team : null;
  const [filter, setFilter] = gState('all');
  const owned = ownedSet();
  const all = (WCg.FIXTURES || []).slice();

  let list = all;
  if (filter === 'mine' && mineTeam) list = all.filter(f => f.a === mineTeam || f.b === mineTeam);
  else if (filter === 'owned') list = all.filter(f => owned[f.a] || owned[f.b]);

  // next upcoming overall, and your team's next
  const upcoming = all.filter(f => statusOf(f) !== 'done');
  const nextOverall = upcoming[0];
  const nextMine = mineTeam ? upcoming.find(f => f.a === mineTeam || f.b === mineTeam) : null;

  // group by date
  const byDate = [];
  const seen = {};
  list.forEach(f => {
    if (!seen[f.dateISO]) { seen[f.dateISO] = { label: f.dateLabel, items: [] }; byDate.push(seen[f.dateISO]); }
    seen[f.dateISO].items.push(f);
  });

  const filters = [['all', 'All games'], ['owned', 'In the draw'], ['mine', 'My team']];

  return (
    <div className="pad">
      <div className="appbar" style={{ padding: '2px 0 12px' }}>

          <button key={k} onClick={() => setFilter(k)} disabled={k === 'mine' && !mineTeam}
            className={'wc-chip' + (filter === k ? ' wc-chip--yellow' : '')}
            style={{ whiteSpace: 'nowrap', cursor: 'pointer', flex: '0 0 auto', opacity: (k === 'mine' && !mineTeam) ? .4 : 1 }}>{lab}</button>
