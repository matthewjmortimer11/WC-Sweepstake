          <span className="dh" style={{ fontSize: 15, width: 64, textAlign: 'right' }}>{money_d(pot)}</span>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13, fontWeight: 700, background: 'var(--bg)', borderRadius: 10, padding: '8px 10px', marginTop: 2 }}>
          <span style={{ fontSize: 16 }}>❤️</span>
          <span style={{ flex: 1 }}>To charity (half of every entry)</span>
          <span className="dh" style={{ fontSize: 15, width: 64, textAlign: 'right', color: 'var(--red)' }}>{money_d(charity)}</span>
        </div>
      </div>
    </Cd>
  );
}

function ActivityFeed(props) {
  const me = props.me; const t = dashTeam(me.team);
  const pre = PRE();
  const items = [];
  if (pre) {
    const submitted = me.picks ? Object.keys(me.picks).length : 0;
    const totalMkts = (WCd.predictions || Sd.PREDICTIONS).length;
    items.push({ m: 'confident', t: 'You drew ' + t.name + ' ' + t.flag, d: 'Group ' + t.group + '. Locked in. May the football gods be kind.', when: 'just now' });
    if (submitted < totalMkts) items.push({ m: 'mischievous', t: 'Predictions are open', d: (totalMkts - submitted) + ' still to call before kick-off. Get them in.', when: 'now' });
    else items.push({ m: 'happy', t: 'All predictions in', d: 'Every market called. Wheesht has them in writing.', when: 'now' });
    items.push({ m: 'broadcast', t: 'Tournament is underway', d: 'The first whistle has gone. Wheesht is taking notes.', when: 'live' });
    items.push({ m: 'neutral', t: 'You entered the sweepstake', d: 'Buy-in confirmed. £' + WCd.FEE + ' in the pot. Welcome aboard.', when: 'on joining' });
  } else {
    if (!t.alive) items.push({ m: 'crying', t: t.name + ' knocked out', d: stageName(t) + ' — your run ends here. The side game awaits.', when: '2h ago' });
    else items.push({ m: 'confident', t: t.name + ' still standing', d: 'Through to the ' + stageName(t).toLowerCase() + '. Wheesht is quietly impressed.', when: '2h ago' });
    items.push({ m: 'broadcast', t: 'You entered the sweepstake', d: 'Buy-in confirmed. £' + WCd.FEE + ' in the pot. Welcome aboard.', when: 'on joining' });
  }
  return (
    <Cd flat style={{ padding: '6px 14px' }}>
      {items.map((n, i) => (
        <div key={i} style={{ display: 'flex', gap: 11, alignItems: 'center', padding: '11px 0', borderBottom: i < items.length - 1 ? '1.5px solid var(--line)' : 'none' }}>
          <Wd mood={n.m} size={44} />
          <div style={{ flex: 1, minWidth: 0 }}>
            <div className="dh" style={{ fontSize: 15 }}>{n.t}</div>
            <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--ink2)', lineHeight: 1.3 }}>{n.d}</div>
          </div>
          <span style={{ fontSize: 10.5, fontWeight: 700, color: 'var(--ink2)', whiteSpace: 'nowrap' }}>{n.when}</span>
        </div>
      ))}
    </Cd>
  );
}

function MeScreen(props) {
  const me = Sd.active();
  const [edit, setEdit] = dState(false);
  if (!me) return null;
  const t = dashTeam(me.team);
  const pre = PRE();
  const greetMood = pre ? 'happy' : (t.alive ? 'happy' : 'crying');
  return (
    <div className="pad">
      <ProfileHeader me={me} onEdit={() => setEdit(true)} />
      <div style={{ height: 12 }} />
      <Saysd mood={greetMood} label={'hey ' + me.name.split(' ')[0]} animate>
        {pre ? <>You've drawn {t.name}. No games yet — get your predictions in while the slate's clean.</> : (t.alive ? <>{t.name} are still standing. Keep your predictions sharp — the pot's in play.</> : <>Your team is out, but the predictions league is still live. Wheesht isn't done with you yet.</>)}
      </Saysd>
      <SHd>Your team</SHd>
      <TeamCard me={me} onGames={props.goGames} />
      <SHd aside={WCd.meta.predictionsLocked ? 'locked' : 'open'}>Predictions</SHd>
      <PredCard me={me} onOpen={props.goPredictions} />
      <SHd>{pre ? 'Potential winnings' : 'Results & winnings'}</SHd>
      <WinningsCard me={me} />
      <SHd aside="latest first">Activity</SHd>
      <ActivityFeed me={me} />
      {edit && <EditProfile me={me} onClose={() => setEdit(false)} />}
    </div>
  );
}

window.MeScreen = MeScreen;

</script>

<script type="text/babel">
/* ===========================================================================
   PREDICTIONS — tournament prediction markets, scoring & leaderboard.
   Replaces the old "side bets". Open markets are pickable; resolved markets
   are graded against your pick. Points roll up into the prediction league.
   =========================================================================== */
const WCp = window.WC;
const Wp = window.Wheesht;
const Sp = window.Store;
const { Card: Cp, Btn: Bp, Flag: Fp, Avatar: Ap, Chip: Chp, WheeshtSays: Saysp, SectionHead: SHp } = window;
const { useState: pState } = React;

function isResolved(m) {
  if (m.kind === 'team2') return Array.isArray(m.answer) && m.answer.length > 0 && m.answer.every(function (x) { return x != null; });
  return m.answer != null;
}

function optLabel(m, opt) {
  if (m.kind === 'player') return { main: opt.name, sub: WCp.TEAMS[opt.team] ? WCp.TEAMS[opt.team].name : '', flag: WCp.TEAMS[opt.team] ? WCp.TEAMS[opt.team].flag : '', id: opt.id };
  if (m.kind === 'stage') return { main: opt, sub: '', flag: '', id: opt };
  const t = WCp.TEAMS[opt];
  return { main: t ? t.name : opt, sub: t ? 'Group ' + t.group + ' · ' + t.odds : '', flag: t ? t.flag : '', id: opt };
}

function Market(props) {
  const m = props.market, me = props.me, onPick = props.onPick;
  const isTwo = m.kind === 'team2';
  const isTeam = m.kind === 'team' || isTwo;
  const locked = !!props.locked;
  const resolved = isResolved(m);
  const pick = me.picks ? me.picks[m.key] : null;
  const picked = (id) => isTwo ? (Array.isArray(pick) && pick.indexOf(id) >= 0) : pick === id;
  const gotIt = resolved && (isTwo
    ? (Array.isArray(pick) && Array.isArray(m.answer) && pick.length === m.answer.length && pick.every(id => m.answer.indexOf(id) >= 0))
    : pick === m.answer);
  const [teamQ, setTeamQ] = pState('');
  const presetCodes = isTeam ? new Set(m.options) : new Set();

  function choose(id) {
    if (resolved || locked) return;
    if (isTwo) {
      let arr = Array.isArray(pick) ? pick.slice() : [];
      if (arr.indexOf(id) >= 0) arr = arr.filter(x => x !== id);
      else { arr.push(id); if (arr.length > 2) arr.shift(); }
      onPick(m.key, arr);
    } else onPick(m.key, picked(id) ? null : id);
    setTeamQ('');
  }

  const teamResults = isTeam && !resolved && teamQ.trim()
    ? WCp.TEAM_LIST.filter(t => !presetCodes.has(t.code) && (t.name.toLowerCase().indexOf(teamQ.toLowerCase()) >= 0 || t.code.toLowerCase().indexOf(teamQ.toLowerCase()) >= 0)).slice(0, 6)
    : [];

  const hasPick = pick != null && (!isTwo || (Array.isArray(pick) && pick.length > 0));
  const hasFullPick = pick != null && (!isTwo || (Array.isArray(pick) && pick.length === 2));

  return (
    <Cp style={{ marginBottom: 12 }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 4, gap: 8 }}>
        <div className="dh" style={{ fontSize: 17, lineHeight: 1.05 }}>{m.q}</div>
        <Chp tone={resolved ? (gotIt ? 'green' : 'red') : (hasFullPick ? 'yellow' : 'ghost')} style={{ whiteSpace: 'nowrap', flex: '0 0 auto' }}>
          {resolved ? (gotIt ? '+' + m.points + ' pts' : 'Missed') : '+' + m.points + ' pts'}
        </Chp>
      </div>
      <div style={{ fontSize: 11.5, fontWeight: 700, color: 'var(--ink2)', marginBottom: 9 }}>
        {resolved ? 'Result is in' : locked ? 'Predictions locked' : isTwo ? 'Pick the two finalists' : 'Open · tap to pick'}
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 7 }}>
        {m.options.map((opt, i) => {
          const o = optLabel(m, opt);
          const on = picked(o.id);
          const isAnswer = resolved && (isTwo ? (Array.isArray(m.answer) && m.answer.indexOf(o.id) >= 0) : o.id === m.answer);
          const wrong = resolved && on && !isAnswer;
          let bg = '#fff', bd = 'var(--line)';
          if (isAnswer) { bg = 'rgba(26,122,68,.12)'; bd = 'var(--green)'; }
          else if (wrong) { bg = 'rgba(232,39,42,.08)'; bd = 'var(--red)'; }
          else if (on && !resolved) { bg = 'var(--yellow)'; bd = 'var(--ink)'; }
          return (
            <button key={i} onClick={() => choose(o.id)} disabled={resolved || locked} style={{
              display: 'flex', alignItems: 'center', gap: 10, padding: '10px 12px', cursor: (resolved || locked) ? 'default' : 'pointer',
              textAlign: 'left', border: '2.5px solid ' + bd, borderRadius: 13, background: bg, fontFamily: 'var(--body)', transition: 'all .12s'
            }}>
              {o.flag && <span style={{ fontSize: 24 }}>{o.flag}</span>}
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 800, fontSize: 14 }}>{o.main}</div>
                {o.sub && <div style={{ fontSize: 11.5, fontWeight: 600, color: 'var(--ink2)' }}>{o.sub}</div>}
              </div>
              {isAnswer && <Chp tone="green" style={{ flex: '0 0 auto' }}>Correct</Chp>}
              {!resolved && !locked && <span style={{ width: 22, height: 22, borderRadius: '50%', border: '2.5px solid var(--ink)', background: on ? 'var(--ink)' : '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 13, fontWeight: 900, flex: '0 0 auto' }}>{on ? '✓' : ''}</span>}
              {!resolved && locked && on && <Chp tone="yellow" style={{ flex: '0 0 auto' }}>Your pick</Chp>}
            </button>
          );
        })}
      </div>
      {isTeam && !resolved && !locked && (
        <div style={{ marginTop: 10, borderTop: '1.5px solid var(--line)', paddingTop: 10 }}>
          <div style={{ fontSize: 11, fontWeight: 800, color: 'var(--ink2)', marginBottom: 6, textTransform: 'uppercase', letterSpacing: '.05em' }}>Search all 48 teams</div>
          <input
            value={teamQ}
            onChange={e => setTeamQ(e.target.value)}
            placeholder="Type a team name…"
            style={{ width: '100%', boxSizing: 'border-box', border: '2px solid var(--line)', borderRadius: 10, padding: '8px 11px', fontFamily: 'var(--body)', fontWeight: 600, fontSize: 14, outline: 'none' }}
          />
          {teamResults.length > 0 && (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 5, marginTop: 6 }}>
              {teamResults.map(t => {
                const on = picked(t.code);
                return (
                  <button key={t.code} onClick={() => choose(t.code)} style={{
                    display: 'flex', alignItems: 'center', gap: 10, padding: '8px 11px',
                    border: '2px solid ' + (on ? 'var(--ink)' : 'var(--line)'),
                    borderRadius: 11, background: on ? 'var(--yellow)' : '#fff',
                    cursor: 'pointer', fontFamily: 'var(--body)', textAlign: 'left'
                  }}>
                    <span style={{ fontSize: 22 }}>{t.flag}</span>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontWeight: 800, fontSize: 13.5 }}>{t.name}</div>
                      <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--ink2)' }}>Group {t.group} · {t.odds}</div>
                    </div>
                    <span style={{ width: 20, height: 20, borderRadius: '50%', border: '2px solid var(--ink)', background: on ? 'var(--ink)' : '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 12, fontWeight: 900, flex: '0 0 auto' }}>{on ? '✓' : ''}</span>
                  </button>
                );
              })}
            </div>
          )}
        </div>
      )}
    </Cp>
  );
}

function PredLeaderboard(props) {
  const me = props.me;
  const rows = Sp.rankedByPred();
  const top = rows.slice(0, 8);
  const meRow = rows.find(p => p.id === me.id);
  const inTop = top.some(p => p.id === me.id);
  return (
    <Cp flat style={{ padding: '4px 14px' }}>
      {top.map((p, i) => <LbRow key={p.id} p={p} i={i} me={me} />)}
      {!inTop && meRow && <>
        <div style={{ textAlign: 'center', color: 'var(--ink2)', fontWeight: 800, padding: '2px 0' }}>···</div>
        <LbRow p={meRow} i={meRow.predRank - 1} me={me} />
      </>}
    </Cp>
  );
}
function LbRow(props) {
  const { p, i, me } = props; const isMe = p.id === me.id;
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 11, padding: '9px 4px', borderRadius: 10, background: isMe ? 'rgba(245,200,0,.18)' : 'transparent', margin: '0 -4px' }}>
      <span className="dh" style={{ fontSize: 16, width: 22, textAlign: 'center', color: i === 0 ? 'var(--red)' : 'var(--ink2)' }}>{i + 1}</span>
      <Ap person={Object.assign({}, p, { isYou: false })} size={32} />
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontWeight: 800, fontSize: 14, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{p.name}{isMe && ' (you)'}</div>
        <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--ink2)' }}>{p.location}{p.ltMember ? ' · LT' : ''}</div>
      </div>
      <Chp tone={i === 0 ? 'yellow' : 'ghost'}>{p.predScore} pts</Chp>
    </div>
  );
}

function PredictionsScreen(props) {
  const me = Sp.active();
  const [, bump] = pState(0);
  if (!me) return null;
  const hiddenPredictions = (WCp.meta && WCp.meta.hiddenPredictions) || [];
  const markets = (WCp.predictions || Sp.PREDICTIONS).filter(m => hiddenPredictions.indexOf(m.key) < 0);
  const open = markets.filter(m => !isResolved(m));
  const graded = markets.filter(m => isResolved(m));
  const made = me.picks ? Object.keys(me.picks).filter(k => me.picks[k] != null && (!Array.isArray(me.picks[k]) || me.picks[k].length)).length : 0;
  const predDeadline = WCp.meta && WCp.meta.predDeadline;
  const deadlinePassed = predDeadline && new Date() > new Date(predDeadline);
  const locked = !!(WCp.meta && WCp.meta.predictionsLocked) || !!deadlinePassed;
  function onPick(key, val) { Sp.setPick(me.id, key, val); bump(x => x + 1); }
  function fmtDeadline(dt) {
    try { return new Date(dt).toLocaleString('en-GB', { dateStyle: 'medium', timeStyle: 'short' }); } catch (e) { return dt; }
  }
  return (
    <div className="pad">
      <div className="appbar" style={{ padding: '2px 0 12px' }}>
        <div>
          <div className="dh" style={{ fontSize: 26 }}>Predictions</div>
          <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--ink2)' }}>{made} of {markets.length} made · {Sp.predScoreOf(me)} pts banked</div>
        </div>
      </div>
      {locked && <div style={{ display: 'flex', alignItems: 'center', gap: 9, background: 'var(--ink)', color: '#fff', borderRadius: 13, padding: '10px 13px', marginBottom: 12, fontSize: 13, fontWeight: 700 }}>
        <span style={{ fontSize: 18 }}>🔒</span>
        <span>{deadlinePassed ? 'Predictions are locked — deadline has passed.' : 'Predictions are locked by the organiser.'}</span>
      </div>}
      {!locked && predDeadline && <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--ink2)', marginBottom: 10, padding: '7px 12px', background: 'rgba(245,200,0,.2)', borderRadius: 10 }}>
        Picks lock at {fmtDeadline(predDeadline)} — get yours in.
      </div>}
      <Saysp mood="mischievous" label="on the record" animate>{WCp.LINES.predOpen}</Saysp>
      <SHp aside="still open">Make your call</SHp>
      {open.map(m => <Market key={m.key} market={m} me={me} onPick={onPick} locked={locked} />)}
      {graded.length > 0 && <>
        <SHp aside="graded">Already settled</SHp>
        {graded.map(m => <Market key={m.key} market={m} me={me} onPick={onPick} locked={locked} />)}
      </>}
      <SHp aside="org-wide">Prediction league</SHp>
      <PredLeaderboard me={me} />
      <div style={{ height: 14 }} />
      <Saysp mood="confident" compact>Every point's logged. Wheesht remembers. Especially the bad calls.</Saysp>
    </div>
  );
}

window.PredictionsScreen = PredictionsScreen;

</script>

<script type="text/babel">
/* ===========================================================================
   GAMES — upcoming fixtures tracker.
   The full group-stage schedule with date grouping, status, and filters
   (all / my team / teams in the sweepstake). Highlights games that matter to
   the people who've signed up. Reads WC.FIXTURES + live Store ownership.
   =========================================================================== */
const WCg = window.WC;
const Wg = window.Wheesht;
const Sg = window.Store;
const { Card: Cg, Btn: Bg, Flag: Fg, Chip: Chg, WheeshtSays: Saysg, SectionHead: SHg } = window;
const { useState: gState } = React;

function gameTeam(code) {
  return WCg.TEAMS[code] || { code: code || 'TBD', name: code || 'To be decided', flag: '🏳️' };
}

function ownedSet() {
  var set = {};
  (Sg ? Sg.allSync() : WCg.PEOPLE).forEach(function (p) { set[p.team] = (set[p.team] || 0) + 1; });
  return set;
}
function statusOf(f) {
  return f.status || 'upcoming';
}

function TeamLine(props) {
  const t = gameTeam(props.code); const owners = props.owners;
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, flex: 1, minWidth: 0 }}>
      <span style={{ fontSize: 30, lineHeight: 1 }}>{t.flag}</span>
      <div style={{ fontWeight: 800, fontSize: 13.5, textAlign: 'center', lineHeight: 1.1, textWrap: 'balance' }}>{t.name}</div>
      {owners > 0 && <div style={{ fontSize: 10, fontWeight: 800, color: 'var(--red)', letterSpacing: '.02em' }}>{owners} in the draw</div>}
    </div>
  );
}

function FixtureRow(props) {
  const f = props.f; const owned = props.owned;
  const oa = owned[f.a] || 0, ob = owned[f.b] || 0;
  const mine = props.mineTeam && (f.a === props.mineTeam || f.b === props.mineTeam);
  const hot = oa + ob > 0;
  const st = statusOf(f);
  return (
    <Cg flat style={{ padding: '12px 14px', marginBottom: 9, border: mine ? '2.5px solid var(--ink)' : '2px solid var(--line)', boxShadow: mine ? '0 4px 0 var(--shadow)' : 'none' }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 9 }}>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          <Chg tone="ghost">Group {f.group}</Chg>
          <span style={{ fontSize: 11, fontWeight: 700, color: 'var(--ink2)' }}>MD{f.matchday}</span>
          {mine && <Chg tone="yellow">Your team</Chg>}
        </div>
        {st === 'done' && f.score
          ? <Chg tone="ink">FT {f.score[0]}–{f.score[1]}</Chg>
          : st === 'live'
            ? <span style={{ fontSize: 11, fontWeight: 800, color: 'var(--red)' }}>● LIVE</span>
            : <span style={{ fontSize: 12, fontWeight: 800 }}>{f.time}</span>}
      </div>
      <div style={{ display: 'flex', alignItems: 'flex-start', gap: 6, padding: '2px 0' }}>
        <TeamLine code={f.a} owners={oa} />
        <span className="dh" style={{ fontSize: 14, color: 'var(--ink2)', padding: '8px 2px 0' }}>v</span>
        <TeamLine code={f.b} owners={ob} />
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 9, fontSize: 11, fontWeight: 600, color: 'var(--ink2)' }}>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4"><path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11z" /><circle cx="12" cy="10" r="2.4" /></svg>
        <span style={{ whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{f.venue}</span>
      </div>
    </Cg>
  );
}

function NextUp(props) {
  const f = props.f; if (!f) return null;
  const ta = gameTeam(f.a), tb = gameTeam(f.b);
  return (
    <Cg bordered style={{ background: 'var(--ink)', color: '#fff' }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <span style={{ fontSize: 11, fontWeight: 800, letterSpacing: '.08em', color: 'var(--yellow)', textTransform: 'uppercase' }}>{props.label || 'First whistle'}</span>
        <span style={{ fontSize: 12, fontWeight: 700, opacity: .8 }}>{f.dateLabel} · {f.time}</span>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 14, margin: '14px 0 6px' }}>
        <div style={{ textAlign: 'center', flex: 1 }}>
          <div style={{ fontSize: 40 }}>{ta.flag}</div>
          <div className="dh" style={{ fontSize: 17, color: '#fff' }}>{ta.name}</div>
        </div>
        <span className="dh" style={{ fontSize: 20, color: 'var(--yellow)' }}>v</span>
        <div style={{ textAlign: 'center', flex: 1 }}>
          <div style={{ fontSize: 40 }}>{tb.flag}</div>
          <div className="dh" style={{ fontSize: 17, color: '#fff' }}>{tb.name}</div>
        </div>
      </div>
      <div style={{ textAlign: 'center', fontSize: 12, fontWeight: 600, opacity: .75 }}>Group {f.group} · {f.venue}</div>
    </Cg>
  );
}

function GamesScreen() {
  const me = Sg ? Sg.active() : null;
  const mineTeam = me ? me.team : null;
  const [filter, setFilter] = gState('all');
  const owned = ownedSet();
  const all = (WCg.FIXTURES || []).slice();

  let list = all;
  if (filter === 'mine' && mineTeam) list = all.filter(f => f.a === mineTeam || f.b === mineTeam);
  else if (filter === 'owned') list = all.filter(f => owned[f.a] || owned[f.b]);

  // next upcoming overall, and your team's next
  const upcoming = all.filter(f => statusOf(f) !== 'done');
  const nextOverall = upcoming[0];
  const nextMine = mineTeam ? upcoming.find(f => f.a === mineTeam || f.b === mineTeam) : null;

  // group by date
  const byDate = [];
  const seen = {};
  list.forEach(f => {
    if (!seen[f.dateISO]) { seen[f.dateISO] = { label: f.dateLabel, items: [] }; byDate.push(seen[f.dateISO]); }
    seen[f.dateISO].items.push(f);
  });

  const filters = [['all', 'All games'], ['owned', 'In the draw'], ['mine', 'My team']];

  return (
    <div className="pad">
      <div className="appbar" style={{ padding: '2px 0 12px' }}>
        <div>
          <div className="dh" style={{ fontSize: 26 }}>Upcoming games</div>
          <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--ink2)' }}>{all.length} group-stage fixtures · kick-off {WCg.meta.kickoff || 'soon'}</div>
        </div>
      </div>

      {nextMine
        ? <NextUp f={nextMine} label={'Your ' + gameTeam(mineTeam).name + ' play next'} />
        : <NextUp f={nextOverall} label="First whistle" />}

      <div style={{ height: 12 }} />
      <Saysg mood="confident" label="fixtures" animate>The whole group stage is in. Wheesht has the schedule memorised — and a strong opinion on every game.</Saysg>

      <div style={{ display: 'flex', gap: 7, padding: '16px 0 12px' }}>
        {filters.map(([k, lab]) => (
          <button key={k} onClick={() => setFilter(k)} disabled={k === 'mine' && !mineTeam}
            className={'wc-chip' + (filter === k ? ' wc-chip--yellow' : '')}
            style={{ whiteSpace: 'nowrap', cursor: 'pointer', flex: '0 0 auto', opacity: (k === 'mine' && !mineTeam) ? .4 : 1 }}>{lab}</button>
        ))}
      </div>

      {list.length === 0 &&
        <Cg flat style={{ textAlign: 'center', padding: '26px 16px' }}>
          <Wg mood="neutral" size={64} animate />
          <div className="dh" style={{ fontSize: 17, marginTop: 6 }}>Nothing to show here.</div>
          <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--ink2)', marginTop: 3 }}>No fixtures match that filter yet.</div>
        </Cg>}

      {byDate.map((day, i) => (
        <div key={i}>
          <SHg aside={day.items.length + ' ' + (day.items.length === 1 ? 'game' : 'games')}>{day.label}</SHg>
          {day.items.map(f => <FixtureRow key={f.id} f={f} owned={owned} mineTeam={mineTeam} />)}
        </div>
      ))}
    </div>
  );
}

window.GamesScreen = GamesScreen;

</script>

<script type="text/babel">
/* ===========================================================================
    ADMIN — Wheesht's clipboard. Run the sweepstake through the tournament:
    set the phase, mark teams out (owners flip to eliminated automatically),
    enter match results (fixtures go live / done), and set prediction answers
    (everyone's score + the league re-grade instantly). All changes persist via
    Store and, in live mode, push to the backend so every device picks them up.
    =========================================================================== */
const WCa = window.WC;
const Wa = window.Wheesht;
const Sa = window.Store;
const { Card: Ca, Btn: Ba, Flag: Fa, Chip: Cha, SectionHead: SHa } = window;
const { useState: aState2 } = React;

function adminTeam(code) {
  return WCa.TEAMS[code] || { code: code || 'TBD', name: code || 'To be decided', flag: '🏳️' };
}

/* ---- match banter ----------------------------------------------------------
    When the organiser saves a full-time score, Wheesht pipes up in the house
    voice: homeland bias for Scotland, dry "remaining professional" digs at
    England, plain dry wit for everyone else. Returns {text, mood} for wcToast. */
function matchBanter(f, a, b) {
   const ta = WCa.TEAMS[f.a], tb = WCa.TEAMS[f.b];
   const na = ta ? ta.name : f.a, nb = tb ? tb.name : f.b;
   const draw = a === b, aWin = a > b, margin = Math.abs(a - b);
   const wName = aWin ? na : nb, lName = aWin ? nb : na;
   const pick = arr => arr[(Math.random() * arr.length) | 0];

   if (f.a === 'SCO' || f.b === 'SCO') {
     const scoWon = (f.a === 'SCO' && aWin) || (f.b === 'SCO' && !aWin);
     const other = f.a === 'SCO' ? nb : na;
     if (draw) return { text: pick([
       'Scotland hold ' + other + ' to a draw. A point is a point. Wheesht will take it.',
       'Honours even for Scotland. Wheesht is calling that a moral victory.'
     ]), mood: 'confident' };
     if (scoWon) return { text: pick([
       'SCOTLAND WIN, ' + a + '–' + b + '. Wheesht is not greetin\'. Wheesht has something in its eye.',
       'Scotland see off ' + other + '. Write it down. Frame it. Wheesht aye believed.',
       'The homeland delivers. ' + other + ' sent homeward tae think again.'
     ]), mood: 'scottish' };
     return { text: pick([
       'Scotland fall to ' + other + '. Wheesht expected nothing and is somehow still disappointed.',
       'A gallant Scotland defeat — the most Scottish result there is. Wheesht endures.',
       'Scotland lose. Wheesht is fine. Wheesht is always fine. (Wheesht is not fine.)'
     ]), mood: 'crying' };
   }

   if (f.a === 'ENG' || f.b === 'ENG') {
     const engWon = (f.a === 'ENG' && aWin) || (f.b === 'ENG' && !aWin);
     const other = f.a === 'ENG' ? nb : na;
     if (draw) return { text: 'England draw with ' + other + '. Wheesht is remaining professional. Barely.', mood: 'mischievous' };
     if (engWon) return { text: pick([
       'England beat ' + other + '. Wheesht is noting it down. Without comment. For now.',
       'England win. Wheesht is remaining professional. It is costing Wheesht dearly.'
     ]), mood: 'mischievous' };
     return { text: pick([
       'England lose to ' + other + '. Wheesht is staying neutral. Wheesht is struggling.',
       other + ' see off England. Wheesht has no comment — and a small, private smile.'
     ]), mood: 'smug' };
   }

   if (draw) return { text: pick([
     na + ' and ' + nb + ' share the points, ' + a + '–' + b + '. Wheesht has seen worse.',
     'All square: ' + na + ' ' + a + '–' + b + ' ' + nb + '. Result logged.'
   ]), mood: 'neutral' };
   if (margin >= 3) return { text: pick([
     wName + ' take ' + lName + ' apart, ' + a + '–' + b + '. Wheesht almost felt sorry for them. Almost.',
     'A rout. ' + wName + ' run riot against ' + lName + '. Wheesht is impressed and a wee bit frightened.'
   ]), mood: 'shocked' };
   return { text: pick([
     wName + ' edge ' + lName + ', ' + a + '–' + b + '. Result logged. Wheesht remembers everything.',
     wName + ' take it. ' + lName + ' will have words in the dressing room. Wheesht logged it.'
   ]), mood: 'confident' };
}

function PhaseSeg() {
   const cur = Sa.phase();
   const opts = [['pre', 'Pre-kickoff'], ['live', 'In play'], ['done', 'Finished']];
   return (
     <div style={{ display: 'flex', gap: 8 }}>
       {opts.map(([k, lab]) => (
         <button key={k} onClick={() => Sa.setPhase(k)} className="wc-btn wc-btn--sm"
           style={{ flex: 1, background: cur === k ? 'var(--yellow)' : '#fff', boxShadow: cur === k ? '0 4px 0 var(--ink)' : '0 4px 0 var(--shadow)' }}>{lab}</button>
       ))}
     </div>
   );
}

function TeamToggle(props) {
   const t = props.t; const owners = props.owners;
   return (
     <div style={{ display: 'flex', alignItems: 'center', gap: 9, padding: '8px 4px', borderBottom: '1.5px solid var(--line)', opacity: t.alive ? 1 : .6 }}>
       <Fa team={t} size={22} />
       <div style={{ flex: 1, minWidth: 0 }}>
         <div style={{ fontWeight: 800, fontSize: 13.5, textDecoration: t.alive ? 'none' : 'line-through' }}>{t.name}</div>
         {owners > 0 && <div style={{ fontSize: 10.5, fontWeight: 800, color: 'var(--red)' }}>{owners} in the draw</div>}
       </div>
       <button onClick={() => Sa.setTeamOut(t.code, t.alive)} className="wc-btn wc-btn--sm"
         style={{ padding: '6px 12px', background: t.alive ? '#fff' : 'var(--ink)', color: t.alive ? 'var(--ink)' : '#fff', boxShadow: t.alive ? '0 3px 0 var(--shadow)' : '0 3px 0 #000' }}>
         {t.alive ? 'Knock out' : 'Bring back'}
       </button>
     </div>
   );
}

function ScoreStepper(props) {
   const [a, setA] = aState2(props.a); const [b, setB] = aState2(props.b);
   const ta = adminTeam(props.f.a), tb = adminTeam(props.f.b);
   function step(box, setter, val, d) { var n = Math.max(0, val + d); setter(n); }
   const num = { width: 34, textAlign: 'center', fontFamily: 'var(--disp)', fontWeight: 800, fontSize: 22 };
   const sbtn = { width: 28, height: 28, borderRadius: 8, border: '2px solid var(--ink)', background: '#fff', fontWeight: 900, fontSize: 16, cursor: 'pointer', lineHeight: 1 };
   return (
     <div style={{ marginTop: 10, background: 'var(--bg)', borderRadius: 12, padding: '12px' }}>
       {[[ta, a, setA], [tb, b, setB]].map(([t, v, set], i) => (
         <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: i === 0 ? 8 : 0 }}>
           <span style={{ fontSize: 20 }}>{t.flag}</span>
           <span style={{ flex: 1, fontWeight: 800, fontSize: 14 }}>{t.name}</span>
           <button style={sbtn} onClick={() => step(i, set, v, -1)}>–</button>
           <span style={num}>{v}</span>
           <button style={sbtn} onClick={() => step(i, set, v, 1)}>+</button>
         </div>
       ))}
       <div style={{ display: 'flex', gap: 8, marginTop: 11 }}>
         <Ba variant="ink" sm block onClick={() => props.onSave(a, b)}>Save full-time</Ba>
         <button onClick={props.onCancel} className="wc-btn wc-btn--sm" style={{ boxShadow: '0 4px 0 var(--shadow)', padding: '0 14px' }}>Cancel</button>
       </div>
     </div>
   );
}

function FixtureAdminRow(props) {
   const f = props.f; const [open, setOpen] = aState2(false);
   const ta = adminTeam(f.a), tb = adminTeam(f.b);
   const st = f.status || 'upcoming';
   return (
     <Ca flat style={{ padding: '11px 13px', marginBottom: 8 }}>
       <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
         <div style={{ display: 'flex', gap: 5, alignItems: 'center', flex: 1, minWidth: 0 }}>
           <span style={{ fontSize: 18 }}>{ta.flag}</span>
           <span style={{ fontWeight: 800, fontSize: 13, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{ta.code}</span>
           <span style={{ color: 'var(--ink2)', fontWeight: 800, fontSize: 12, padding: '0 2px' }}>
             {st === 'done' && f.score ? f.score[0] + '–' + f.score[1] : 'v'}
           </span>
           <span style={{ fontWeight: 800, fontSize: 13, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{tb.code}</span>
           <span style={{ fontSize: 18 }}>{tb.flag}</span>
         </div>
         {st === 'done'
           ? <Cha tone="ink">FT</Cha>
           : st === 'live'
             ? <span style={{ fontSize: 10.5, fontWeight: 800, color: 'var(--red)' }}>● LIVE</span>
             : <span style={{ fontSize: 11, fontWeight: 700, color: 'var(--ink2)' }}>{f.time}</span>}
       </div>
       <div style={{ display: 'flex', alignItems: 'center', gap: 7, marginTop: 8 }}>
         <span style={{ fontSize: 10.5, fontWeight: 700, color: 'var(--ink2)', flex: 1 }}>Gp {f.group} · {f.dateLabel}</span>
         {st !== 'done' && <button onClick={() => Sa.setFixtureLive(f.id, st !== 'live')} className="wc-btn wc-btn--sm" style={{ padding: '5px 10px', boxShadow: '0 3px 0 var(--shadow)' }}>{st === 'upcoming' ? 'Go live' : 'Go back'}</button>}
         <button onClick={() => setOpen(!open)} className="wc-btn wc-btn--sm" style={{ padding: '5px 10px', boxShadow: '0 3px 0 var(--shadow)' }}>{st === 'done' ? 'Edit score' : 'Enter score'}</button>
         {st === 'done' && <button onClick={() => Sa.clearFixture(f.id)} className="wc-btn wc-btn--sm" style={{ padding: '5px 10px', boxShadow: '0 3px 0 var(--shadow)' }}>Undo</button>}
       </div>
       {open && <ScoreStepper f={f} a={f.score ? f.score[0] : 0} b={f.score ? f.score[1] : 0}
         onSave={(a, b) => {
           Sa.setFixtureResult(f.id, a, b);
           setOpen(false);
           const bn = matchBanter(f, a, b);
           if (window.wcToast) window.wcToast(bn.text, bn.mood);
         }} onCancel={() => setOpen(false)} />}
     </Ca>
   );
}

function PredAdmin(props) {
   const m = props.m;
   function label(opt) {
     if (m.kind === 'player') return opt.name;
     if (m.kind === 'stage') return opt;
     return WCa.TEAMS[opt] ? WCa.TEAMS[opt].name : opt;
   }
   function id(opt) { return m.kind === 'player' ? opt.id : opt; }
   const isTwo = m.kind === 'team2';
   const ans = m.answer;
   const hiddenPreds = Sa.hiddenPredictions ? Sa.hiddenPredictions() : [];
   const isHidden = hiddenPreds.indexOf(m.key) >= 0;
   function choose(oid) {
     if (isTwo) {
       let arr = Array.isArray(ans) ? ans.slice() : [];
       if (arr.indexOf(oid) >= 0) arr = arr.filter(x => x !== oid); else { arr.push(oid); if (arr.length > 2) arr.shift(); }
       Sa.setPredictionAnswer(m.key, arr.length ? arr : null);
     } else Sa.setPredictionAnswer(m.key, ans === oid ? null : oid);
   }
   const picked = (oid) => isTwo ? (Array.isArray(ans) && ans.indexOf(oid) >= 0) : ans === oid;
   return (
     <Ca flat style={{ padding: '11px 13px', marginBottom: 8, opacity: isHidden ? 0.55 : 1 }}>
       <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8, gap: 8 }}>
         <div className="dh" style={{ fontSize: 15, flex: 1 }}>{m.q}</div>
         <button onClick={() => Sa.togglePredictionHidden(m.key)} className="wc-btn wc-btn--sm"
           style={{ background: isHidden ? 'var(--ink)' : '#fff', color: isHidden ? '#fff' : 'var(--ink)', border: '2px solid var(--ink)', fontSize: 11, padding: '4px 9px', flexShrink: 0 }}>
           {isHidden ? 'Hidden' : 'Visible'}
         </button>
         <Cha tone={ans != null && (!isTwo || ans.length) ? 'green' : 'ghost'}>{ans != null && (!isTwo || ans.length) ? 'set' : 'open'}</Cha>
       </div>
       {!isHidden && <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
         {m.options.map((opt, i) => {
           const on = picked(id(opt));
           return <button key={i} onClick={() => choose(id(opt))}
             style={{ border: '2px solid ' + (on ? 'var(--ink)' : 'var(--line)'), background: on ? 'var(--yellow)' : '#fff', borderRadius: 10, padding: '6px 10px', fontFamily: 'var(--body)', fontWeight: 700, fontSize: 13, cursor: 'pointer' }}>{label(opt)}</button>;
         })}
       </div>}
       {isHidden && <div style={{ fontSize: 11.5, fontWeight: 600, color: 'var(--ink2)' }}>Hidden from players. Tap Visible to re-enable.</div>}
     </Ca>
   );
}

function moneyAdmin(n) {
   return '£' + (Math.round(Number(n || 0) * 100) / 100).toLocaleString('en-GB', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
}

function SettingsAdmin() {
   const [, bump] = aState2(0);
   React.useEffect(() => Sa.subscribe(() => bump(x => x + 1)), []);
   const feeNow = Sa.entryFee ? Sa.entryFee() : WCa.FEE;
   const [fee, setFee] = aState2(String(feeNow || 0));
   React.useEffect(() => setFee(String(feeNow || 0)), [feeNow]);
   const locationsNow = Sa.locations ? Sa.locations() : ['Edinburgh', 'London'];
   const [locInput, setLocInput] = aState2(locationsNow.join(', '));
   React.useEffect(() => setLocInput(locationsNow.join(', ')), [locationsNow.join(',')]);
   const entrants = Sa.allSync().length;
   const split = Sa.charitySplit ? Sa.charitySplit() : 0.5;
   const purpose = Sa.purpose ? Sa.purpose() : 'work';
   const includeDept = Sa.includeDepartment ? Sa.includeDepartment() : true;
   const includeLocation = Sa.includeLocation ? Sa.includeLocation() : true;
   const includeLtMember = Sa.includeLtMember ? Sa.includeLtMember() : true;
   const locationsFreeText = Sa.locationsFreeText ? Sa.locationsFreeText() : false;
   const predDeadlineNow = Sa.predDeadline ? Sa.predDeadline() : null;
   const [predDeadlineInput, setPredDeadlineInput] = aState2(predDeadlineNow ? predDeadlineNow.slice(0, 16) : '');
   React.useEffect(() => setPredDeadlineInput(predDeadlineNow ? predDeadlineNow.slice(0, 16) : ''), [predDeadlineNow]);
   function saveDeadline() {
     const val = predDeadlineInput.trim();
     if (val) {
       const dt = new Date(val);
       if (isNaN(dt.getTime())) return;
       Sa.setPredDeadline(dt.toISOString());
       if (window.wcToast) window.wcToast('Prediction deadline set.', 'confident');
     } else {
       Sa.setPredDeadline(null);
       if (window.wcToast) window.wcToast('Deadline cleared.', 'neutral');
     }
   }
   const n = Number(fee);
   const feeNum = isFinite(n) && n >= 0 ? n : feeNow;
   const gross = entrants * feeNum;
   const charity = gross * split;
   const winner = gross * (1 - split);
   const fld = { width: '100%', border: '2.5px solid var(--ink)', borderRadius: 12, padding: '11px 13px', fontFamily: 'var(--disp)', fontWeight: 800, fontSize: 22, outline: 'none', background: '#fff' };
   function saveFee() {
     const val = Number(fee);
     if (!isFinite(val) || val < 0) { setFee(String(feeNow || 0)); return; }
     Sa.setEntryFee(val);
     if (window.wcToast) window.wcToast('Entry fee set to £' + val.toLocaleString('en-GB'), 'confident');
   }
   function saveLocations() {
     const arr = locInput.split(',').map(s => s.trim()).filter(Boolean);
     if (!arr.length) return;
     Sa.setLocations(arr);
     if (window.wcToast) window.wcToast(arr.length + ' location' + (arr.length > 1 ? 's' : '') + ' saved.', 'confident');
   }
   function toggleRow(onClick, on, title, text) {
     return <button onClick={onClick} style={{ width: '100%', display: 'flex', alignItems: 'center', gap: 11, textAlign: 'left', border: '2px solid var(--line)', borderRadius: 13, background: '#fff', padding: '11px 12px', cursor: 'pointer', marginBottom: 8 }}>
       <span style={{ width: 42, height: 24, borderRadius: 999, background: on ? 'var(--green)' : 'var(--line)', border: '2px solid var(--ink)', position: 'relative', flex: '0 0 auto' }}>
         <span style={{ position: 'absolute', top: 2, left: on ? 20 : 2, width: 16, height: 16, borderRadius: '50%', background: '#fff', border: '2px solid var(--ink)' }} />
       </span>
       <span style={{ flex: 1, minWidth: 0 }}>
         <span className="dh" style={{ display: 'block', fontSize: 15 }}>{title}</span>
         <span style={{ display: 'block', fontSize: 12, fontWeight: 600, color: 'var(--ink2)', marginTop: 2, lineHeight: 1.3 }}>{text}</span>
       </span>
     </button>;
   }
   const splitPct = Math.round(split * 100);
   return (
     <>
       <Ca bordered style={{ background: 'var(--yellow)', marginBottom: 12 }}>
         <div style={{ fontSize: 11, fontWeight: 800, letterSpacing: '.06em', textTransform: 'uppercase' }}>Entry fee</div>
         <div style={{ display: 'flex', gap: 9, alignItems: 'center', marginTop: 7 }}>
           <span className="dh" style={{ fontSize: 24 }}>£</span>
           <input type="number" min="0" step="0.5" value={fee} onChange={e => setFee(e.target.value)} onBlur={saveFee} style={fld} />
           <button onClick={saveFee} className="wc-btn wc-btn--sm wc-btn--ink" style={{ flex: '0 0 auto' }}>Save</button>
         </div>
         <div style={{ fontSize: 12.5, fontWeight: 700, color: 'var(--ink2)', marginTop: 9 }}>{entrants} entrants at {moneyAdmin(feeNum)} each.</div>
       </Ca>

       <Ca flat style={{ padding: '12px 13px', marginBottom: 12 }}>
         {[
           ['Total collected', gross, 'var(--ink)'],
           ['Winner fund', winner, 'var(--green)'],
           ['Charity fund', charity, 'var(--red)'],
         ].map((r, i) => (
           <div key={r[0]} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: i ? '8px 0 0' : '0', borderTop: i ? '1.5px solid var(--line)' : 'none', marginTop: i ? 8 : 0 }}>
             <span style={{ flex: 1, fontSize: 13, fontWeight: 800, color: 'var(--ink2)' }}>{r[0]}</span>
             <span className="dh" style={{ fontSize: 19, color: r[2] }}>{moneyAdmin(r[1])}</span>
           </div>
         ))}
       </Ca>

       <SHa>Charity split</SHa>
       <div style={{ display: 'flex', gap: 7, marginBottom: 8 }}>
         {[0, 25, 50, 75, 100].map(pct => (
           <button key={pct} onClick={() => Sa.setCharitySplit(pct / 100)} className="wc-btn wc-btn--sm"
             style={{ flex: 1, background: splitPct === pct ? 'var(--yellow)' : '#fff', boxShadow: splitPct === pct ? '0 4px 0 var(--ink)' : '0 4px 0 var(--shadow)' }}>
             {pct}%
           </button>
         ))}
       </div>
       <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--ink2)', marginBottom: 16, lineHeight: 1.4 }}>
         {split < 0.01 ? 'No charity split — everything goes to the winner.' : split > 0.99 ? 'All entry fees go to charity. No winner fund.' : splitPct + '% of each entry goes to charity, the rest to the winner.'}
       </div>

       <SHa>Sweepstake type</SHa>
       <div style={{ display: 'flex', gap: 8, marginBottom: 8 }}>
         {[['work', 'Work'], ['friends', 'Friends & family']].map(([k, lab]) => (
           <button key={k} onClick={() => Sa.setPurpose(k)} className="wc-btn wc-btn--sm"
             style={{ flex: 1, background: purpose === k ? 'var(--yellow)' : '#fff', boxShadow: purpose === k ? '0 4px 0 var(--ink)' : '0 4px 0 var(--shadow)' }}>
             {lab}
           </button>
         ))}
       </div>
       <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--ink2)', marginBottom: 16, lineHeight: 1.4 }}>
         {purpose === 'work' ? 'Shows department, location and LT fields. You can toggle them individually below.' : 'Just names — no work details collected. Individual toggles below still apply.'}
       </div>

       <SHa>Locations</SHa>
       <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--ink2)', marginBottom: 8, lineHeight: 1.4 }}>List your offices or locations, separated by commas. People pick from these when signing up.</div>
       <div style={{ display: 'flex', gap: 7, alignItems: 'center', marginBottom: 8 }}>
         <input value={locInput} onChange={e => setLocInput(e.target.value)} onBlur={saveLocations}
           onKeyDown={e => e.key === 'Enter' && saveLocations()}
           style={{ flex: 1, border: '2px solid var(--ink)', borderRadius: 11, padding: '9px 12px', fontFamily: 'var(--body)', fontWeight: 600, fontSize: 14, outline: 'none', background: '#fff' }}
           placeholder="e.g. Edinburgh, London, Remote" />
         <button onClick={saveLocations} className="wc-btn wc-btn--sm wc-btn--ink">Save</button>
       </div>
       {toggleRow(
         () => Sa.setLocationsFreeText(!locationsFreeText),
         locationsFreeText,
         'Allow custom location',
         locationsFreeText ? 'People can type their own location (your list shows as suggestions).' : 'People must pick from your list above.'
       )}

       <SHa>Predictions deadline</SHa>
       <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--ink2)', marginBottom: 8, lineHeight: 1.4 }}>Set a cut-off date and time. Predictions lock automatically once it passes.</div>
       <div style={{ display: 'flex', gap: 7, alignItems: 'center', marginBottom: 6 }}>
         <input
           type="datetime-local"
           value={predDeadlineInput}
           onChange={e => setPredDeadlineInput(e.target.value)}
           onBlur={saveDeadline}
           style={{ flex: 1, border: '2px solid var(--ink)', borderRadius: 11, padding: '9px 12px', fontFamily: 'var(--body)', fontWeight: 600, fontSize: 14, outline: 'none', background: '#fff' }}
         />
         <button onClick={saveDeadline} className="wc-btn wc-btn--sm wc-btn--ink">Set</button>
         {predDeadlineNow && <button onClick={() => { setPredDeadlineInput(''); Sa.setPredDeadline(null); if (window.wcToast) window.wcToast('Deadline cleared.', 'neutral'); }} className="wc-btn wc-btn--sm">Clear</button>}
       </div>
       {predDeadlineNow && (() => {
         const past = new Date() > new Date(predDeadlineNow);
         return <div style={{ fontSize: 12, fontWeight: 700, color: past ? 'var(--red)' : 'var(--ink2)', marginBottom: 16 }}>
           {past ? 'Locked — deadline has passed.' : 'Locks at ' + new Date(predDeadlineNow).toLocaleString('en-GB', { dateStyle: 'medium', timeStyle: 'short' }) + '.'}
         </div>;
       })()}
       {!predDeadlineNow && <div style={{ height: 16 }} />}

       <SHa>Signup fields</SHa>
       {toggleRow(
         () => Sa.setIncludeDepartment(!includeDept),
         includeDept,
         'Team / department',
         includeDept ? 'Shown on signup, editing and directory.' : 'Hidden from signup, editing and directory.'
       )}
       {toggleRow(
         () => Sa.setIncludeLocation(!includeLocation),
         includeLocation,
         'Location',
         includeLocation ? 'Shown on signup and profile editing.' : 'Hidden — not collected.'
       )}
       {toggleRow(

         'Leadership Team member',
         includeLtMember ? 'Shown on signup and profile editing.' : 'Hidden — not collected.'
       )}
     </>
   );
}

function AdminPanel(props) {
   const [, bump] = aState2(0);
   React.useEffect(() => Sa.subscribe(() => bump(x => x + 1)), []);
   const [sec, setSec] = aState2('results');
   const [mdFilter, setMdFilter] = aState2(0);
   const owned = {};
   const allPeople = Sa.allSync() || [];
   allPeople.forEach(p => { owned[p.team] = (owned[p.team] || 0) + 1; });

   const groups = 'ABCDEFGHIJKL'.split('');
   const fixtures = (WCa.FIXTURES || []).filter(f => mdFilter === 0 || f.matchday === mdFilter);
   const byDate = []; const seen = {};
   fixtures.forEach(f => { if (!seen[f.dateISO]) { seen[f.dateISO] = { label: f.dateLabel, items: [] }; byDate.push(seen[f.dateISO]); } seen[f.dateISO].items.push(f); });

   const secs = [['results', 'Results'], ['teams', 'Teams'], ['predict', 'Predictions'], ['people', 'People'], ['chat', 'Chat'], ['settings', 'Settings']];

   return (
     <div className="moment" style={{ background: 'var(--bg)' }}>
